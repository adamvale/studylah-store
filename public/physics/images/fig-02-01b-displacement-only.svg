<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 290" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:17px; }
    .disp { fill:none; stroke:#F5C542; stroke-width:3.5; }
    .pt { fill:#EAEAEA; }
    .yellow { fill:#F5C542; font-weight:600; }
    .dim { fill:#B9BDC7; font-size:15px; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#F5C542"/>
    </marker>
  </defs>
  <!-- only the straight arrow from start to finish, with its direction -->
  <text class="yellow" x="46" y="40">displacement = straight line, A to B</text>
  <line class="disp" x1="55" y1="235" x2="360" y2="149" marker-end="url(#ah)"/>
  <circle class="pt" cx="55" cy="235" r="6"/>
  <circle class="pt" cx="370" cy="145" r="6"/>
  <text x="38" y="262">A</text>
  <text x="384" y="148">B</text>
  <text class="dim" x="70" y="284">shortest route, with a stated direction</text>
</svg>
