<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .neutron { fill:#9AA0A6; opacity:0.9; stroke:#EAEAEA; stroke-width:0.8; }
    .proton { fill:#E58F8F; opacity:0.9; stroke:#EAEAEA; stroke-width:0.8; }
    .electron { fill:#6FB7E0; stroke:#EAEAEA; stroke-width:0.8; }
    .arrow { stroke:#EAEAEA; stroke-width:1.6; fill:none; marker-end:url(#ah); }
    .cap { font-size:13px; fill:#9AA0A6; }
    .amber { fill:#E8B65A; font-size:13px; }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>

  <!-- neutron before -->
  <circle data-step="1" class="neutron" cx="90" cy="110" r="26"/>
  <text data-step="1" x="90" y="114" text-anchor="middle">n</text>
  <text data-step="1" x="90" y="165" text-anchor="middle" class="cap">neutron</text>

  <!-- arrow -->
  <path data-step="2" class="arrow" d="M130,110 L210,110"/>
  <text data-step="2" x="170" y="98" text-anchor="middle" class="amber">changes into</text>

  <!-- proton stays -->
  <circle data-step="3" class="proton" cx="260" cy="110" r="26"/>
  <text data-step="3" x="260" y="114" text-anchor="middle">p</text>
  <text data-step="3" x="260" y="165" text-anchor="middle" class="cap">proton (stays in nucleus)</text>

  <!-- plus electron ejected -->
  <text data-step="4" x="315" y="115" font-size="20">+</text>
  <path data-step="4" class="arrow" d="M340,110 L420,110"/>
  <circle data-step="4" class="electron" cx="435" cy="110" r="12"/>
  <text data-step="4" x="435" y="114" text-anchor="middle" font-size="11">e</text>
  <text data-step="4" x="378" y="92" text-anchor="middle" class="amber">&#946;-particle</text>

  <text data-step="4" x="240" y="210" text-anchor="middle" class="cap">A neutron becomes a proton plus a fast electron;</text>
  <text data-step="4" x="240" y="228" text-anchor="middle" class="cap">the electron is emitted as the &#946;-particle.</text>
</svg>
