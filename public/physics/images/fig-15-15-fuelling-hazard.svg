<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah15" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .pipe { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .flow { fill:#6FB7E0; opacity:0.12; }
    .neg { fill:#6FB7E0; font-size:13px; text-anchor:middle; }
    .pos { fill:#E58F8F; font-size:13px; text-anchor:middle; }
    .move { stroke:#E8B65A; stroke-width:2; fill:none; }
    .truck { fill:#9AA0A6; opacity:0.2; stroke:#EAEAEA; stroke-width:1.6; }
    .chain { stroke:#E8B65A; stroke-width:2; stroke-dasharray:3 3; fill:none; }
    .hd { font-size:12px; font-weight:bold; }
  </style>
  <!-- TOP: hose / pipe charging (hazard) -->
  <text x="40" y="26" class="hd">Hazard: fluid or dry bulk flowing through a pipe</text>
  <rect class="pipe" x="60" y="55" width="360" height="60" rx="4"/>
  <!-- wall charges negative on inner wall -->
  <g class="neg">
    <text x="90" y="72">&#8722;</text><text x="140" y="72">&#8722;</text><text x="190" y="72">&#8722;</text><text x="240" y="72">&#8722;</text><text x="290" y="72">&#8722;</text><text x="340" y="72">&#8722;</text>
  </g>
  <rect class="flow" x="60" y="80" width="360" height="35"/>
  <!-- flowing material positive -->
  <g class="pos">
    <text x="100" y="103">+</text><text x="150" y="103">+</text><text x="200" y="103">+</text><text x="250" y="103">+</text><text x="300" y="103">+</text><text x="350" y="103">+</text>
  </g>
  <line class="move" x1="80" y1="97" x2="400" y2="97" marker-end="url(#ah15)"/>
  <text x="430" y="70" fill="#6FB7E0">pipe wall</text>
  <text x="430" y="100" fill="#E58F8F">flow of fuel / dry bulk</text>
  <text x="60" y="140" font-size="11" fill="#9AA0A6">friction transfers electrons &#8594; opposite charges build up &#8594; a spark can ignite fuel</text>

  <!-- BOTTOM: truck earthed by metal chain (safety) -->
  <text x="40" y="200" class="hd">Safety: earth the tanker with a metal chain</text>
  <!-- tanker -->
  <rect class="truck" x="60" y="220" width="150" height="55" rx="18"/>
  <rect class="truck" x="210" y="235" width="55" height="40" rx="4"/>
  <circle class="truck" cx="100" cy="285" r="16"/>
  <circle class="truck" cx="175" cy="285" r="16"/>
  <circle class="truck" cx="240" cy="285" r="16"/>
  <!-- ground line -->
  <line stroke="#9AA0A6" stroke-width="1.5" x1="40" y1="308" x2="420" y2="308"/>
  <!-- chain from body to ground -->
  <path class="chain" d="M70,275 L70,308"/>
  <line class="move" x1="70" y1="305" x2="70" y2="245" marker-end="url(#ah15)"/>
  <text x="85" y="270" fill="#E8B65A">electrons flow to ground</text>
  <text x="300" y="260" font-size="11" fill="#9AA0A6">charge does not build up,</text>
  <text x="300" y="276" font-size="11" fill="#9AA0A6">so no dangerous spark</text>
</svg>
