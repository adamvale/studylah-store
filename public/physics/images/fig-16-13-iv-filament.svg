<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#9AA0A6; stroke-width:2; fill:none; }
    .curve { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <line data-step="1" class="axis" x1="60" y1="230" x2="300" y2="230"/>
  <line data-step="1" class="axis" x1="60" y1="230" x2="60" y2="40"/>
  <path data-step="1" class="axis" d="M60,40 l-5,10 M60,40 l5,10"/>
  <path data-step="2" class="axis" d="M300,230 l-10,-5 M300,230 l-10,5"/>
  <text data-step="3" x="70" y="55" class="lbl">I / A</text>
  <text data-step="3" x="270" y="255" class="lbl">V / V</text>
  <!-- curve that flattens (S-shaped, gradient decreasing) -->
  <path data-step="2" class="curve" d="M60,230 C90,150 140,95 280,70"/>
  <text data-step="4" x="160" y="270" class="lbl" text-anchor="middle" fill="#9AA0A6">filament lamp (resistance rises)</text>
</svg>
