<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <radialGradient id="gpos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E58F8F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E58F8F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gneg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6FB7E0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6FB7E0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .sym { font-size:22px; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .pos { fill:none; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:none; stroke:#6FB7E0; stroke-width:1.8; }
  </style>
  <circle data-step="1" cx="180" cy="150" r="110" fill="url(#gpos)"/>
  <circle data-step="1" cx="180" cy="150" r="24" class="pos"/><text data-step="3" x="180" y="158" class="sym" fill="#E58F8F">+</text>
  <circle data-step="1" cx="430" cy="150" r="110" fill="url(#gneg)"/>
  <circle data-step="2" cx="430" cy="150" r="24" class="neg"/><text data-step="3" x="430" y="158" class="sym" fill="#6FB7E0">−</text>
  <!-- labels -->
  <line data-step="2" class="lead" x1="180" y1="174" x2="120" y2="270"/>
  <text data-step="3" x="30" y="285">near the charge → force is stronger</text>
  <line data-step="2" class="lead" x1="180" y1="60" x2="120" y2="35"/>
  <text data-step="4" x="10" y="30">away from charge → force is weaker</text>
  <text data-step="4" x="430" y="292" text-anchor="middle" fill="#9AA0A6">electric field</text>
</svg>
