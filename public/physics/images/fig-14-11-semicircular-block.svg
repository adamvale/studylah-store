<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .glass { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.6; }
    .norm { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- semicircular glass dome, flat side down -->
  <path class="glass" d="M190,200 A110,110 0 0,1 410,200 Z"/>
  <text x="180" y="205" text-anchor="end" font-size="13">A</text>
  <text x="420" y="205" font-size="13">B</text>
  <!-- normal through centre O -->
  <path class="norm" d="M300,90 L300,300"/>
  <!-- incident ray from lower-left, i=40 from normal -->
  <path class="inc" marker-end="url(#a1)" d="M223,292 L299,201"/>
  <text x="205" y="300" text-anchor="end" font-size="12" fill="#E8B65A">incident ray</text>
  <!-- refracted ray into glass, r=25 -->
  <path class="ref" marker-end="url(#a2)" d="M300,200 L338,119"/>
  <text x="348" y="120" font-size="12" fill="#6FB7E0">refracted ray</text>
  <!-- angle arcs -->
  <path class="arc" d="M300,255 A55,55 0 0,1 265,242"/>
  <text x="258" y="262" font-size="12">40&#176;</text>
  <path class="arc" d="M300,150 A50,50 0 0,0 318,153"/>
  <text x="316" y="152" font-size="12">25&#176;</text>
  <text x="300" y="330" text-anchor="middle" font-size="12">n = 1.52, i = 40&#176; &#8594; r = 25&#176;</text>
</svg>
