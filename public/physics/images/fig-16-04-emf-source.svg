<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .path { fill:none; stroke:#9AA0A6; stroke-width:1.6; stroke-dasharray:6 5; }
    .flow { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .lbl { font-size:14px; }
    .q { fill:#E8B65A; fill-opacity:0.30; stroke:#E8B65A; stroke-width:1.4; }
  </style>
  <!-- dashed complete-circuit loop -->
  <rect data-step="1" class="path" x="70" y="70" width="320" height="170"/>

  <!-- source of emf drawn on top edge -->
  <rect data-step="2" class="wire" x="200" y="58" width="60" height="24" fill="none"/>
  <line data-step="2" class="wire" x1="150" y1="70" x2="200" y2="70"/>
  <line data-step="2" class="wire" x1="260" y1="70" x2="330" y2="70"/>
  <line data-step="2" class="wire" x1="230" y1="82" x2="230" y2="140"/>
  <text data-step="2" x="230" y="160" class="lbl" text-anchor="middle">source of e.m.f.</text>

  <!-- unit charge on top-left travelling -->
  <circle data-step="3" class="q" cx="150" cy="70" r="11"/>
  <text data-step="3" x="150" y="74" class="lbl" text-anchor="middle" fill="#E8B65A">+</text>
  <text data-step="3" x="150" y="42" class="lbl" text-anchor="middle">a unit charge</text>

  <!-- flow arrows around the loop -->
  <path data-step="4" class="flow" d="M120,70 l-14,0"/>
  <path data-step="4" class="flow" d="M106,70 l12,-6 M106,70 l12,6"/>
  <path data-step="4" class="flow" d="M70,150 l0,14"/>
  <path data-step="4" class="flow" d="M70,164 l-6,-12 M70,164 l6,-12"/>
  <path data-step="4" class="flow" d="M240,240 l14,0"/>
  <path data-step="4" class="flow" d="M254,240 l-12,-6 M254,240 l-12,6"/>
  <path data-step="4" class="flow" d="M390,150 l0,-14"/>
  <path data-step="4" class="flow" d="M390,136 l-6,12 M390,136 l6,12"/>
</svg>
