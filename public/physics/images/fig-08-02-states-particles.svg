<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .p { fill:#6FB7E0; opacity:0.34; stroke:#6FB7E0; stroke-width:1.2; }
    .arr { stroke:#86C98B; stroke-width:1.4; fill:none; }
    .title { font-size:15px; font-weight:bold; text-anchor:middle; }
    .sub { font-size:11px; text-anchor:middle; fill:#9AA0A6; }
  </style>

  <!-- SOLID -->
  <text class="title" x="110" y="30">Solid</text>
  <rect class="box" x="30" y="45" width="160" height="150"/>
  <g class="p">
    <circle cx="52" cy="67" r="12"/><circle cx="78" cy="67" r="12"/><circle cx="104" cy="67" r="12"/><circle cx="130" cy="67" r="12"/><circle cx="156" cy="67" r="12"/>
    <circle cx="52" cy="93" r="12"/><circle cx="78" cy="93" r="12"/><circle cx="104" cy="93" r="12"/><circle cx="130" cy="93" r="12"/><circle cx="156" cy="93" r="12"/>
    <circle cx="52" cy="119" r="12"/><circle cx="78" cy="119" r="12"/><circle cx="104" cy="119" r="12"/><circle cx="130" cy="119" r="12"/><circle cx="156" cy="119" r="12"/>
    <circle cx="52" cy="145" r="12"/><circle cx="78" cy="145" r="12"/><circle cx="104" cy="145" r="12"/><circle cx="130" cy="145" r="12"/><circle cx="156" cy="145" r="12"/>
    <circle cx="52" cy="171" r="12"/><circle cx="78" cy="171" r="12"/><circle cx="104" cy="171" r="12"/><circle cx="130" cy="171" r="12"/><circle cx="156" cy="171" r="12"/>
  </g>
  <text class="sub" x="110" y="215">regular pattern, fixed positions</text>
  <text class="sub" x="110" y="230">vibrate in place</text>

  <!-- LIQUID -->
  <text class="title" x="330" y="30">Liquid</text>
  <rect class="box" x="250" y="45" width="160" height="150"/>
  <g class="p">
    <circle cx="272" cy="72" r="12"/><circle cx="300" cy="66" r="12"/><circle cx="330" cy="74" r="12"/><circle cx="362" cy="65" r="12"/><circle cx="390" cy="72" r="12"/>
    <circle cx="268" cy="100" r="12"/><circle cx="298" cy="96" r="12"/><circle cx="326" cy="104" r="12"/><circle cx="356" cy="95" r="12"/><circle cx="388" cy="102" r="12"/>
    <circle cx="276" cy="130" r="12"/><circle cx="306" cy="126" r="12"/><circle cx="338" cy="132" r="12"/><circle cx="368" cy="124" r="12"/><circle cx="394" cy="132" r="12"/>
    <circle cx="270" cy="160" r="12"/><circle cx="300" cy="158" r="12"/><circle cx="332" cy="164" r="12"/><circle cx="362" cy="156" r="12"/><circle cx="392" cy="162" r="12"/>
  </g>
  <text class="sub" x="330" y="215">close together but irregular</text>
  <text class="sub" x="330" y="230">slide past one another</text>

  <!-- GAS -->
  <text class="title" x="550" y="30">Gas</text>
  <rect class="box" x="470" y="45" width="160" height="150"/>
  <g class="p">
    <circle cx="500" cy="72" r="12"/><circle cx="560" cy="64" r="12"/><circle cx="608" cy="86" r="12"/>
    <circle cx="490" cy="120" r="12"/><circle cx="548" cy="108" r="12"/><circle cx="600" cy="132" r="12"/>
    <circle cx="516" cy="168" r="12"/><circle cx="576" cy="158" r="12"/>
  </g>
  <g class="arr">
    <path d="M500,72 l22,-14" marker-end="url(#a)"/>
    <path d="M560,64 l-16,20" marker-end="url(#a)"/>
    <path d="M600,132 l18,10" marker-end="url(#a)"/>
    <path d="M490,120 l-10,18" marker-end="url(#a)"/>
    <path d="M576,158 l20,-10" marker-end="url(#a)"/>
  </g>
  <text class="sub" x="550" y="215">far apart, no pattern</text>
  <text class="sub" x="550" y="230">move freely in all directions</text>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#86C98B" stroke-width="1.4"/>
    </marker>
  </defs>
</svg>
