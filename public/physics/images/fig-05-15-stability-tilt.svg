<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .plumb { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 3; fill:none; }
    .cg { fill:#E8B65A; stroke:#E8B65A; }
    .pivot { fill:#E58F8F; stroke:#E58F8F; }
    .force { stroke:#E58F8F; stroke-width:2.2; fill:none; }
    .base { stroke:#6FB7E0; stroke-width:2.6; }
    .ground { stroke:#9AA0A6; stroke-width:1.3; }
    .lbl { font-size:11.5px; }
    .ttl { font-size:12px; fill:#86C98B; }
  </style>

  <!-- CASE 1: stable, line within base -->
  <g>
    <line class="ground" x1="20" y1="185" x2="200" y2="185"/>
    <g transform="rotate(-16 70 185)">
      <rect class="box" x="55" y="115" width="70" height="70"/>
      <line class="base" x1="55" y1="185" x2="125" y2="185"/>
      <circle class="cg" cx="90" cy="150" r="3.6"/>
    </g>
    <!-- pivot (lower corner) -->
    <circle class="pivot" cx="70" cy="185" r="3.6"/>
    <text class="lbl" x="40" y="200">pivot</text>
    <!-- CG position after rotation approx -->
    <circle class="cg" cx="96" cy="140" r="3.6"/>
    <line class="plumb" x1="96" y1="140" x2="96" y2="210"/>
    <line class="force" x1="96" y1="140" x2="96" y2="200"/>
    <path class="force" d="M96,200 l-4,-9 M96,200 l4,-9"/>
    <text class="ttl" x="110" y="35" text-anchor="middle">stable</text>
    <text class="lbl" x="110" y="222" text-anchor="middle">line inside base:</text>
    <text class="lbl" x="110" y="236" text-anchor="middle">weight rights it</text>
  </g>

  <!-- CASE 2: topples, line outside base -->
  <g>
    <line class="ground" x1="220" y1="185" x2="400" y2="185"/>
    <g transform="rotate(-40 270 185)">
      <rect class="box" x="255" y="115" width="70" height="70"/>
      <line class="base" x1="255" y1="185" x2="325" y2="185"/>
    </g>
    <circle class="pivot" cx="270" cy="185" r="3.6"/>
    <text class="lbl" x="240" y="200">pivot</text>
    <!-- CG shifted beyond pivot to the left -->
    <circle class="cg" cx="250" cy="150" r="3.6"/>
    <line class="plumb" x1="250" y1="150" x2="250" y2="210"/>
    <line class="force" x1="250" y1="150" x2="250" y2="200"/>
    <path class="force" d="M250,200 l-4,-9 M250,200 l4,-9"/>
    <text class="ttl" x="310" y="35" text-anchor="middle">unstable</text>
    <text class="lbl" x="310" y="222" text-anchor="middle">line outside base:</text>
    <text class="lbl" x="310" y="236" text-anchor="middle">weight topples it</text>
  </g>

  <!-- CASE 3: neutral / balances on edge, CG above pivot -->
  <g>
    <line class="ground" x1="420" y1="185" x2="600" y2="185"/>
    <g transform="rotate(-45 470 185)">
      <rect class="box" x="455" y="115" width="70" height="70"/>
      <line class="base" x1="455" y1="185" x2="525" y2="185"/>
    </g>
    <circle class="pivot" cx="470" cy="185" r="3.6"/>
    <text class="lbl" x="440" y="200">pivot</text>
    <!-- CG directly above pivot -->
    <circle class="cg" cx="470" cy="150" r="3.6"/>
    <line class="plumb" x1="470" y1="150" x2="470" y2="210"/>
    <line class="force" x1="470" y1="150" x2="470" y2="200"/>
    <path class="force" d="M470,200 l-4,-9 M470,200 l4,-9"/>
    <text class="ttl" x="510" y="35" text-anchor="middle">balances</text>
    <text class="lbl" x="510" y="222" text-anchor="middle">line through pivot:</text>
    <text class="lbl" x="510" y="236" text-anchor="middle">no turning effect</text>
  </g>
</svg>
