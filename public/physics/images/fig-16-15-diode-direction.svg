<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .tri { fill:#6FB7E0; fill-opacity:0.28; stroke:#EAEAEA; stroke-width:2; }
    .flow { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .no { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .lbl { font-size:14px; text-anchor:middle; }
  </style>
  <!-- forward -->
  <g>
    <line class="wire" x1="40" y1="70" x2="120" y2="70"/>
    <polygon class="tri" points="120,54 120,86 148,70"/>
    <line class="wire" x1="148" y1="54" x2="148" y2="86" stroke-width="2.6"/>
    <line class="wire" x1="148" y1="70" x2="228" y2="70"/>
    <path class="flow" d="M55,42 l30,0"/>
    <path class="flow" d="M85,42 l-10,-4 M85,42 l-10,4"/>
    <path class="flow" d="M183,42 l30,0"/>
    <path class="flow" d="M213,42 l-10,-4 M213,42 l-10,4"/>
    <text x="68" y="30" class="lbl" fill="#86C98B">I</text>
    <text x="198" y="30" class="lbl" fill="#86C98B">I</text>
    <text x="134" y="115" class="lbl">forward direction</text>
    <text x="134" y="134" class="lbl" fill="#9AA0A6">current flows, R very low</text>
  </g>
  <!-- reverse : same diode, current tries to flow against the arrow -->
  <g>
    <line class="wire" x1="40" y1="230" x2="120" y2="230"/>
    <polygon class="tri" points="120,214 120,246 148,230"/>
    <line class="wire" x1="148" y1="214" x2="148" y2="246" stroke-width="2.6"/>
    <line class="wire" x1="148" y1="230" x2="228" y2="230"/>
    <path class="no" d="M168,202 l30,0"/>
    <path class="no" d="M168,202 l10,-4 M168,202 l10,4"/>
    <line class="no" x1="176" y1="192" x2="190" y2="212"/>
    <line class="no" x1="190" y1="192" x2="176" y2="212"/>
    <text x="134" y="275" class="lbl">reverse direction</text>
    <text x="134" y="294" class="lbl" fill="#9AA0A6">no current, R very high</text>
  </g>
</svg>
