<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .tri { fill:#6FB7E0; fill-opacity:0.28; stroke:#EAEAEA; stroke-width:2; }
    .flow { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .no { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .lbl { font-size:12px; text-anchor:middle; }
  </style>
  <!-- forward -->
  <g>
    <line class="wire" x1="40" y1="70" x2="120" y2="70"/>
    <polygon class="tri" points="120,54 120,86 148,70"/>
    <line class="wire" x1="148" y1="54" x2="148" y2="86" stroke-width="2.6"/>
    <line class="wire" x1="148" y1="70" x2="228" y2="70"/>
    <path class="flow" d="M60,45 l30,0"/>
    <path class="flow" d="M90,45 l-10,-4 M90,45 l-10,4"/>
    <path class="flow" d="M175,45 l30,0"/>
    <path class="flow" d="M205,45 l-10,-4 M205,45 l-10,4"/>
    <text x="88" y="40" class="lbl" fill="#86C98B">I</text>
    <text x="203" y="40" class="lbl" fill="#86C98B">I</text>
    <text x="134" y="118" class="lbl">forward direction</text>
    <text x="134" y="134" class="lbl" fill="#9AA0A6">current flows, R very low</text>
  </g>
  <!-- reverse -->
  <g>
    <line class="wire" x1="300" y1="70" x2="372" y2="70"/>
    <line class="wire" x1="372" y1="54" x2="372" y2="86" stroke-width="2.6"/>
    <polygon class="tri" points="400,54 400,86 372,70"/>
    <line class="wire" x1="400" y1="70" x2="472" y2="70"/>
    <path class="no" d="M320,45 l30,0"/>
    <path class="no" d="M320,45 l10,-4 M320,45 l10,4"/>
    <line class="no" x1="378" y1="34" x2="394" y2="50"/>
    <line class="no" x1="394" y1="34" x2="378" y2="50"/>
    <text x="386" y="118" class="lbl">reverse direction</text>
    <text x="386" y="134" class="lbl" fill="#9AA0A6">no current, R very high</text>
  </g>
</svg>
