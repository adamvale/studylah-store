<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 350" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .glass { fill:#6FB7E0; fill-opacity:0.22; stroke:#6FB7E0; stroke-width:1.6; }
    .ray { fill:none; stroke:#6FB7E0; stroke-width:2.4; }
    .normal { fill:none; stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { fill:none; stroke:#E8B65A; stroke-width:1.8; }
    .sym { fill:#E8B65A; font-size:15px; }
    .lbl { fill:#E8B65A; font-size:12px; }
    .eq { fill:#E8B65A; font-size:14px; }
    .blue { fill:#6FB7E0; font-size:12px; }
    .grey { fill:#9AA0A6; font-size:11px; }
  </style>
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6FB7E0"/></marker>
  </defs>

  <rect class="glass" x="60" y="170" width="320" height="130" rx="3"/>

  <path class="normal" d="M180,120 V230"/>

  <path class="ray" d="M93,266.6 L136.5,218.3" marker-end="url(#ab)"/>
  <path class="ray" d="M136.5,218.3 L180,170"/>
  <path class="ray" d="M180,170 H255"/>
  <path class="ray" d="M255,170 H330" marker-end="url(#ab)"/>

  <path class="arc" d="M180,225 A55,55 0 0 1 143.2,210.9"/>
  <path class="arc" d="M180,128 A42,42 0 0 1 222,170"/>

  <text class="sym" x="163" y="210" text-anchor="middle">c</text>
  <text class="lbl" x="230" y="132">90 degrees</text>

  <text x="75" y="150">air</text>
  <text x="75" y="196">glass</text>
  <text class="grey" x="186" y="114">normal</text>
  <text class="blue" x="250" y="158">along the boundary</text>
  <text class="lbl" x="200" y="255">critical angle</text>
  <text class="eq" x="240" y="330" text-anchor="middle">sin c = 1 / n</text>
</svg>
