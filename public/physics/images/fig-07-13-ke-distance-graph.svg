<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; }
    .curve { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .grid { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:3 3; }
    .pt { fill:#E8B65A; }
  </style>
  <!-- axes -->
  <line class="axis" x1="70" y1="250" x2="390" y2="250"/>
  <line class="axis" x1="70" y1="250" x2="70" y2="40"/>
  <text x="30" y="45" font-size="11">E_k/J</text>
  <text x="345" y="272">distance/m</text>
  <!-- gridlines for 10 and 20 -->
  <line class="grid" x1="70" y1="160" x2="390" y2="160"/>
  <line class="grid" x1="70" y1="80" x2="390" y2="80"/>
  <text x="60" y="164" text-anchor="end">10</text>
  <text x="60" y="84" text-anchor="end">20</text>
  <!-- x ticks -->
  <text x="70" y="268" text-anchor="middle">0</text>
  <text x="150" y="268" text-anchor="middle">2</text>
  <text x="230" y="268" text-anchor="middle">4</text>
  <text x="310" y="268" text-anchor="middle">6</text>
  <text x="380" y="268" text-anchor="middle">8</text>
  <!-- rising straight line O to P at (4,20) -->
  <line class="curve" x1="70" y1="250" x2="230" y2="80"/>
  <!-- dip P(4,20) down to Q(4.6,~11) then rising toward terminal ~20? Actually terminal at P value 20 -->
  <path class="curve" d="M230,80 C238,120 248,150 265,150 C300,150 340,110 380,88"/>
  <!-- gridline at P -->
  <line class="grid" x1="230" y1="80" x2="230" y2="250"/>
  <!-- points -->
  <circle class="pt" cx="230" cy="80" r="3.5"/>
  <text x="236" y="72" fill="#E8B65A">P</text>
  <circle class="pt" cx="262" cy="150" r="3.5"/>
  <text x="268" y="165" fill="#E8B65A">Q</text>
  <circle class="pt" cx="380" cy="88" r="3.5"/>
  <text x="368" y="80" fill="#E8B65A">R</text>
</svg>
