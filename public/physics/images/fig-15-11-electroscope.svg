<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 670" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .metal { fill:#9AA0A6; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .leaf { fill:#E8B65A; opacity:0.25; stroke:#E8B65A; stroke-width:1.4; }
    .case { fill:none; stroke:#9AA0A6; stroke-width:1.4; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .rodn { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.5; }
    .neg { fill:#6FB7E0; font-size:14px; text-anchor:middle; }
    .posq { fill:#E58F8F; font-size:14px; text-anchor:middle; }
  </style>
  <!-- Panel 1: neutral electroscope -->
  <text x="170" y="30" text-anchor="middle" font-size="14">Neutral: leaf hangs down</text>
  <rect class="metal" x="120" y="55" width="100" height="14" rx="3"/>
  <rect class="metal" x="165" y="69" width="10" height="90"/>
  <rect class="case" x="130" y="150" width="80" height="120" rx="4"/>
  <line stroke="#E8B65A" stroke-width="2" x1="170" y1="159" x2="170" y2="255"/>
  <path class="leaf" d="M170,159 L174,255 L168,255 Z"/>
  <text x="235" y="63">metal plate</text>
  <text x="235" y="115">metal stem</text>
  <text x="235" y="220">gold leaf</text>
  <line class="lead" x1="230" y1="112" x2="175" y2="112"/>
  <line class="lead" x1="230" y1="216" x2="178" y2="235"/>
  <!-- Panel 2: charged rod near, leaf rises -->
  <text x="170" y="360" text-anchor="middle" font-size="14">Charged rod near: leaf rises</text>
  <rect class="rodn" x="100" y="372" width="140" height="20" rx="6"/>
  <text class="neg" x="125" y="387">−</text><text class="neg" x="155" y="387">−</text><text class="neg" x="185" y="387">−</text><text class="neg" x="215" y="387">−</text>
  <text x="42" y="412" font-size="12" fill="#6FB7E0">negatively charged rod</text>
  <rect class="metal" x="120" y="422" width="100" height="14" rx="3"/>
  <text class="posq" x="145" y="434">+</text><text class="posq" x="195" y="434">+</text>
  <rect class="metal" x="165" y="436" width="10" height="70"/>
  <rect class="case" x="125" y="506" width="90" height="120" rx="4"/>
  <line stroke="#E8B65A" stroke-width="2" x1="170" y1="515" x2="148" y2="608"/>
  <line stroke="#E8B65A" stroke-width="2" x1="170" y1="515" x2="192" y2="608"/>
  <text class="neg" x="140" y="580">−</text>
  <text class="neg" x="200" y="580">−</text>
  <text x="170" y="652" text-anchor="middle" font-size="13" fill="#9AA0A6">like charges on stem &amp; leaf repel</text>
</svg>
