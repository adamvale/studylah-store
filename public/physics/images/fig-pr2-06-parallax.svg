  <text data-step="4" class="sub" x="150" y="48" text-anchor="middle">at 90 degrees to the scale</text>
  <text data-step="4" class="bad" x="366" y="86" text-anchor="middle">offset eye</text>
  <text data-step="4" class="bad" x="180" y="294" text-anchor="end">reads 2.5</text>
  <text data-step="4" class="good" x="216" y="294">true 3.0</text>
  <text data-step="4" class="sub" x="210" y="316" text-anchor="middle">press the scale against the object</text>
