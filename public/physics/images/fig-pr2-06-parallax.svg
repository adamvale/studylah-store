<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 326" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .rule { fill:#EAEAEA; fill-opacity:0.08; stroke:#EAEAEA; stroke-width:1.8; }
    .obj { fill:#EAEAEA; fill-opacity:0.12; stroke:#EAEAEA; stroke-width:1.8; }
    .tick { stroke:#EAEAEA; stroke-width:1.1; }
    .num { fill:#9AA0A6; font-size:11px; }
    .sight { stroke:#9AA0A6; stroke-width:1.6; stroke-dasharray:6 4; fill:none; }
    .eyeok { fill:none; stroke:#9AA0A6; stroke-width:1.8; }
    .eyebad { fill:none; stroke:#E58F8F; stroke-width:1.8; }
    .sightbad { stroke:#E58F8F; stroke-width:1.6; stroke-dasharray:6 4; fill:none; }
    .sub { fill:#9AA0A6; font-size:12px; }
    .bad { fill:#E58F8F; font-size:12px; }
    .good { fill:#86C98B; font-size:12px; }
    .goodmark { stroke:#86C98B; stroke-width:2.2; fill:none; }
    .badmark { stroke:#E58F8F; stroke-width:2.2; fill:none; }
  </style>
  <rect data-step="1" class="rule" x="40" y="240" width="350" height="36" rx="3"/>
