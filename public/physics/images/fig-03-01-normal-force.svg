<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 230" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .obj { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .surf { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .hatch { stroke:#9AA0A6; stroke-width:1.2; }
    .force { stroke:#86C98B; stroke-width:2.4; fill:none; }
  </style>
  <defs>
    <marker id="ah-g" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#86C98B"/>
    </marker>
  </defs>
  <!-- surface -->
  <line data-step="1" class="surf" x1="40" y1="160" x2="300" y2="160"/>
  <g data-step="1" class="hatch">
    <line x1="55" y1="160" x2="43" y2="174"/>
    <line x1="85" y1="160" x2="73" y2="174"/>
    <line x1="115" y1="160" x2="103" y2="174"/>
    <line x1="145" y1="160" x2="133" y2="174"/>
    <line x1="175" y1="160" x2="163" y2="174"/>
    <line x1="205" y1="160" x2="193" y2="174"/>
    <line x1="235" y1="160" x2="223" y2="174"/>
    <line x1="265" y1="160" x2="253" y2="174"/>
    <line x1="295" y1="160" x2="283" y2="174"/>
  </g>
  <!-- object -->
  <rect data-step="2" class="obj" x="130" y="98" width="90" height="62"/>
  <!-- normal force arrow (surface pushes up on object) -->
  <path data-step="3" class="force" d="M175,158 L175,72" marker-end="url(#ah-g)"/>
  <!-- labels -->
  <path data-step="4" class="lead" d="M118,120 L90,120"/>
  <text data-step="4" x="85" y="124" text-anchor="end" font-size="13">object</text>
  <path data-step="4" class="lead" d="M175,64 L240,52"/>
  <text data-step="4" x="245" y="56" font-size="13" fill="#86C98B">normal force</text>
  <path data-step="4" class="lead" d="M100,168 L100,190"/>
  <text data-step="4" x="100" y="205" text-anchor="middle" font-size="13">surface</text>
</svg>
