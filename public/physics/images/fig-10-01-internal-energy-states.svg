<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 730" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .p { fill:#6FB7E0; opacity:0.32; stroke:#6FB7E0; stroke-width:1.4; }
    .lbl { fill:#EAEAEA; font-size:15px; text-anchor:middle; }
    .tag { fill:#E8B65A; font-size:13.5px; }
    .cap { fill:#9AA0A6; font-size:13.5px; text-anchor:middle; }
    .box { fill:none; stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; }
  </style>
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E58F8F"/>
    </marker>
  </defs>

  <!-- SOLID: regular close-packed lattice, vibrating -->
  <g data-step="1">
    <text class="cap" x="210" y="22">strong bonds, particles vibrate in fixed positions</text>
    <rect class="box" x="40" y="32" width="340" height="132" rx="6"/>
    <g class="p">
      <circle cx="95" cy="64" r="14"/><circle cx="150" cy="64" r="14"/><circle cx="205" cy="64" r="14"/><circle cx="260" cy="64" r="14"/><circle cx="315" cy="64" r="14"/>
      <circle cx="95" cy="98" r="14"/><circle cx="150" cy="98" r="14"/><circle cx="205" cy="98" r="14"/><circle cx="260" cy="98" r="14"/><circle cx="315" cy="98" r="14"/>
      <circle cx="95" cy="132" r="14"/><circle cx="150" cy="132" r="14"/><circle cx="205" cy="132" r="14"/><circle cx="260" cy="132" r="14"/><circle cx="315" cy="132" r="14"/>
    </g>
    <g stroke="#E58F8F" stroke-width="1.3" fill="none" marker-start="url(#ar)" marker-end="url(#ar)">
      <line x1="63" y1="64" x2="76" y2="64"/>
      <line x1="334" y1="98" x2="347" y2="98"/>
      <line x1="63" y1="132" x2="76" y2="132"/>
    </g>
    <text class="lbl" x="210" y="188">solid</text>
    <text class="tag" x="48" y="210">lowest PE (particles closest together)</text>
    <text class="tag" x="48" y="228">small KE (vibration about fixed positions)</text>
  </g>

  <!-- LIQUID: close but disordered, can slide -->
  <g data-step="2">
    <text class="cap" x="210" y="262">particles close but free to move past one another</text>
    <rect class="box" x="40" y="272" width="340" height="132" rx="6"/>
    <g class="p">
      <circle cx="88" cy="308" r="14"/><circle cx="136" cy="298" r="14"/><circle cx="184" cy="310" r="14"/><circle cx="232" cy="300" r="14"/><circle cx="280" cy="310" r="14"/><circle cx="330" cy="300" r="14"/>
      <circle cx="110" cy="342" r="14"/><circle cx="160" cy="340" r="14"/><circle cx="210" cy="346" r="14"/><circle cx="262" cy="340" r="14"/><circle cx="314" cy="344" r="14"/>
      <circle cx="88" cy="378" r="14"/><circle cx="140" cy="374" r="14"/><circle cx="192" cy="380" r="14"/><circle cx="246" cy="376" r="14"/><circle cx="300" cy="380" r="14"/>
    </g>
    <g stroke="#86C98B" stroke-width="1.4" fill="none">
      <path d="M118,322 l16,-10"/><path d="M282,360 l16,9"/>
    </g>
    <text class="lbl" x="210" y="428">liquid</text>
    <text class="tag" x="48" y="450">more PE than a solid (slightly further apart)</text>
    <text class="tag" x="48" y="468">moderate KE (particles slide about)</text>
  </g>

  <!-- GAS: far apart, fast random -->
  <g data-step="3">
    <text class="cap" x="210" y="502">particles far apart, moving fast in all directions</text>
    <rect class="box" x="40" y="512" width="340" height="132" rx="6"/>
    <g class="p">
      <circle cx="95" cy="548" r="14"/><circle cx="230" cy="540" r="14"/><circle cx="330" cy="552" r="14"/>
      <circle cx="150" cy="600" r="14"/><circle cx="265" cy="608" r="14"/><circle cx="350" cy="612" r="14"/>
    </g>
    <g stroke="#E58F8F" stroke-width="1.4" fill="none" marker-end="url(#ar)">
      <path d="M105,536 l20,-12"/><path d="M242,530 l16,-10"/><path d="M318,542 l-18,-10"/>
      <path d="M138,610 l-18,12"/><path d="M278,598 l18,-10"/><path d="M338,622 l-16,10"/>
    </g>
    <text class="lbl" x="210" y="668">gas</text>
    <text class="tag" x="48" y="690">highest PE (particles furthest apart)</text>
    <text class="tag" x="48" y="708">large KE (fast, random motion)</text>
  </g>
</svg>
