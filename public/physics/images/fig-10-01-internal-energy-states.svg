<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .p { fill:#6FB7E0; opacity:0.32; stroke:#6FB7E0; stroke-width:1.4; }
    .bond { stroke:#9AA0A6; stroke-width:1.2; }
    .lbl { fill:#EAEAEA; font-size:13px; text-anchor:middle; }
    .tag { fill:#E8B65A; font-size:11px; }
    .cap { fill:#9AA0A6; font-size:11px; text-anchor:middle; }
    .box { fill:none; stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; }
  </style>

  <!-- SOLID: regular close-packed lattice, vibrating -->
  <g>
    <rect class="box" x="30" y="40" width="170" height="150" rx="6"/>
    <g class="p">
      <circle cx="70" cy="80" r="13"/><circle cx="105" cy="80" r="13"/><circle cx="140" cy="80" r="13"/><circle cx="175" cy="80" r="13"/>
      <circle cx="70" cy="115" r="13"/><circle cx="105" cy="115" r="13"/><circle cx="140" cy="115" r="13"/><circle cx="175" cy="115" r="13"/>
      <circle cx="70" cy="150" r="13"/><circle cx="105" cy="150" r="13"/><circle cx="140" cy="150" r="13"/><circle cx="175" cy="150" r="13"/>
    </g>
    <!-- vibration arrows -->
    <g stroke="#E58F8F" stroke-width="1.2" fill="none">
      <path d="M52,80 l-7,0 M198,80"/><path d="M55,80 l-8,0"/><path d="M53,150 l-8,0"/>
    </g>
    <text class="lbl" x="115" y="212">solid</text>
    <text class="cap" x="115" y="30">strong bonds, particles vibrate in fixed positions</text>
    <text class="tag" x="34" y="245">large PE (strong forces)</text>
    <text class="tag" x="34" y="262">small KE (vibration only)</text>
  </g>

  <!-- LIQUID: close but disordered, can slide -->
  <g>
    <rect class="box" x="245" y="40" width="170" height="150" rx="6"/>
    <g class="p">
      <circle cx="285" cy="90" r="13"/><circle cx="318" cy="78" r="13"/><circle cx="352" cy="92" r="13"/><circle cx="386" cy="80" r="13"/>
      <circle cx="300" cy="120" r="13"/><circle cx="336" cy="118" r="13"/><circle cx="372" cy="122" r="13"/>
      <circle cx="285" cy="152" r="13"/><circle cx="320" cy="150" r="13"/><circle cx="358" cy="154" r="13"/><circle cx="392" cy="150" r="13"/>
    </g>
    <g stroke="#86C98B" stroke-width="1.2" fill="none">
      <path d="M300,105 l14,-10"/><path d="M355,138 l14,8"/>
    </g>
    <text class="lbl" x="330" y="212">liquid</text>
    <text class="cap" x="330" y="30">particles close but free to move past one another</text>
    <text class="tag" x="249" y="245">some PE (weaker forces)</text>
    <text class="tag" x="249" y="262">moderate KE (moving)</text>
  </g>

  <!-- GAS: far apart, fast random -->
  <g>
    <rect class="box" x="460" y="40" width="210" height="150" rx="6"/>
    <g class="p">
      <circle cx="500" cy="75" r="13"/><circle cx="600" cy="70" r="13"/>
      <circle cx="545" cy="120" r="13"/><circle cx="635" cy="130" r="13"/>
      <circle cx="490" cy="160" r="13"/><circle cx="580" cy="165" r="13"/>
    </g>
    <g stroke="#E58F8F" stroke-width="1.3" fill="none" marker-end="url(#ar)">
      <path d="M500,75 l24,-12"/><path d="M600,70 l-22,-14"/><path d="M545,120 l26,10"/>
      <path d="M490,160 l-16,14"/><path d="M580,165 l22,-6"/>
    </g>
    <defs>
      <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#E58F8F"/>
      </marker>
    </defs>
    <text class="lbl" x="565" y="212">gas</text>
    <text class="cap" x="565" y="30">particles far apart, moving fast in all directions</text>
    <text class="tag" x="464" y="245">negligible PE (almost no forces)</text>
    <text class="tag" x="464" y="262">large KE (fast motion)</text>
  </g>
</svg>
