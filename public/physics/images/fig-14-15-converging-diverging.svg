<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .ray { stroke:#6FB7E0; stroke-width:1.8; fill:none; }
    .virt { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:5 4; fill:none; }
    .lens { fill:#6FB7E0; fill-opacity:0.20; stroke:#6FB7E0; stroke-width:1.6; }
    .axis { stroke:#9AA0A6; stroke-width:1; }
    .pf { fill:#E8B65A; }
  </style>
  <text x="180" y="28" text-anchor="middle" font-size="14" font-weight="bold">Converging (convex) lens</text>
  <text x="480" y="28" text-anchor="middle" font-size="14" font-weight="bold">Diverging (concave) lens</text>
  <!-- LEFT converging -->
  <line class="axis" x1="50" y1="160" x2="330" y2="160"/>
  <path class="lens" d="M180,100 Q208,160 180,220 Q152,160 180,100 Z"/>
  <path class="ray" d="M60,120 L180,120"/>
  <path class="ray" d="M60,160 L180,160"/>
  <path class="ray" d="M60,200 L180,200"/>
  <path class="ray" marker-end="url(#a2)" d="M180,120 L320,166"/>
  <path class="ray" marker-end="url(#a2)" d="M180,160 L320,160"/>
  <path class="ray" marker-end="url(#a2)" d="M180,200 L320,154"/>
  <circle class="pf" cx="300" cy="160" r="3.5"/>
  <text x="300" y="150" text-anchor="middle" font-size="12" fill="#E8B65A">F</text>
  <text x="180" y="248" text-anchor="middle" font-size="11">Parallel rays converge to F.</text>
  <!-- RIGHT diverging -->
  <line class="axis" x1="390" y1="160" x2="620" y2="160"/>
  <path class="lens" d="M462,100 Q476,160 462,220 L478,220 Q464,160 478,100 Z"/>
  <path class="ray" d="M395,120 L470,120"/>
  <path class="ray" d="M395,160 L470,160"/>
  <path class="ray" d="M395,200 L470,200"/>
  <path class="ray" marker-end="url(#a2)" d="M470,120 L560,80"/>
  <path class="ray" marker-end="url(#a2)" d="M470,160 L560,160"/>
  <path class="ray" marker-end="url(#a2)" d="M470,200 L560,240"/>
  <path class="virt" d="M470,120 L430,160"/>
  <path class="virt" d="M470,200 L430,160"/>
  <circle class="pf" cx="430" cy="160" r="3.5"/>
  <text x="430" y="150" text-anchor="middle" font-size="12" fill="#E8B65A">F</text>
  <text x="490" y="248" text-anchor="middle" font-size="11">Parallel rays diverge (from a virtual F).</text>
</svg>
