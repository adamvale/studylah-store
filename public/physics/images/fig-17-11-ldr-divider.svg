<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ahl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .res { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cellL { stroke:#EAEAEA; stroke-width:2; }
    .cellS { stroke:#EAEAEA; stroke-width:5; }
    .meter { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lbl { fill:#6FB7E0; font-style:italic; }
    .ldr { stroke:#E8B65A; stroke-width:2; fill:none; }
  </style>
  <!-- supply left (cell on vertical rail: horizontal plates) -->
  <text x="55" y="132" text-anchor="middle" font-size="11" class="lbl">V<tspan font-size="9">in</tspan></text>
  <path class="wire" d="M84,55 L84,116"/>
  <path class="wire" d="M84,132 L84,210"/>
  <line class="cellL" x1="66" y1="118" x2="102" y2="118"/>
  <line class="cellS" x1="76" y1="130" x2="92" y2="130"/>
  <path class="wire" d="M84,55 L355,55"/>
  <path class="wire" d="M84,210 L355,210"/>
  <!-- LDR top: circle enclosing a resistor with two inward arrows -->
  <circle class="res" cx="340" cy="95" r="20"/>
  <rect class="res" x="326" y="88" width="28" height="14"/>
  <line class="ldr" x1="392" y1="62" x2="360" y2="82" marker-end="url(#ahl)"/>
  <line class="ldr" x1="398" y1="82" x2="366" y2="98" marker-end="url(#ahl)"/>
  <text x="372" y="120" font-size="12" fill="#E8B65A">LDR</text>
  <path class="wire" d="M340,55 L340,75"/>
  <!-- R bottom -->
  <rect class="res" x="326" y="150" width="28" height="50"/>
  <text x="315" y="180" text-anchor="end" font-size="13" class="lbl">R</text>
  <path class="wire" d="M340,115 L340,150"/>
  <path class="wire" d="M340,200 L340,210"/>
  <!-- output across R -->
  <path class="wire" d="M340,132 L400,132"/>
  <circle cx="340" cy="132" r="3" fill="#EAEAEA"/>
  <circle class="meter" cx="420" cy="132" r="15"/>
  <text x="420" y="137" text-anchor="middle" font-size="12">V</text>
  <path class="wire" d="M435,132 L460,132 L460,210 L340,210"/>
  <text x="450" y="160" font-size="11" class="lbl">V<tspan font-size="9">out</tspan></text>
</svg>
