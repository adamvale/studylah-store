<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 290" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.8; }
    .line { fill:none; stroke:#6FB7E0; stroke-width:2.6; }
    .guide { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; }
    .lbl { font-size:13; }
  </style>
  <line data-step="1" class="axis" x1="70" y1="40" x2="70" y2="245" marker-end="url(#arw)"/>
  <line data-step="1" class="axis" x1="70" y1="245" x2="430" y2="245" marker-end="url(#arw)"/>
  <text data-step="1" x="70" y="30" text-anchor="middle" class="lbl">v (km/h)</text>
  <text data-step="1" x="440" y="260" text-anchor="end" class="lbl">t (s)</text>
  <text data-step="1" x="62" y="90" text-anchor="end" class="lbl">72</text>
  <line data-step="1" class="guide" x1="70" y1="85" x2="170" y2="85"/>
  <!-- x ticks 8, 18, 24 (uniform 12.5 units per second) -->
  <text data-step="1" x="170" y="262" text-anchor="middle" class="lbl">8</text>
  <text data-step="1" x="295" y="262" text-anchor="middle" class="lbl">18</text>
  <text data-step="1" x="370" y="262" text-anchor="middle" class="lbl">24</text>
  <!-- trapezoid: 0-8 rise, 8-18 flat, 18-24 fall -->
  <path data-step="2" class="line" d="M70,245 L170,85 L295,85 L370,245"/>
</svg>
