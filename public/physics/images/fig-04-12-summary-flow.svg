<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .node { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.4; }
    .node2 { fill:#E8B65A; opacity:0.16; stroke:#E8B65A; stroke-width:1.4; }
    .link { stroke:#9AA0A6; stroke-width:1.4; fill:none; }
    .t { font-size:13.5; }
    .m { font-size:12.5; fill:#9AA0A6; }
  </style>
  <!-- Balanced -->
  <rect class="node" x="140" y="20" width="160" height="44" rx="6"/>
  <text x="220" y="47" text-anchor="middle" class="t">Balanced force</text>
  <line class="link" x1="220" y1="64" x2="220" y2="90" marker-end="url(#arw)"/>
  <rect class="node" x="110" y="92" width="220" height="60" rx="6"/>
  <text x="220" y="117" text-anchor="middle" class="t">zero acceleration</text>
  <text x="220" y="138" text-anchor="middle" class="m">(0 m/s&#178;), object may be</text>
  <line class="link" x1="170" y1="152" x2="115" y2="182" marker-end="url(#arw)"/>
  <line class="link" x1="270" y1="152" x2="325" y2="182" marker-end="url(#arw)"/>
  <text x="110" y="205" text-anchor="middle" class="t">at rest / stationary</text>
  <text x="320" y="205" text-anchor="middle" class="t">moving at</text>
  <text x="320" y="223" text-anchor="middle" class="t">constant velocity</text>
  <!-- Unbalanced -->
  <rect class="node2" x="130" y="270" width="180" height="44" rx="6"/>
  <text x="220" y="297" text-anchor="middle" class="t">Unbalanced force</text>
  <line class="link" x1="220" y1="314" x2="220" y2="340" marker-end="url(#arw)"/>
  <rect class="node2" x="110" y="342" width="220" height="60" rx="6"/>
  <text x="220" y="367" text-anchor="middle" class="t">acceleration a m/s&#178;</text>
  <text x="220" y="388" text-anchor="middle" class="m">a is affected by</text>
  <line class="link" x1="170" y1="402" x2="115" y2="432" marker-end="url(#arw)"/>
  <line class="link" x1="270" y1="402" x2="325" y2="432" marker-end="url(#arw)"/>
  <text x="110" y="455" text-anchor="middle" class="t">mass of the object</text>
  <text x="330" y="455" text-anchor="middle" class="t">resultant force</text>
  <text x="330" y="473" text-anchor="middle" class="t">on the object</text>
</svg>
