<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .node { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.4; }
    .node2 { fill:#E8B65A; opacity:0.16; stroke:#E8B65A; stroke-width:1.4; }
    .link { stroke:#9AA0A6; stroke-width:1.4; fill:none; }
    .t { font-size:12.5; }
    .m { font-size:11.5; fill:#9AA0A6; }
  </style>
  <!-- Balanced -->
  <rect class="node" x="20" y="40" width="120" height="46" rx="6"/>
  <text x="80" y="68" text-anchor="middle" class="t">Balanced force</text>
  <line class="link" x1="140" y1="63" x2="230" y2="63" marker-end="url(#arw)"/>
  <rect class="node" x="230" y="40" width="150" height="46" rx="6"/>
  <text x="305" y="60" text-anchor="middle" class="t">zero acceleration</text>
  <text x="305" y="77" text-anchor="middle" class="m">(0 m/s&#178;), object may be</text>
  <line class="link" x1="380" y1="52" x2="450" y2="35" marker-end="url(#arw)"/>
  <line class="link" x1="380" y1="74" x2="450" y2="92" marker-end="url(#arw)"/>
  <text x="460" y="40" class="t">at rest / stationary</text>
  <text x="460" y="97" class="t">moving at constant velocity</text>
  <!-- Unbalanced -->
  <rect class="node2" x="20" y="190" width="120" height="46" rx="6"/>
  <text x="80" y="218" text-anchor="middle" class="t">Unbalanced force</text>
  <line class="link" x1="140" y1="213" x2="230" y2="213" marker-end="url(#arw)"/>
  <rect class="node2" x="230" y="190" width="150" height="46" rx="6"/>
  <text x="305" y="210" text-anchor="middle" class="t">acceleration a m/s&#178;</text>
  <text x="305" y="227" text-anchor="middle" class="m">a is affected by</text>
  <line class="link" x1="380" y1="202" x2="450" y2="185" marker-end="url(#arw)"/>
  <line class="link" x1="380" y1="224" x2="450" y2="242" marker-end="url(#arw)"/>
  <text x="460" y="190" class="t">mass of the object</text>
  <text x="460" y="247" class="t">resultant force on the object</text>
</svg>
