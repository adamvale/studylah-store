<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; marker-end:url(#aw); }
    .curve { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .guide { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; }
    .lbl { font-size:12px; }
    .tick { font-size:11px; fill:#9AA0A6; text-anchor:middle; }
  </style>
  <defs>
    <marker id="aw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#EAEAEA"/></marker>
  </defs>

  <!-- axes -->
  <line class="axis" x1="70" y1="160" x2="580" y2="160"/>
  <line class="axis" x1="70" y1="285" x2="70" y2="40"/>
  <text class="lbl" x="24" y="70">e.m.f. / V</text>
  <text class="lbl" x="560" y="182">time, t</text>

  <!-- max / min markers -->
  <line class="guide" x1="66" y1="70" x2="530" y2="70"/>
  <line class="guide" x1="66" y1="250" x2="530" y2="250"/>
  <text class="lbl" x="34" y="74" fill="#E8B65A">&#603;&#8320;</text>
  <text class="lbl" x="24" y="254" fill="#E8B65A">&#8722;&#603;&#8320;</text>

  <!-- vertical guides -->
  <line class="guide" x1="185" y1="70" x2="185" y2="250"/>
  <line class="guide" x1="300" y1="60" x2="300" y2="270"/>
  <line class="guide" x1="415" y1="70" x2="415" y2="250"/>
  <line class="guide" x1="530" y1="60" x2="530" y2="270"/>
  <text class="tick" x="185" y="300">0.25T</text>
  <text class="tick" x="300" y="300">0.5T</text>
  <text class="tick" x="415" y="300">0.75T</text>
  <text class="tick" x="530" y="300">T</text>

  <!-- one full sine -->
  <path class="curve" d="M70,160 C 130,160 130,70 185,70 C 240,70 240,160 300,160 C 360,160 360,250 415,250 C 470,250 470,160 530,160"/>

  <!-- one revolution bracket -->
  <path class="guide" d="M70,50 L530,50"/>
  <text class="lbl" x="300" y="44" text-anchor="middle">one revolution</text>

  <!-- coil orientation notes -->
  <text x="70" y="330" font-size="11" fill="#86C98B" text-anchor="middle">coil vertical</text>
  <text x="70" y="344" font-size="11" fill="#86C98B" text-anchor="middle">(e.m.f. = 0)</text>
  <text x="185" y="330" font-size="11" fill="#E8B65A" text-anchor="middle">coil horizontal</text>
  <text x="185" y="344" font-size="11" fill="#E8B65A" text-anchor="middle">(e.m.f. max)</text>
</svg>
