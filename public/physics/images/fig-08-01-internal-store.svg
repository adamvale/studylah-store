<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .particle { fill:#6FB7E0; opacity:0.32; stroke:#6FB7E0; stroke-width:1.6; }
    .bond { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:5 4; fill:none; }
    .vib { stroke:#86C98B; stroke-width:1.6; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { font-size:13px; }
    .amber { fill:#E8B65A; }
  </style>
  <!-- four particles in a square -->
  <!-- centres -->
  <!-- top-left (200,90) top-right (330,90) bottom-left (200,210) bottom-right (330,210) -->
  <line class="bond" x1="200" y1="90" x2="330" y2="90"/>
  <line class="bond" x1="200" y1="210" x2="330" y2="210"/>
  <line class="bond" x1="200" y1="90" x2="200" y2="210"/>
  <line class="bond" x1="330" y1="90" x2="330" y2="210"/>
  <line class="bond" x1="200" y1="90" x2="330" y2="210"/>
  <line class="bond" x1="330" y1="90" x2="200" y2="210"/>

  <!-- particles -->
  <g>
    <circle class="particle" cx="200" cy="90" r="17"/>
    <circle class="particle" cx="330" cy="90" r="17"/>
    <circle class="particle" cx="200" cy="210" r="17"/>
    <circle class="particle" cx="330" cy="210" r="17"/>
  </g>
  <!-- vibration marks (small arcs) beside each particle -->
  <g class="vib">
    <path d="M176,78 q-8,12 0,24"/>
    <path d="M354,78 q8,12 0,24"/>
    <path d="M176,198 q-8,12 0,24"/>
    <path d="M354,198 q8,12 0,24"/>
  </g>

  <!-- labels -->
  <text class="lbl amber" x="70" y="70">particle</text>
  <path class="lead" d="M120,66 L183,86"/>

  <text class="lbl amber" x="395" y="72">kinetic store</text>
  <text class="lbl" x="395" y="88" font-size="11">(due to vibration)</text>
  <path class="lead" d="M390,72 L350,84"/>

  <text class="lbl amber" x="395" y="150">potential energy store</text>
  <text class="lbl" x="395" y="166" font-size="11">(due to attractive force)</text>
  <path class="lead" d="M390,150 L335,150"/>

  <text class="lbl amber" x="40" y="200">attractive</text>
  <text class="lbl amber" x="40" y="216">force</text>
  <path class="lead" d="M100,206 L200,150"/>

  <!-- caption -->
  <text x="280" y="290" text-anchor="middle" font-size="13">internal store = kinetic store + potential energy store</text>
</svg>
