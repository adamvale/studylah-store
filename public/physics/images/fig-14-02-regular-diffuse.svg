<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:1.8; fill:none; }
    .out { stroke:#6FB7E0; stroke-width:1.8; fill:none; }
    .smooth { stroke:#EAEAEA; stroke-width:2.4; }
    .rough { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .norm { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 4; }
  </style>
  <text x="160" y="26" text-anchor="middle" font-size="14" font-weight="bold">Regular reflection</text>
  <text x="480" y="26" text-anchor="middle" font-size="14" font-weight="bold">Diffuse (irregular) reflection</text>
  <!-- Regular: smooth flat surface, parallel reflected rays -->
  <line class="smooth" x1="60" y1="200" x2="270" y2="200"/>
  <!-- three parallel incident rays hitting flat surface, all reflect parallel -->
  <path class="inc" marker-end="url(#a1)" d="M70,70 L120,198"/>
  <path class="inc" marker-end="url(#a1)" d="M140,70 L190,198"/>
  <path class="inc" marker-end="url(#a1)" d="M210,70 L260,198"/>
  <path class="out" marker-end="url(#a2)" d="M120,200 L170,72"/>
  <path class="out" marker-end="url(#a2)" d="M190,200 L240,72"/>
  <path class="out" marker-end="url(#a2)" d="M260,200 L310,72"/>
  <text x="165" y="245" text-anchor="middle" font-size="12">Smooth surface: reflected rays</text>
  <text x="165" y="262" text-anchor="middle" font-size="12">stay parallel.</text>
  <!-- Diffuse: rough surface, scattered rays -->
  <path class="rough" d="M380,205 L410,192 L440,208 L470,190 L500,206 L530,193 L560,205 L590,191"/>
  <path class="inc" marker-end="url(#a1)" d="M400,70 L423,196"/>
  <path class="inc" marker-end="url(#a1)" d="M460,70 L468,196"/>
  <path class="inc" marker-end="url(#a1)" d="M520,70 L533,196"/>
  <path class="out" marker-end="url(#a2)" d="M425,196 L470,74"/>
  <path class="out" marker-end="url(#a2)" d="M468,196 L560,90"/>
  <path class="out" marker-end="url(#a2)" d="M533,196 L505,72"/>
  <text x="485" y="245" text-anchor="middle" font-size="12">Rough surface: reflected rays</text>
  <text x="485" y="262" text-anchor="middle" font-size="12">scatter in different directions.</text>
</svg>
