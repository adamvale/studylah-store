<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 700" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .sphere { fill:#9AA0A6; opacity:0.2; stroke:#EAEAEA; stroke-width:1.5; }
    .stand { fill:none; stroke:#9AA0A6; stroke-width:1.5; }
    .rodn { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.4; }
    .posq { fill:#E58F8F; font-size:14px; text-anchor:middle; }
    .neg { fill:#6FB7E0; font-size:15px; text-anchor:middle; }
    .hd { font-size:14px; font-weight:bold; }
  </style>
  <!-- STEP 1 -->
  <text x="30" y="40" class="hd">1. Two neutral spheres touching</text>
  <circle class="sphere" cx="195" cy="125" r="35"/>
  <circle class="sphere" cx="265" cy="125" r="35"/>
  <text class="posq" x="183" y="122">+</text><text class="neg" x="207" y="122">−</text>
  <text class="neg" x="253" y="122">−</text><text class="posq" x="277" y="122">+</text>
  <line class="stand" x1="195" y1="160" x2="195" y2="190"/><rect x="180" y="190" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <line class="stand" x1="265" y1="160" x2="265" y2="190"/><rect x="250" y="190" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <text x="30" y="225">neutral, on insulating stands</text>
  <!-- STEP 2 -->
  <text x="30" y="275" class="hd">2. Negative rod brought near the left sphere</text>
  <rect class="rodn" x="45" y="340" width="110" height="18" rx="5"/>
  <text class="neg" x="70" y="354">−</text><text class="neg" x="100" y="354">−</text><text class="neg" x="130" y="354">−</text>
  <circle class="sphere" cx="240" cy="350" r="35"/>
  <circle class="sphere" cx="310" cy="350" r="35"/>
  <text class="posq" x="215" y="345">+</text><text class="posq" x="222" y="365">+</text><text class="posq" x="228" y="332">+</text>
  <text class="neg" x="335" y="345">−</text><text class="neg" x="328" y="365">−</text><text class="neg" x="322" y="332">−</text>
  <line class="stand" x1="240" y1="385" x2="240" y2="415"/><rect x="225" y="415" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <line class="stand" x1="310" y1="385" x2="310" y2="415"/><rect x="295" y="415" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <text x="30" y="450">electrons are pushed to the far sphere</text>
  <!-- STEP 3 -->
  <text x="30" y="500" class="hd">3. Separate the spheres, then remove the rod</text>
  <circle class="sphere" cx="150" cy="575" r="35"/>
  <text class="posq" x="136" y="570">+</text><text class="posq" x="164" y="570">+</text><text class="posq" x="150" y="595">+</text>
  <line class="stand" x1="150" y1="610" x2="150" y2="640"/><rect x="135" y="640" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <circle class="sphere" cx="320" cy="575" r="35"/>
  <text class="neg" x="306" y="570">−</text><text class="neg" x="334" y="570">−</text><text class="neg" x="320" y="595">−</text>
  <line class="stand" x1="320" y1="610" x2="320" y2="640"/><rect x="305" y="640" width="30" height="7" fill="#9AA0A6" opacity="0.4"/>
  <text x="30" y="678">the spheres carry equal but opposite charges</text>
</svg>
