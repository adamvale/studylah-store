<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .glass { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.4; }
    .norm { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- glass block (medium B) from y=170 to y=270 -->
  <rect class="glass" x="110" y="170" width="360" height="100"/>
  <!-- boundary line at y=170 -->
  <line x1="110" y1="170" x2="470" y2="170" stroke="#EAEAEA" stroke-width="1.6"/>
  <!-- normal through P(300,170) -->
  <path class="norm" d="M300,80 L300,330"/>
  <text x="300" y="72" text-anchor="middle" font-size="11">normal</text>
  <!-- incident ray i=45 in air -->
  <path class="inc" marker-end="url(#a1)" d="M215,85 L298,168"/>
  <text x="150" y="120" font-size="12" fill="#E8B65A">incident ray</text>
  <!-- refracted ray r=28 in glass (bends toward normal) exiting bottom at (353,270) -->
  <path class="ref" marker-end="url(#a2)" d="M300,170 L352,268"/>
  <text x="360" y="235" font-size="12" fill="#6FB7E0">refracted ray</text>
  <!-- emergent ray below, parallel to incident -->
  <path class="ref" marker-end="url(#a2)" d="M353,270 L423,340"/>
  <text x="430" y="330" font-size="12" fill="#6FB7E0">emergent ray</text>
  <!-- angle arcs -->
  <path class="arc" d="M300,120 A50,50 0 0,0 265,135"/>
  <text x="270" y="128" font-size="13" font-style="italic">i</text>
  <path class="arc" d="M300,220 A50,50 0 0,1 326,213"/>
  <text x="316" y="215" font-size="13" font-style="italic">r</text>
  <text x="455" y="150" font-size="11">air (less dense)</text>
  <text x="455" y="200" font-size="11">glass (denser)</text>
</svg>
