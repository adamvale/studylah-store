<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah4" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .sym { font-size:20px; text-anchor:middle; }
    .pos { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.8; }
    .tc  { fill:#E8B65A; opacity:0.25; stroke:#E8B65A; stroke-width:1.5; }
    .mv  { stroke:#E8B65A; stroke-width:2; }
  </style>
  <!-- Panel 1: positive test charge repelled by + (moves away) -->
  <text x="170" y="30" text-anchor="middle" font-size="14">Near a positive charge</text>
  <circle cx="120" cy="140" r="26" class="pos"/><text x="120" y="148" class="sym" fill="#E58F8F">+</text>
  <circle cx="215" cy="140" r="11" class="tc"/><text x="215" y="145" text-anchor="middle" font-size="12" fill="#E8B65A">+</text>
  <line class="mv" x1="230" y1="140" x2="275" y2="140" marker-end="url(#ah4)"/>
  <text x="222" y="175" font-size="12" fill="#E8B65A">moves away</text>
  <text x="170" y="225" text-anchor="middle" font-size="12" fill="#9AA0A6">positive test charge repelled</text>
  <!-- Panel 2: positive test charge attracted to - (moves towards) -->
  <text x="170" y="290" text-anchor="middle" font-size="14">Near a negative charge</text>
  <circle cx="120" cy="390" r="26" class="neg"/><text x="120" y="398" class="sym" fill="#6FB7E0">−</text>
  <circle cx="215" cy="390" r="11" class="tc"/><text x="215" y="395" text-anchor="middle" font-size="12" fill="#E8B65A">+</text>
  <line class="mv" x1="200" y1="390" x2="160" y2="390" marker-end="url(#ah4)"/>
  <text x="185" y="425" font-size="12" fill="#E8B65A">moves towards</text>
  <text x="170" y="475" text-anchor="middle" font-size="12" fill="#9AA0A6">positive test charge attracted</text>
</svg>
