<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah4" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .sym { font-size:20px; text-anchor:middle; }
    .pos { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.8; }
    .tc  { fill:#E8B65A; opacity:0.25; stroke:#E8B65A; stroke-width:1.5; }
    .mv  { stroke:#E8B65A; stroke-width:2; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
  </style>
  <!-- LEFT: positive test charge repelled by + (moves away) -->
  <text x="150" y="30" text-anchor="middle" font-size="13">Near a positive charge</text>
  <circle cx="150" cy="150" r="26" class="pos"/><text x="150" y="158" class="sym" fill="#E58F8F">+</text>
  <circle cx="245" cy="150" r="11" class="tc"/><text x="245" y="155" text-anchor="middle" font-size="12" fill="#E8B65A">+</text>
  <line class="mv" x1="260" y1="150" x2="300" y2="150" marker-end="url(#ah4)"/>
  <text x="255" y="185" font-size="11" fill="#E8B65A">moves away</text>
  <text x="150" y="245" text-anchor="middle" font-size="11" fill="#9AA0A6">test charge repelled</text>

  <!-- RIGHT: positive test charge attracted to - (moves towards) -->
  <text x="430" y="30" text-anchor="middle" font-size="13">Near a negative charge</text>
  <circle cx="430" cy="150" r="26" class="neg"/><text x="430" y="158" class="sym" fill="#6FB7E0">&#8722;</text>
  <circle cx="525" cy="150" r="11" class="tc"/><text x="525" y="155" text-anchor="middle" font-size="12" fill="#E8B65A">+</text>
  <line class="mv" x1="510" y1="150" x2="470" y2="150" marker-end="url(#ah4)"/>
  <text x="470" y="185" font-size="11" fill="#E8B65A">moves towards</text>
  <text x="430" y="245" text-anchor="middle" font-size="11" fill="#9AA0A6">test charge attracted</text>
</svg>
