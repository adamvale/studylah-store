<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .beaker { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .liq { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.2; }
    .liq2 { fill:#86C98B; opacity:0.28; stroke:#86C98B; stroke-width:1.2; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .tag { fill:#E8B65A; }
  </style>
  <!-- Beaker 1: water -->
  <g>
    <path class="beaker" d="M70,60 L70,180 Q70,195 90,195 L150,195 Q170,195 170,180 L170,60"/>
    <rect class="liq" x="72" y="150" width="96" height="43"/>
    <g stroke="#6FB7E0" stroke-width="1"><line x1="80" y1="160" x2="160" y2="160"/><line x1="80" y1="172" x2="160" y2="172"/><line x1="80" y1="184" x2="160" y2="184"/></g>
    <text class="tag" x="18" y="168">water</text>
    <text x="12" y="185" font-size="12">at 70&#176;C</text>
  </g>
  <!-- Beaker 2: ethanol -->
  <g>
    <path class="beaker" d="M300,60 L300,180 Q300,195 320,195 L380,195 Q400,195 400,180 L400,60"/>
    <rect class="liq2" x="302" y="150" width="96" height="43"/>
    <g stroke="#86C98B" stroke-width="1"><line x1="310" y1="160" x2="390" y2="160"/><line x1="310" y1="172" x2="390" y2="172"/><line x1="310" y1="184" x2="390" y2="184"/></g>
    <text class="tag" x="412" y="168">ethanol</text>
    <text x="412" y="185" font-size="12">at 15&#176;C</text>
  </g>
</svg>
