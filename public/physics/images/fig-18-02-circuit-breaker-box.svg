<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .unit { fill:#6FB7E0; opacity:0.14; stroke:#6FB7E0; stroke-width:1.5; }
    .switch { fill:#E8B65A; opacity:0.18; stroke:#E8B65A; stroke-width:1.5; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; }
    .amber { fill:#E8B65A; }
    .sym { stroke:#EAEAEA; stroke-width:2; fill:none; }
  </style>
  <!-- consumer unit outer box -->
  <rect class="box" x="120" y="70" width="400" height="120" rx="4"/>
  <!-- main switch -->
  <rect class="switch" x="140" y="90" width="60" height="80" rx="3"/>
  <text x="170" y="135" text-anchor="middle" font-size="11">MAIN</text>
  <!-- MCB row -->
  <g>
    <rect class="unit" x="230" y="90" width="34" height="80" rx="2"/>
    <rect class="unit" x="272" y="90" width="34" height="80" rx="2"/>
    <rect class="unit" x="314" y="90" width="34" height="80" rx="2"/>
    <rect class="unit" x="356" y="90" width="34" height="80" rx="2"/>
  </g>
  <!-- ELCB -->
  <rect class="unit" x="420" y="90" width="80" height="80" rx="2" stroke="#86C98B" style="stroke:#86C98B"/>
  <text x="460" y="135" text-anchor="middle" font-size="11" style="fill:#86C98B">ELCB</text>

  <!-- callout: main switch -->
  <line class="lead" x1="170" y1="70" x2="170" y2="40"/>
  <text x="170" y="30" text-anchor="middle" font-size="12" class="amber">main switch</text>
  <!-- callout: MCB -->
  <line class="lead" x1="290" y1="70" x2="290" y2="40"/>
  <text x="300" y="30" text-anchor="middle" font-size="12">miniature circuit breakers (MCB)</text>
  <!-- callout: ELCB -->
  <line class="lead" x1="460" y1="190" x2="460" y2="220"/>
  <text x="460" y="238" text-anchor="middle" font-size="12" style="fill:#86C98B">earth leakage circuit</text>
  <text x="460" y="254" text-anchor="middle" font-size="12" style="fill:#86C98B">breaker (ELCB)</text>

  <!-- circuit breaker symbol -->
  <text x="300" y="290" text-anchor="middle" font-size="12">circuit-breaker symbol</text>
  <line class="sym" x1="230" y1="305" x2="270" y2="305"/>
  <path class="sym" d="M270,305 A26 26 0 0 1 330 305"/>
  <line class="sym" x1="330" y1="305" x2="370" y2="305"/>
  <circle cx="270" cy="305" r="3" class="amber"/>
</svg>
