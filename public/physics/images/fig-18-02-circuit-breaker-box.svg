<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 330" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .unit { fill:#6FB7E0; opacity:0.14; stroke:#6FB7E0; stroke-width:1.5; }
    .switch { fill:#E8B65A; opacity:0.18; stroke:#E8B65A; stroke-width:1.5; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; }
    .amber { fill:#E8B65A; }
    .sym { stroke:#EAEAEA; stroke-width:2; fill:none; }
  </style>
  <!-- consumer unit outer box -->
  <rect class="box" x="120" y="80" width="400" height="120" rx="4"/>
  <!-- main switch -->
  <rect class="switch" x="140" y="100" width="60" height="80" rx="3"/>
  <text x="170" y="145" text-anchor="middle" font-size="13">MAIN</text>
  <!-- MCB row -->
  <g>
    <rect class="unit" x="230" y="100" width="34" height="80" rx="2"/>
    <rect class="unit" x="272" y="100" width="34" height="80" rx="2"/>
    <rect class="unit" x="314" y="100" width="34" height="80" rx="2"/>
    <rect class="unit" x="356" y="100" width="34" height="80" rx="2"/>
  </g>
  <!-- ELCB -->
  <rect class="unit" x="420" y="100" width="80" height="80" rx="2" stroke="#86C98B" style="stroke:#86C98B"/>
  <text x="460" y="145" text-anchor="middle" font-size="13" style="fill:#86C98B">ELCB</text>

  <!-- callout: MCB (upper line) -->
  <line class="lead" x1="290" y1="80" x2="290" y2="36"/>
  <text x="300" y="26" text-anchor="middle" font-size="15">miniature circuit breakers (MCB)</text>
  <!-- callout: main switch (lower line, staggered to avoid overlap) -->
  <line class="lead" x1="170" y1="80" x2="170" y2="62"/>
  <text x="170" y="54" text-anchor="middle" font-size="15" class="amber">main switch</text>
  <!-- callout: ELCB -->
  <line class="lead" x1="460" y1="200" x2="460" y2="226"/>
  <text x="460" y="244" text-anchor="middle" font-size="14.5" style="fill:#86C98B">earth leakage circuit</text>
  <text x="460" y="262" text-anchor="middle" font-size="14.5" style="fill:#86C98B">breaker (ELCB)</text>

  <!-- circuit breaker symbol -->
  <text x="300" y="296" text-anchor="middle" font-size="14.5">circuit-breaker symbol</text>
  <line class="sym" x1="230" y1="313" x2="270" y2="313"/>
  <path class="sym" d="M270,313 A26 26 0 0 1 330 313"/>
  <line class="sym" x1="330" y1="313" x2="370" y2="313"/>
  <circle cx="270" cy="313" r="3" class="amber"/>
</svg>
