<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .view { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .smoke { fill:#6FB7E0; opacity:0.6; stroke:#6FB7E0; stroke-width:1.6; }
    .air { fill:#EAEAEA; }
    .hit { stroke:#E58F8F; stroke-width:1.5; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { font-size:12px; }
    .amber { fill:#E8B65A; }
  </style>
  <circle class="view" cx="200" cy="160" r="130"/>

  <!-- large smoke particle in centre -->
  <circle class="smoke" cx="200" cy="160" r="24"/>

  <!-- tiny air molecules around, with arrows showing collisions -->
  <g class="air">
    <circle cx="140" cy="110" r="4"/>
    <circle cx="255" cy="105" r="4"/>
    <circle cx="285" cy="185" r="4"/>
    <circle cx="150" cy="215" r="4"/>
    <circle cx="120" cy="165" r="4"/>
    <circle cx="230" cy="240" r="4"/>
    <circle cx="205" cy="80" r="4"/>
  </g>
  <!-- collision arrows pointing toward the smoke particle -->
  <g class="hit">
    <path d="M148,118 L178,145" marker-end="url(#h)"/>
    <path d="M247,113 L218,143" marker-end="url(#h)"/>
    <path d="M277,180 L222,167" marker-end="url(#h)"/>
    <path d="M158,208 L182,178" marker-end="url(#h)"/>
    <path d="M128,163 L176,161" marker-end="url(#h)"/>
    <path d="M223,232 L208,184" marker-end="url(#h)"/>
    <path d="M205,88 L200,136" marker-end="url(#h)"/>
  </g>

  <text class="lbl" x="200" y="308" text-anchor="middle" font-style="italic" fill="#9AA0A6">enlarged view</text>

  <text class="lbl amber" x="345" y="90">air molecules</text>
  <text class="lbl" x="345" y="106" font-size="11">(tiny, invisible)</text>
  <path class="lead" d="M340,96 L262,105"/>

  <text class="lbl amber" x="345" y="200">smoke particle</text>
  <text class="lbl" x="345" y="216" font-size="11">(large, visible)</text>
  <path class="lead" d="M340,206 L226,175"/>

  <defs>
    <marker id="h" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#E58F8F" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
