<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 820" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .mag { fill:#E58F8F; opacity:0.26; stroke:#EAEAEA; stroke-width:1.5; }
    .iron { fill:#9AA0A6; opacity:0.28; stroke:#EAEAEA; stroke-width:1.5; }
    .plastic { fill:#E8B65A; opacity:0.22; stroke:#EAEAEA; stroke-width:1.5; }
    .nail { stroke:#EAEAEA; stroke-width:2; }
    .lbl { fill:#E8B65A; font-size:14px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .cap { font-size:16px; font-weight:bold; }
  </style>

  <!-- X: magnet alone -->
  <text data-step="1" x="40" y="34" class="cap">X</text>
  <rect data-step="1" class="mag" x="70" y="50" width="44" height="120" rx="3"/>
  <g data-step="1" class="nail">
    <line x1="92" y1="170" x2="74" y2="225"/>
    <line x1="92" y1="170" x2="84" y2="235"/>
    <line x1="92" y1="170" x2="92" y2="240"/>
    <line x1="92" y1="170" x2="100" y2="235"/>
    <line x1="92" y1="170" x2="110" y2="225"/>
  </g>
  <text data-step="1" x="140" y="110" class="lbl">bar magnet only</text>
  <path data-step="1" class="lead" d="M136,106 L116,106"/>

  <!-- Y: magnet + iron block -->
  <text data-step="2" x="40" y="294" class="cap">Y</text>
  <rect data-step="2" class="mag" x="70" y="310" width="44" height="90" rx="3"/>
  <rect data-step="2" class="iron" x="70" y="400" width="44" height="34" rx="2"/>
  <g data-step="2" class="nail">
    <line x1="92" y1="434" x2="74" y2="489"/>
    <line x1="92" y1="434" x2="84" y2="499"/>
    <line x1="92" y1="434" x2="92" y2="504"/>
    <line x1="92" y1="434" x2="100" y2="499"/>
    <line x1="92" y1="434" x2="110" y2="489"/>
  </g>
  <text data-step="2" x="140" y="350" class="lbl">bar magnet</text>
  <path data-step="2" class="lead" d="M136,346 L116,346"/>
  <text data-step="2" x="140" y="422" class="lbl">iron block</text>
  <path data-step="2" class="lead" d="M136,418 L116,418"/>

  <!-- Z: magnet + plastic block -->
  <text data-step="3" x="40" y="554" class="cap">Z</text>
  <rect data-step="3" class="mag" x="70" y="570" width="44" height="90" rx="3"/>
  <rect data-step="3" class="plastic" x="70" y="660" width="44" height="34" rx="2"/>
  <g data-step="3" class="nail">
    <line x1="92" y1="694" x2="80" y2="740"/>
    <line x1="92" y1="694" x2="104" y2="740"/>
  </g>
  <text data-step="3" x="140" y="610" class="lbl">bar magnet</text>
  <path data-step="3" class="lead" d="M136,606 L116,606"/>
  <text data-step="3" x="140" y="682" class="lbl">plastic block</text>
  <path data-step="3" class="lead" d="M136,678 L116,678"/>

  <text data-step="3" x="180" y="782" text-anchor="middle" font-size="14">Each magnet is held vertically; iron nails</text>
  <text data-step="3" x="180" y="800" text-anchor="middle" font-size="14">are collected at the lower end.</text>
</svg>
