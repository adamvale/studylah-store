<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 285" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .tube { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .liq { fill:#6FB7E0; opacity:0.30; }
    .box { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .level { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:5 3; }
    .height { stroke:#E8B65A; stroke-width:1.6; }
    .hdash { stroke:#E8B65A; stroke-width:1; stroke-dasharray:3 3; }
    .arrow { stroke:#E58F8F; stroke-width:2; }
    .lbl { font-size:12px; }
  </style>
  <!-- gas supply box -->
  <rect data-step="1" class="box" x="30" y="88" width="80" height="50"/>
  <text data-step="1" x="70" y="108" text-anchor="middle" class="lbl">gas</text>
  <text data-step="1" x="70" y="124" text-anchor="middle" class="lbl">supply</text>

  <!-- U-tube: closed pipe from gas into left limb, open right limb -->
  <path data-step="2" class="liq" d="M150,180 L150,230 Q150,258 178,258 L272,258 Q300,258 300,230 L300,150 L280,150 L280,230 Q280,238 272,238 L178,238 Q170,238 170,230 L170,180 Z"/>
  <path data-step="2" class="tube" d="M110,106 L150,106 L150,230 Q150,258 178,258 L272,258 Q300,258 300,230 L300,88"/>
  <path data-step="2" class="tube" d="M110,126 L170,126 L170,230 Q170,238 178,238 L272,238 Q280,238 280,230 L280,88"/>

  <!-- atmosphere at open right limb -->
  <line data-step="3" class="arrow" x1="290" y1="64" x2="290" y2="84" marker-end="url(#ma)"/>
  <text data-step="3" x="302" y="78" class="lbl">P_atm</text>
  <!-- gas pressure pushes the left surface down -->
  <text data-step="4" x="116" y="100" class="lbl">P_gas</text>

  <!-- X and Y at the same level (level of the lower surface) -->
  <line data-step="5" class="level" x1="150" y1="180" x2="300" y2="180"/>
  <circle data-step="5" cx="160" cy="180" r="3.5" fill="#E8B65A"/>
  <circle data-step="5" cx="290" cy="180" r="3.5" fill="#E8B65A"/>
  <text data-step="5" x="132" y="185" class="lbl">X</text>
  <text data-step="5" x="310" y="185" class="lbl">Y</text>

  <!-- height difference h on the open side -->
  <line data-step="6" class="hdash" x1="300" y1="150" x2="325" y2="150"/>
  <line data-step="6" class="height" x1="320" y1="150" x2="320" y2="180"/>
  <line data-step="6" class="height" x1="315" y1="150" x2="325" y2="150"/>
  <line data-step="6" class="height" x1="315" y1="180" x2="325" y2="180"/>
  <text data-step="6" x="330" y="170" class="lbl" fill="#E8B65A">h</text>

  <text data-step="6" x="230" y="277" text-anchor="middle" class="lbl">Same level X, Y &#8594; same pressure.  P_gas = P_atm + h&#961;g</text>
  <defs>
    <marker id="ma" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#E58F8F"/></marker>
  </defs>
</svg>
