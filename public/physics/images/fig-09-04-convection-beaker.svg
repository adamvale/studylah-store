<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .beaker { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .fluid { fill:#6FB7E0; opacity:0.14; }
    .loop { stroke:#6FB7E0; stroke-width:2.2; fill:none; }
    .rise { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .sink { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .heat { stroke:#E8B65A; stroke-width:2.4; fill:none; }
    .num { fill:#E8B65A; font-size:14px; font-weight:bold; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .lbl { fill:#E8B65A; }
  </style>
  <!-- beaker -->
  <path data-step="1" class="fluid" d="M110,70 L110,240 L300,240 L300,70 Z"/>
  <path data-step="1" class="beaker" d="M100,60 L110,70 L110,240 L300,240 L300,70 L310,60"/>
  <!-- convection loop (rise in centre-left over heat, sink at right) -->
  <path data-step="2" class="rise" d="M175,235 C165,180 165,120 185,95"/>
  <path data-step="2" class="rise" d="M178,110 L185,92 L194,108"/>
  <path data-step="2" class="sink" d="M235,95 C265,120 265,190 240,232"/>
  <path data-step="2" class="sink" d="M232,220 L240,236 L249,221"/>
  <!-- top and bottom connectors -->
  <path data-step="3" class="loop" d="M185,95 C200,80 220,80 235,95"/>
  <path data-step="3" class="loop" d="M175,235 C195,248 220,248 240,232"/>
  <!-- numbered stages -->
  <text data-step="4" class="num" x="160" y="165">1</text>
  <text data-step="4" class="num" x="258" y="165">2</text>
  <text data-step="4" class="num" x="210" y="78">3</text>
  <!-- heat source arrow -->
  <path data-step="5" class="heat" d="M175,300 L175,248"/>
  <path data-step="5" class="heat" d="M167,262 L175,246 L183,262"/>
  <text data-step="5" x="175" y="315" text-anchor="middle">heat source</text>
  <!-- label -->
  <text data-step="6" class="lbl" x="330" y="100">fluid</text>
  <path data-step="6" class="lead" d="M328,96 L300,110"/>
</svg>
