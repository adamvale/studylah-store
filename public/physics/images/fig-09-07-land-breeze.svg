<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .land { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.4; }
    .sea { fill:#E58F8F; opacity:0.16; stroke:#E58F8F; stroke-width:1.4; }
    .flow { stroke:#EAEAEA; stroke-width:2.2; fill:none; }
    .lbl { fill:#EAEAEA; }
    .warm { fill:#E58F8F; }
    .cool { fill:#6FB7E0; }
    .moon { fill:#9AA0A6; }
  </style>
  <!-- ground -->
  <path class="land" d="M20,215 L230,215 L230,275 L20,275 Z"/>
  <path class="sea" d="M230,225 L440,225 L440,275 L230,275 Z"/>
  <text class="lbl" x="120" y="255" text-anchor="middle">land (cooler)</text>
  <text class="lbl" x="335" y="255" text-anchor="middle">sea (warmer)</text>
  <!-- moon (night) -->
  <path class="moon" d="M95,45 A18,18 0 1 0 95,81 A14,14 0 1 1 95,45 Z"/>
  <!-- warm air rises over sea, cool air sinks over land, land->sea at surface -->
  <path d="M330,210 C322,160 326,120 340,105" fill="none" stroke="#E58F8F" stroke-width="2.2"/>
  <path d="M333,120 L340,102 L348,119" fill="#E58F8F" stroke="#E58F8F"/>
  <path class="flow" d="M330,100 C260,80 190,90 130,105"/>
  <path class="flow" d="M148,98 L128,106 L147,113" fill="#EAEAEA"/>
  <path d="M120,110 C108,155 112,185 125,210" fill="none" stroke="#6FB7E0" stroke-width="2.2"/>
  <path d="M117,196 L125,214 L134,196" fill="#6FB7E0" stroke="#6FB7E0"/>
  <!-- cool land breeze along surface toward sea -->
  <path class="flow" d="M140,205 C200,222 270,220 325,208"/>
  <path class="flow" d="M308,201 L328,208 L309,215" fill="#EAEAEA"/>
  <text class="warm" x="350" y="150">warm air rises</text>
  <text class="cool" x="60" y="150">cool air sinks</text>
  <text class="lbl" x="230" y="200" text-anchor="middle">land breeze (land &#8594; sea)</text>
</svg>
