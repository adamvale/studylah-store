<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .magN { fill:#E58F8F; opacity:0.30; stroke:#EAEAEA; stroke-width:1.4; }
    .magS { fill:#6FB7E0; opacity:0.30; stroke:#EAEAEA; stroke-width:1.4; }
    .bar { fill:#9AA0A6; opacity:0.20; stroke:#EAEAEA; stroke-width:1.5; }
    .pole { font-size:13px; font-weight:bold; fill:#EAEAEA; }
    .mv { stroke:#86C98B; stroke-width:2; fill:none; }
    .mhead { fill:#86C98B; }
    .lbl { fill:#E8B65A; font-size:13.5px; }
    .title { font-size:15.5px; font-weight:bold; }
  </style>

  <!-- ===== PANEL 1: Single touch ===== -->
  <text data-step="1" x="24" y="28" class="title">Single-touch method</text>
  <text data-step="1" x="24" y="90" class="lbl">stroke one way only,</text>
  <text data-step="1" x="24" y="106" class="lbl">same pole down</text>
  <!-- stroking magnet tilted, moving left to right, N pole (lower end) touching -->
  <g data-step="2" transform="translate(180,70)"><g transform="rotate(20)">
    <rect class="magS" x="0" y="0" width="45" height="24" rx="2"/>
    <rect class="magN" x="45" y="0" width="45" height="24" rx="2"/>
    <text class="pole" x="12" y="17">S</text>
    <text class="pole" x="72" y="17">N</text>
  </g></g>
  <!-- motion path arrow -->
  <path data-step="3" class="mv" d="M100,60 C170,30 220,30 280,60"/>
  <polygon data-step="3" class="mhead" points="280,60 270,53 272,64"/>
  <!-- steel bar: starting end takes the stroking pole, lift-off end takes the opposite pole -->
  <g data-step="4" transform="translate(60,150)">
    <rect class="bar" x="0" y="0" width="220" height="30" rx="2"/>
    <text class="pole" x="10" y="20">N</text>
    <text class="pole" x="200" y="20">S</text>
  </g>
  <text data-step="4" x="60" y="207" class="lbl">steel bar to be magnetised</text>

  <!-- ===== PANEL 2: Double touch ===== -->
  <text data-step="5" x="24" y="278" class="title">Double-touch method</text>
  <!-- two magnets, opposite poles down, stroked outward from the centre -->
  <g data-step="6" transform="translate(110,330)"><g transform="rotate(-20)">
    <rect class="magS" x="0" y="0" width="40" height="22" rx="2"/>
    <rect class="magN" x="40" y="0" width="40" height="22" rx="2"/>
    <text class="pole" x="10" y="16">S</text>
    <text class="pole" x="62" y="16">N</text>
  </g></g>
  <g data-step="6" transform="translate(190,330)"><g transform="rotate(20)">
    <rect class="magS" x="0" y="0" width="40" height="22" rx="2"/>
    <rect class="magN" x="40" y="0" width="40" height="22" rx="2"/>
    <text class="pole" x="10" y="16">S</text>
    <text class="pole" x="62" y="16">N</text>
  </g></g>
  <path data-step="6" class="mv" d="M160,305 C130,290 100,295 80,310"/>
  <polygon data-step="6" class="mhead" points="80,310 92,306 87,316"/>
  <path data-step="6" class="mv" d="M230,305 C260,290 290,295 305,310"/>
  <polygon data-step="6" class="mhead" points="305,310 293,306 298,316"/>
  <g data-step="6" transform="translate(60,400)">
    <rect class="bar" x="0" y="0" width="220" height="30" rx="2"/>
    <text class="pole" x="10" y="20">N</text>
    <text class="pole" x="200" y="20">S</text>
  </g>
  <text data-step="6" x="60" y="457" class="lbl">steel bar to be magnetised</text>
  <text data-step="6" x="40" y="492" class="lbl">two magnets stroke outward from the centre</text>
</svg>
