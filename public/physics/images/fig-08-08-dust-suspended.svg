<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .view { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .dust { fill:#6FB7E0; opacity:0.6; stroke:#6FB7E0; stroke-width:1.2; }
    .lbl { font-size:12px; }
  </style>
  <circle data-step="1" class="view" cx="160" cy="150" r="120"/>
  <!-- three dust specks suspended -->
  <circle data-step="1" class="dust" cx="120" cy="110" r="6"/>
  <circle data-step="2" class="dust" cx="200" cy="160" r="6"/>
  <circle data-step="2" class="dust" cx="150" cy="205" r="6"/>
  <text data-step="3" class="lbl" x="160" y="292" text-anchor="middle" font-size="14" fill="#9AA0A6" font-style="italic">dust specks suspended in</text>
  <text data-step="4" class="lbl" x="160" y="310" text-anchor="middle" font-size="14" fill="#9AA0A6" font-style="italic">still air (magnified)</text>
</svg>
