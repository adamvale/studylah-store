<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .shape { fill:#6FB7E0; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .plumb { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 3; fill:none; }
    .cg { fill:#E8B65A; stroke:#E8B65A; }
    .pin { fill:#EAEAEA; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <!-- pivot at top -->
  <circle class="pin" cx="230" cy="40" r="4"/>
  <text class="lbl" x="243" y="38">pivot</text>
  <!-- vertical line of action from CG downward -->
  <line class="plumb" x1="180" y1="150" x2="180" y2="245"/>
  <!-- vertical through pivot for reference -->
  <line class="plumb" x1="230" y1="40" x2="230" y2="245"/>
  <!-- tilted rectangle (rotated) -->
  <g transform="rotate(-22 230 40)">
    <rect class="shape" x="185" y="45" width="120" height="70"/>
  </g>
  <!-- CG dot offset to left of pivot vertical -->
  <circle class="cg" cx="180" cy="150" r="3.6"/>
  <text class="lbl" x="158" y="150" fill="#E8B65A">CG</text>
  <!-- weight arrow -->
  <line class="force" x1="180" y1="150" x2="180" y2="215"/>
  <path class="force" d="M180,215 l-5,-10 M180,215 l5,-10"/>
  <text class="lbl" x="165" y="230" fill="#E58F8F">weight, W</text>
  <!-- perpendicular distance between the two verticals -->
  <line class="dim" x1="180" y1="120" x2="230" y2="120"/>
  <path class="dim" d="M180,120 l8,-4 M180,120 l8,4"/>
  <path class="dim" d="M230,120 l-8,-4 M230,120 l-8,4"/>
  <text class="lbl" x="205" y="112" text-anchor="middle">d</text>
  <!-- annotation -->
  <text class="lbl" x="300" y="150">CG is not vertically below</text>
  <text class="lbl" x="300" y="168">the pivot, so d ≠ 0.</text>
  <text class="lbl" x="300" y="192">The weight gives a resultant</text>
  <text class="lbl" x="300" y="210">moment (W × d): the object</text>
  <text class="lbl" x="300" y="228">turns — not in equilibrium.</text>
</svg>
