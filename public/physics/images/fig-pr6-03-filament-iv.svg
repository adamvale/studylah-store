<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 285" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .fit  { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .ax   { fill:#E8B65A; font-size:13px; }
    .note { fill:#9AA0A6; font-size:12px; }
    .cap  { fill:#EAEAEA; font-size:13px; }
  </style>
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>

  <!-- axes: x-axis, then the y-axis above and below the origin -->
  <line class="axis" x1="45" y1="150" x2="395" y2="150" marker-end="url(#a3)"/>
  <line class="axis" x1="215" y1="150" x2="215" y2="40" marker-end="url(#a3)"/>
  <line class="axis" x1="215" y1="150" x2="215" y2="248"/>
  <text class="ax" x="228" y="37">I / A</text>
  <text class="ax" x="392" y="172" text-anchor="end">V / V</text>
  <text x="207" y="166" text-anchor="end">O</text>

  <!-- S-shaped curve: steep at the origin, flattening as V grows -->
  <path class="fit" d="M215,150 C231,117 248,97 278,86 C308,75 340,70 370,67"/>
  <path class="fit" d="M215,150 C199,183 182,203 152,214 C122,225 90,230 60,233"/>

  <text class="cap" x="55" y="70">filament lamp</text>
  <text class="note" x="250" y="118">flattens: R rises</text>
  <text class="note" x="210" y="272" text-anchor="middle">non-ohmic</text>
</svg>
