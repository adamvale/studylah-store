<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah9" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .cloth { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .rod { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.6; }
    .pos { fill:#E58F8F; font-size:14px; text-anchor:middle; }
    .neg { fill:#6FB7E0; font-size:15px; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .etrans { stroke:#E8B65A; stroke-width:1.8; fill:none; }
  </style>
  <text x="300" y="26" text-anchor="middle" font-size="15">Rubbing a polythene rod with a cloth</text>
  <!-- cloth blob (left) with + charges -->
  <path class="cloth" d="M70,150 Q60,90 130,95 Q190,90 190,150 Q195,215 130,210 Q65,215 70,150 Z"/>
  <text class="pos" x="105" y="135">+</text>
  <text class="pos" x="150" y="135">+</text>
  <text class="pos" x="105" y="170">+</text>
  <text class="pos" x="150" y="170">+</text>
  <text class="pos" x="128" y="200">+</text>
  <text x="130" y="245" text-anchor="middle" font-size="13">cloth: loses electrons</text>
  <text x="130" y="262" text-anchor="middle" font-size="13" fill="#E58F8F">becomes positive (deficit of e⁻)</text>
  <!-- polythene rod (right) with - charges -->
  <rect class="rod" x="360" y="135" width="180" height="34" rx="8"/>
  <text class="neg" x="385" y="157">−</text>
  <text class="neg" x="415" y="157">−</text>
  <text class="neg" x="445" y="157">−</text>
  <text class="neg" x="475" y="157">−</text>
  <text class="neg" x="505" y="157">−</text>
  <text x="450" y="200" text-anchor="middle" font-size="13">polythene rod: gains electrons</text>
  <text x="450" y="217" text-anchor="middle" font-size="13" fill="#6FB7E0">becomes negative (excess of e⁻)</text>
  <!-- electron transfer arrow cloth -> rod -->
  <path class="etrans" d="M195,120 Q290,80 380,120" marker-end="url(#ah9)"/>
  <text x="288" y="78" text-anchor="middle" font-size="13" fill="#E8B65A">electrons transferred from cloth to rod</text>
</svg>
