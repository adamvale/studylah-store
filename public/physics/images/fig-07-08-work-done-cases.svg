<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 470" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .ground { stroke:#EAEAEA; stroke-width:2; }
    .block { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .ghost { fill:none; stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:4 4; }
    .force { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { fill:#E8B65A; font-size:12px; }
    .verdict { font-size:14px; font-weight:bold; }
  </style>
  <defs>
    <marker id="fm2" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#86C98B"/></marker>
    <marker id="da" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9AA0A6"/></marker>
    <marker id="db" markerWidth="10" markerHeight="10" refX="1" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 Z" fill="#9AA0A6"/></marker>
  </defs>
  <!-- TOP CASE: force moves box -->
  <text x="140" y="30" text-anchor="middle" class="verdict" fill="#86C98B">work is done</text>
  <line class="ground" x1="30" y1="120" x2="260" y2="120"/>
  <rect class="ghost" x="55" y="88" width="42" height="30"/>
  <rect class="block" x="175" y="88" width="42" height="30"/>
  <line class="force" x1="30" y1="103" x2="70" y2="103" marker-end="url(#fm2)"/>
  <text class="lbl" x="30" y="80">force</text>
  <line class="dim" x1="76" y1="135" x2="196" y2="135" marker-start="url(#db)" marker-end="url(#da)"/>
  <text x="136" y="152" text-anchor="middle" fill="#9AA0A6">distance moved</text>
  <text x="140" y="200" text-anchor="middle" font-size="11" fill="#9AA0A6">a force moves the box a distance,</text>
  <text x="140" y="217" text-anchor="middle" font-size="11" fill="#9AA0A6">so energy is transferred</text>

  <!-- BOTTOM CASE: force, no movement -->
  <g transform="translate(-270,235)">
    <text x="400" y="30" text-anchor="middle" class="verdict" fill="#E58F8F">no work is done</text>
    <line class="ground" x1="300" y1="120" x2="500" y2="120"/>
    <rect class="block" x="380" y="88" width="42" height="30"/>
    <line class="force" x1="330" y1="103" x2="376" y2="103" marker-end="url(#fm2)"/>
    <text class="lbl" x="325" y="80">force</text>
    <text x="401" y="152" text-anchor="middle" fill="#9AA0A6">box stays at rest</text>
    <text x="400" y="200" text-anchor="middle" font-size="11" fill="#9AA0A6">the box does not move,</text>
    <text x="400" y="217" text-anchor="middle" font-size="11" fill="#9AA0A6">so no energy is transferred</text>
  </g>
</svg>
