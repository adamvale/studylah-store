<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lbl { font-size:12px; }
  </style>
  <!-- cell top -->
  <path class="wire" d="M60,45 L170,45 M186,45 L330,45"/>
  <line class="wire" x1="170" y1="29" x2="170" y2="61" stroke-width="2.4"/>
  <line class="wire" x1="186" y1="37" x2="186" y2="53" stroke-width="5"/>
  <text x="178" y="22" class="lbl" text-anchor="middle">9.0 V</text>
  <!-- left rail with 6 ohm in series -->
  <path class="wire" d="M60,45 L60,210"/>
  <rect class="wire" x="48" y="105" width="24" height="46"/>
  <text x="24" y="131" class="lbl">6 &#8486;</text>
  <path class="wire" d="M60,210 L330,210"/>
  <path class="wire" d="M330,45 L330,210"/>
  <!-- two parallel resistors 12 and 6 -->
  <path class="wire" d="M200,45 L200,100 L245,100"/>
  <rect class="wire" x="245" y="88" width="46" height="24"/>
  <path class="wire" d="M291,100 L330,100"/>
  <text x="268" y="82" class="lbl" text-anchor="middle">12 &#8486;</text>
  <path class="wire" d="M200,100 L200,155 L245,155"/>
  <rect class="wire" x="245" y="143" width="46" height="24"/>
  <path class="wire" d="M291,155 L330,155"/>
  <text x="268" y="183" class="lbl" text-anchor="middle">6 &#8486;</text>
</svg>
