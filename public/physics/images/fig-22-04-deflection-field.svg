<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 340" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .plate { stroke:#EAEAEA; stroke-width:4; }
    .src { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.5; }
    .alpha { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .beta { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .gamma { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .cap { font-size:13px; fill:#9AA0A6; }
    .sign { font-size:22px; fill:#EAEAEA; }
  </style>
  <!-- plates -->
  <line class="plate" x1="200" y1="60" x2="440" y2="60"/>
  <text class="sign" x="315" y="52" text-anchor="middle">+ + + + +</text>
  <line class="plate" x1="200" y1="280" x2="440" y2="280"/>
  <text class="sign" x="315" y="304" text-anchor="middle">&#8722; &#8722; &#8722; &#8722; &#8722;</text>

  <!-- source shielded on left -->
  <rect class="src" x="40" y="152" width="30" height="36" rx="4"/>
  <text x="55" y="205" text-anchor="middle" class="cap">source</text>

  <!-- entry beam to field region -->
  <line class="gamma" x1="70" y1="170" x2="200" y2="170" stroke="#9AA0A6" stroke-width="1.3" stroke-dasharray="4 4"/>

  <!-- beta: negative, curves UP toward + plate (deflected most) -->
  <path class="beta" d="M200,170 Q330,150 470,80"/>
  <text x="478" y="80" fill="#6FB7E0">&#946; (negative)</text>

  <!-- gamma: undeflected, straight through -->
  <line class="gamma" x1="200" y1="170" x2="470" y2="170"/>
  <text x="478" y="174" fill="#86C98B">&#947; (no charge)</text>

  <!-- alpha: positive, curves DOWN toward - plate (less deflection) -->
  <path class="alpha" d="M200,170 Q340,195 470,240"/>
  <text x="478" y="244" fill="#E58F8F">&#945; (positive)</text>

  <text x="315" y="330" text-anchor="middle" fill="#E8B65A" font-size="13">&#945; and &#946; bend to opposite plates; &#947; passes straight through</text>
</svg>
