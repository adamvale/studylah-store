<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lbl { font-size:13px; text-anchor:middle; }
  </style>
  <rect class="wire" x="60" y="60" width="280" height="120" fill="none"/>
  <!-- cell top -->
  <line class="wire" x1="185" y1="42" x2="185" y2="78" stroke-width="2.4"/>
  <line class="wire" x1="201" y1="52" x2="201" y2="68" stroke-width="5"/>
  <!-- three resistors along the bottom edge in series -->
  <rect class="wire" x="90" y="168" width="46" height="24"/>
  <rect class="wire" x="177" y="168" width="46" height="24"/>
  <rect class="wire" x="264" y="168" width="46" height="24"/>
  <text x="113" y="210" class="lbl">R&#8321;</text>
  <text x="200" y="210" class="lbl">R&#8322;</text>
  <text x="287" y="210" class="lbl">R&#8323;</text>
  <text x="200" y="25" class="lbl" fill="#9AA0A6">resistors in series</text>
</svg>
