<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.8; }
    .line { fill:none; stroke:#6FB7E0; stroke-width:2.6; }
    .guide { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; }
    .lbl { font-size:13; }
  </style>
  <line data-step="1" class="axis" x1="70" y1="40" x2="70" y2="255" marker-end="url(#arw)"/>
  <line data-step="1" class="axis" x1="70" y1="255" x2="410" y2="255" marker-end="url(#arw)"/>
  <text data-step="1" x="70" y="30" text-anchor="middle" class="lbl">F / N</text>
  <text data-step="1" x="420" y="270" text-anchor="end" class="lbl">t / s</text>
  <!-- y ticks 12, 24 -->
  <text data-step="1" x="62" y="165" text-anchor="end" class="lbl">12</text>
  <text data-step="1" x="62" y="80" text-anchor="end" class="lbl">24</text>
  <line data-step="1" class="guide" x1="70" y1="160" x2="270" y2="160"/>
  <line data-step="1" class="guide" x1="70" y1="75" x2="220" y2="75"/>
  <!-- x ticks 30,40,50 -->
  <text data-step="2" x="220" y="270" text-anchor="middle" class="lbl">30</text>
  <text data-step="2" x="270" y="270" text-anchor="middle" class="lbl">40</text>
  <text data-step="2" x="320" y="270" text-anchor="middle" class="lbl">50</text>
  <!-- graph: 24 N from 0-30, 12 N 30-40, 0 40-50 -->
  <path data-step="3" class="line" d="M70,75 L220,75 L220,160 L270,160 L270,255 L320,255"/>
</svg>
