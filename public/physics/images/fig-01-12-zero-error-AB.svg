<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 345" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .rule { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .tick { stroke:#EAEAEA; stroke-width:1.2; }
    .obj { fill:#6FB7E0; opacity:0.35; stroke:#6FB7E0; stroke-width:1.5; }
  </style>
  <!-- Diagram A: box edge starts a little after 0 -->
  <g data-step="1">
    <rect class="obj" x="122" y="40" width="110" height="24"/>
    <rect class="rule" x="90" y="68" width="220" height="32" rx="3"/>
    <g class="tick">
      <line x1="110" y1="68" x2="110" y2="86"/><line x1="150" y1="68" x2="150" y2="86"/>
      <line x1="190" y1="68" x2="190" y2="86"/><line x1="230" y1="68" x2="230" y2="86"/>
      <line x1="270" y1="68" x2="270" y2="86"/>
    </g>
    <g font-size="14" text-anchor="middle">
      <text x="110" y="116">0</text><text x="150" y="116">1</text><text x="190" y="116">2</text><text x="230" y="116">3</text><text x="270" y="116">4</text>
    </g>
    <text x="320" y="90" font-size="13">cm</text>
    <text x="200" y="146" text-anchor="middle" font-size="16" font-weight="600">Diagram A</text>
  </g>
  <!-- Diagram B: box edge starts a little before 0 -->
  <g data-step="2">
    <rect class="obj" x="82" y="220" width="110" height="24"/>
    <rect class="rule" x="90" y="248" width="220" height="32" rx="3"/>
    <g class="tick">
      <line x1="110" y1="248" x2="110" y2="266"/><line x1="150" y1="248" x2="150" y2="266"/>
      <line x1="190" y1="248" x2="190" y2="266"/><line x1="230" y1="248" x2="230" y2="266"/>
      <line x1="270" y1="248" x2="270" y2="266"/>
    </g>
    <g font-size="14" text-anchor="middle">
      <text x="110" y="296">0</text><text x="150" y="296">1</text><text x="190" y="296">2</text><text x="230" y="296">3</text><text x="270" y="296">4</text>
    </g>
    <text x="320" y="270" font-size="13">cm</text>
    <text x="200" y="326" text-anchor="middle" font-size="16" font-weight="600">Diagram B</text>
  </g>
</svg>
