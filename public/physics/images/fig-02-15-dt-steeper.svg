<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; }
    .lineA { fill:none; stroke:#6FB7E0; stroke-width:2.2; }
    .lineB { fill:none; stroke:#E8B65A; stroke-width:2.2; }
    .cap { font-size:13px; }
  </style>
  <defs>
    <marker id="sa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <line data-step="1" class="axis" x1="55" y1="210" x2="55" y2="30" marker-end="url(#sa)"/>
  <line data-step="1" class="axis" x1="55" y1="210" x2="310" y2="210" marker-end="url(#sa)"/>
  <text data-step="3" x="20" y="30">displacement</text>
  <text data-step="3" x="285" y="228" class="cap">time</text>
  <text data-step="3" x="45" y="213" text-anchor="end" class="cap">O</text>
  <line data-step="2" class="lineA" x1="55" y1="210" x2="255" y2="55"/>
  <line data-step="2" class="lineB" x1="55" y1="210" x2="285" y2="140"/>
  <text data-step="3" x="262" y="55" fill="#6FB7E0" class="cap">A</text>
  <text data-step="4" x="292" y="140" fill="#E8B65A" class="cap">B</text>
  <text data-step="4" x="152" y="184" class="cap">A is steeper:</text>
  <text data-step="4" x="152" y="202" class="cap">A moves faster than B</text>
</svg>
