<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .dense { fill:#6FB7E0; opacity:0.16; }
    .norm { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <rect class="dense" x="60" y="160" width="440" height="110"/>
  <line x1="60" y1="160" x2="500" y2="160" stroke="#EAEAEA" stroke-width="1.6"/>
  <path class="norm" d="M300,70 L300,250"/>
  <!-- incident ray in denser, i>c -->
  <path class="inc" marker-end="url(#a1)" d="M218,217 L298,162"/>
  <text x="205" y="228" text-anchor="end" font-size="12" fill="#E8B65A">incident ray</text>
  <!-- totally reflected ray back into denser medium, angle = i -->
  <path class="ref" marker-end="url(#a2)" d="M300,160 L382,217"/>
  <text x="392" y="215" font-size="12" fill="#6FB7E0">reflected ray</text>
  <!-- no refracted ray -->
  <path class="arc" d="M300,210 A50,50 0 0,1 268,197"/>
  <text x="262" y="216" font-size="12" font-style="italic">i</text>
  <path class="arc" d="M300,210 A50,50 0 0,0 332,197"/>
  <text x="326" y="216" font-size="12" font-style="italic">i</text>
  <text x="70" y="150" font-size="11">optically less dense medium</text>
  <text x="70" y="185" font-size="11">optically denser medium</text>
  <text x="300" y="290" text-anchor="middle" font-size="12">When <tspan font-style="italic">i</tspan> &gt; <tspan font-style="italic">c</tspan>, all light is reflected back &#8212; no refracted ray.</text>
</svg>
