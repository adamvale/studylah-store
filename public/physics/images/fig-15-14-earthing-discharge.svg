<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah14" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .sphere { fill:#9AA0A6; opacity:0.2; stroke:#EAEAEA; stroke-width:1.5; }
    .stand { fill:none; stroke:#9AA0A6; stroke-width:1.6; }
    .neg { fill:#6FB7E0; font-size:14px; text-anchor:middle; }
    .pos { fill:#E58F8F; font-size:13px; text-anchor:middle; }
    .flow { stroke:#E8B65A; stroke-width:2; fill:none; }
    .finger { fill:#9AA0A6; opacity:0.25; stroke:#EAEAEA; stroke-width:1.3; }
  </style>
  <!-- LEFT: discharging a negatively charged conductor -->
  <text x="150" y="26" text-anchor="middle" font-size="13">Discharging a negative conductor</text>
  <circle class="sphere" cx="120" cy="110" r="38"/>
  <text class="neg" x="105" y="100">&#8722;</text><text class="neg" x="130" y="100">&#8722;</text><text class="neg" x="118" y="125">&#8722;</text>
  <line class="stand" x1="120" y1="148" x2="120" y2="205"/>
  <rect x="103" y="205" width="34" height="8" fill="#9AA0A6" opacity="0.4"/>
  <!-- finger touching -->
  <path class="finger" d="M170,150 q40,-6 70,10 l-6,14 q-40,-8 -66,0 Z"/>
  <text x="248" y="160">finger acts as earth wire</text>
  <!-- electrons flow away to earth -->
  <path class="flow" d="M158,120 q40,10 70,30" marker-end="url(#ah14)"/>
  <text x="200" y="120" fill="#E8B65A">e&#8315; to Earth</text>

  <!-- RIGHT: discharging a positively charged conductor -->
  <text x="410" y="26" text-anchor="middle" font-size="13">Discharging a positive conductor</text>
  <circle class="sphere" cx="380" cy="110" r="38"/>
  <text class="pos" x="365" y="100">+</text><text class="pos" x="392" y="100">+</text><text class="pos" x="378" y="125">+</text>
  <line class="stand" x1="380" y1="148" x2="380" y2="205"/>
  <rect x="363" y="205" width="34" height="8" fill="#9AA0A6" opacity="0.4"/>
  <path class="finger" d="M430,150 q40,-6 70,10 l-6,14 q-40,-8 -66,0 Z"/>
  <text x="440" y="185">finger acts as earth wire</text>
  <!-- electrons flow from earth to sphere -->
  <path class="flow" d="M448,150 q-40,-16 -70,-25" marker-end="url(#ah14)"/>
  <text x="405" y="120" fill="#E8B65A">e&#8315; from Earth</text>
</svg>
