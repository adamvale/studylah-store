<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 570" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah14" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .sphere { fill:#9AA0A6; opacity:0.2; stroke:#EAEAEA; stroke-width:1.5; }
    .stand { fill:none; stroke:#9AA0A6; stroke-width:1.6; }
    .neg { fill:#6FB7E0; font-size:15px; text-anchor:middle; }
    .posq { fill:#E58F8F; font-size:14px; text-anchor:middle; }
    .flow { stroke:#E8B65A; stroke-width:2; fill:none; }
    .finger { fill:#9AA0A6; opacity:0.25; stroke:#EAEAEA; stroke-width:1.3; }
  </style>
  <!-- Panel 1: discharging a negatively charged conductor -->
  <text x="200" y="28" text-anchor="middle" font-size="14">Discharging a negative conductor</text>
  <circle class="sphere" cx="140" cy="120" r="40"/>
  <text class="neg" x="125" y="112">−</text><text class="neg" x="152" y="112">−</text><text class="neg" x="138" y="140">−</text>
  <line class="stand" x1="140" y1="160" x2="140" y2="215"/>
  <rect x="120" y="215" width="40" height="8" fill="#9AA0A6" opacity="0.4"/>
  <path class="finger" d="M190,160 q40,-6 70,10 l-6,14 q-40,-8 -66,0 Z"/>
  <text x="185" y="215">finger acts as earth wire</text>
  <path class="flow" d="M178,132 q40,12 66,28" marker-end="url(#ah14)"/>
  <text x="248" y="130" fill="#E8B65A">e⁻ to Earth</text>
  <!-- Panel 2: discharging a positively charged conductor -->
  <text x="200" y="308" text-anchor="middle" font-size="14">Discharging a positive conductor</text>
  <circle class="sphere" cx="140" cy="400" r="40"/>
  <text class="posq" x="125" y="392">+</text><text class="posq" x="152" y="392">+</text><text class="posq" x="138" y="420">+</text>
  <line class="stand" x1="140" y1="440" x2="140" y2="495"/>
  <rect x="120" y="495" width="40" height="8" fill="#9AA0A6" opacity="0.4"/>
  <path class="finger" d="M190,440 q40,-6 70,10 l-6,14 q-40,-8 -66,0 Z"/>
  <text x="185" y="495">finger acts as earth wire</text>
  <path class="flow" d="M260,448 q-45,-18 -78,-28" marker-end="url(#ah14)"/>
  <text x="248" y="415" fill="#E8B65A">e⁻ from Earth</text>
</svg>
