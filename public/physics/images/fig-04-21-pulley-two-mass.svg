<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 270" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.26; stroke:#6FB7E0; stroke-width:1.6; }
    .box2 { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .rope { stroke:#E8B65A; stroke-width:2; fill:none; }
    .pulley { fill:none; stroke:#9AA0A6; stroke-width:2.2; }
    .support { stroke:#EAEAEA; stroke-width:2; }
    .t { stroke:#E8B65A; stroke-width:2.2; }
    .w { stroke:#E58F8F; stroke-width:2.2; }
  </style>
  <!-- setup on left -->
  <line class="support" x1="70" y1="40" x2="150" y2="40"/>
  <circle class="pulley" cx="110" cy="55" r="14"/>
  <path class="rope" d="M96,55 L96,120"/>
  <path class="rope" d="M124,55 L124,175"/>
  <rect class="box" x="72" y="120" width="48" height="38"/>
  <text x="96" y="144" text-anchor="middle" font-size="12">6 kg</text>
  <rect class="box" x="100" y="175" width="48" height="38"/>
  <text x="124" y="199" text-anchor="middle" font-size="12">4 kg</text>
  <text x="110" y="245" text-anchor="middle" font-size="12">g = 10 N/kg</text>
  <!-- free body diagrams right -->
  <text x="300" y="32" text-anchor="middle" font-size="13" font-weight="bold">6 kg (falls)</text>
  <rect class="box2" x="272" y="78" width="55" height="40"/>
  <text x="299" y="103" text-anchor="middle" font-size="12">6 kg</text>
  <line class="t" x1="299" y1="78" x2="299" y2="44" marker-end="url(#arwA)"/>
  <text x="307" y="60" font-size="12" fill="#E8B65A">T</text>
  <line class="w" x1="299" y1="118" x2="299" y2="162" marker-end="url(#arwR)"/>
  <text x="307" y="150" font-size="12" fill="#E58F8F">60 N</text>
  <text x="405" y="32" text-anchor="middle" font-size="13" font-weight="bold">4 kg (rises)</text>
  <rect class="box2" x="377" y="78" width="55" height="40"/>
  <text x="404" y="103" text-anchor="middle" font-size="12">4 kg</text>
  <line class="t" x1="404" y1="78" x2="404" y2="44" marker-end="url(#arwA)"/>
  <text x="412" y="60" font-size="12" fill="#E8B65A">T</text>
  <line class="w" x1="404" y1="118" x2="404" y2="162" marker-end="url(#arwR)"/>
  <text x="412" y="150" font-size="12" fill="#E58F8F">40 N</text>
</svg>
