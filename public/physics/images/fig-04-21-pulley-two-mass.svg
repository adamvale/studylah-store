<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.26; stroke:#6FB7E0; stroke-width:1.6; }
    .box2 { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .rope { stroke:#E8B65A; stroke-width:2; fill:none; }
    .pulley { fill:none; stroke:#9AA0A6; stroke-width:2.2; }
    .support { stroke:#EAEAEA; stroke-width:2; }
    .t { stroke:#E8B65A; stroke-width:2.2; }
    .w { stroke:#E58F8F; stroke-width:2.2; }
  </style>
  <!-- setup on left -->
  <line class="support" x1="70" y1="40" x2="150" y2="40"/>
  <circle class="pulley" cx="110" cy="55" r="14"/>
  <path class="rope" d="M96,55 L96,120"/>
  <path class="rope" d="M124,55 L124,175"/>
  <rect class="box" x="72" y="120" width="48" height="38"/>
  <text x="96" y="144" text-anchor="middle" font-size="11">6 kg</text>
  <rect class="box" x="100" y="175" width="48" height="38"/>
  <text x="124" y="199" text-anchor="middle" font-size="11">4 kg</text>
  <text x="110" y="245" text-anchor="middle" font-size="10.5">g = 10 N/kg</text>
  <!-- free body diagrams right -->
  <text x="300" y="40" text-anchor="middle" font-size="11.5" font-weight="bold">6 kg (falls)</text>
  <rect class="box2" x="270" y="60" width="55" height="40"/>
  <text x="297" y="85" text-anchor="middle" font-size="11">6 kg</text>
  <line class="t" x1="297" y1="60" x2="297" y2="22" marker-end="url(#arwA)"/>
  <text x="305" y="40" font-size="10.5" fill="#E8B65A">T</text>
  <line class="w" x1="297" y1="100" x2="297" y2="145" marker-end="url(#arwR)"/>
  <text x="305" y="132" font-size="10.5" fill="#E58F8F">60 N</text>
  <text x="410" y="40" text-anchor="middle" font-size="11.5" font-weight="bold">4 kg (rises)</text>
  <rect class="box2" x="382" y="160" width="55" height="40"/>
  <text x="409" y="185" text-anchor="middle" font-size="11">4 kg</text>
  <line class="t" x1="409" y1="160" x2="409" y2="122" marker-end="url(#arwA)"/>
  <text x="417" y="140" font-size="10.5" fill="#E8B65A">T</text>
  <line class="w" x1="409" y1="200" x2="409" y2="245" marker-end="url(#arwR)"/>
  <text x="417" y="232" font-size="10.5" fill="#E58F8F">40 N</text>
</svg>
