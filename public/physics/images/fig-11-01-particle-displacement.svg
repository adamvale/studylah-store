<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .wave { stroke:#6FB7E0; stroke-width:2.2; fill:none; }
    .wave2 { stroke:#E8B65A; stroke-width:2.2; fill:none; stroke-dasharray:6 4; }
    .rest { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:5 4; fill:none; }
    .guide { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:3 3; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .dim { stroke:#E8B65A; stroke-width:1.4; fill:none; }
    .lbl { fill:#E8B65A; font-size:13px; }
    .lblb { fill:#6FB7E0; font-size:13px; }
    .tick { stroke:#EAEAEA; stroke-width:1.2; }
    .sm { font-size:12px; }
  </style>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
    <marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>
  <!-- panel titles -->
  <text x="150" y="24" text-anchor="middle" font-size="13" fill="#6FB7E0">transverse wave</text>
  <text x="430" y="24" text-anchor="middle" font-size="13" fill="#86C98B">longitudinal wave</text>
  <!-- LEFT: transverse -->
  <line x1="60" y1="150" x2="240" y2="150" class="rest"/>
  <text x="248" y="154" font-size="12" fill="#9AA0A6">rest position</text>
  <line x1="90" y1="60" x2="215" y2="60" class="axis" marker-end="url(#ah)"/>
  <text x="150" y="52" text-anchor="middle" font-size="12">direction of wave</text>
    <circle cx="120" cy="120" r="9" fill="#6FB7E0" opacity="0.32" stroke="#6FB7E0" stroke-width="1.4"/>
  <line x1="136" y1="106" x2="136" y2="134" class="axis" marker-start="url(#ah)" marker-end="url(#ah)" stroke-width="1.3"/>
  <circle cx="150" cy="150" r="9" fill="#6FB7E0" opacity="0.32" stroke="#6FB7E0" stroke-width="1.4"/>
  <line x1="166" y1="136" x2="166" y2="164" class="axis" marker-start="url(#ah)" marker-end="url(#ah)" stroke-width="1.3"/>
  <circle cx="180" cy="180" r="9" fill="#6FB7E0" opacity="0.32" stroke="#6FB7E0" stroke-width="1.4"/>
  <line x1="196" y1="166" x2="196" y2="194" class="axis" marker-start="url(#ah)" marker-end="url(#ah)" stroke-width="1.3"/>
  <text x="140" y="210" text-anchor="middle" font-size="11.5" fill="#EAEAEA">particle vibrates up and down,</text>
  <text x="140" y="226" text-anchor="middle" font-size="11.5" fill="#EAEAEA">across the direction of travel</text>
  <line x1="320" y1="60" x2="520" y2="60" class="axis" marker-end="url(#ah)"/>
  <text x="420" y="52" text-anchor="middle" font-size="12">direction of wave</text>
  <line x1="360" y1="150" x2="360" y2="180" class="rest"/>
  <text x="330" y="196" font-size="12" fill="#9AA0A6">rest position</text>
  <circle cx="360" cy="110" r="9" fill="#86C98B" opacity="0.32" stroke="#86C98B" stroke-width="1.4"/>
  <circle cx="392" cy="110" r="9" fill="#86C98B" opacity="0.32" stroke="#86C98B" stroke-width="1.4"/>
  <circle cx="424" cy="110" r="9" fill="#86C98B" opacity="0.32" stroke="#86C98B" stroke-width="1.4"/>
  <circle cx="456" cy="110" r="9" fill="#86C98B" opacity="0.32" stroke="#86C98B" stroke-width="1.4"/>
  <circle cx="488" cy="110" r="9" fill="#86C98B" opacity="0.32" stroke="#86C98B" stroke-width="1.4"/>
  <line x1="404" y1="132" x2="444" y2="132" class="axis" marker-start="url(#ah)" marker-end="url(#ah)" stroke-width="1.3"/>
  <text x="424" y="210" text-anchor="middle" font-size="11.5" fill="#EAEAEA">particle vibrates back and forth,</text>
  <text x="424" y="226" text-anchor="middle" font-size="11.5" fill="#EAEAEA">along the direction of travel</text>

</svg>
