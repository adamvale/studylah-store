<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .pc { fill:none; stroke:#E8B65A; stroke-width:2; }
    .sc { fill:none; stroke:#6FB7E0; stroke-width:2; }
    .core { stroke:#9AA0A6; stroke-width:2; }
    .lbl { font-size:14px; }
  </style>

  <!-- a.c. supply -->
  <circle data-step="1" cx="80" cy="130" r="22" fill="none" stroke="#EAEAEA" stroke-width="1.6"/>
  <path data-step="1" d="M68,130 q6,-9 12,0 q6,9 12,0" fill="none" stroke="#EAEAEA" stroke-width="1.4"/>
  <text data-step="1" class="lbl" x="80" y="184" text-anchor="middle">a.c. supply</text>
  <text data-step="1" class="lbl" x="80" y="200" text-anchor="middle" fill="#E8B65A">V&#8346;</text>

  <!-- primary leads -->
  <path data-step="2" class="wire" d="M80,108 L80,70 L210,70"/>
  <path data-step="2" class="wire" d="M80,152 L80,190 L210,190"/>
  <text data-step="2" class="lbl" x="150" y="62" fill="#E8B65A">I&#8346;</text>

  <!-- primary coil (bulging left) -->
  <path data-step="3" class="pc" d="M210,70 A15,15 0 0 0 210,100 A15,15 0 0 0 210,130 A15,15 0 0 0 210,160 A15,15 0 0 0 210,190"/>
  <text data-step="3" class="lbl" x="196" y="222" text-anchor="middle" fill="#E8B65A">N&#8346;</text>

  <!-- laminated core -->
  <line data-step="4" class="core" x1="234" y1="60" x2="234" y2="200"/>
  <line data-step="4" class="core" x1="242" y1="60" x2="242" y2="200"/>
  <line data-step="4" class="core" x1="250" y1="60" x2="250" y2="200"/>
  <text data-step="4" class="lbl" x="242" y="42" text-anchor="middle" fill="#9AA0A6">iron core</text>

  <!-- secondary coil (bulging right) -->
  <path data-step="5" class="sc" d="M274,70 A15,15 0 0 1 274,100 A15,15 0 0 1 274,130 A15,15 0 0 1 274,160 A15,15 0 0 1 274,190"/>
  <text data-step="5" class="lbl" x="288" y="222" text-anchor="middle" fill="#6FB7E0">N&#8347;</text>

  <!-- secondary leads to load -->
  <path data-step="6" class="wire" d="M274,70 L440,70 L440,110"/>
  <path data-step="6" class="wire" d="M274,190 L440,190 L440,150"/>
  <rect data-step="6" x="431" y="110" width="18" height="40" fill="none" stroke="#EAEAEA" stroke-width="1.6"/>
  <text data-step="6" class="lbl" x="470" y="134">load</text>
  <text data-step="6" class="lbl" x="360" y="62" fill="#6FB7E0">I&#8347;</text>
  <text data-step="6" class="lbl" x="408" y="134" text-anchor="end" fill="#6FB7E0">V&#8347;</text>
</svg>
