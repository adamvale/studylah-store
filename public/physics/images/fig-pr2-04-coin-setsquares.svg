<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 322" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .rule { fill:#EAEAEA; fill-opacity:0.08; stroke:#EAEAEA; stroke-width:1.8; }
    .sq { fill:#EAEAEA; fill-opacity:0.10; stroke:#EAEAEA; stroke-width:1.8; }
    .coin { fill:#EAEAEA; fill-opacity:0.14; stroke:#EAEAEA; stroke-width:2.2; }
    .tick { stroke:#EAEAEA; stroke-width:1.1; }
    .num { fill:#9AA0A6; font-size:11px; }
    .guide { stroke:#9AA0A6; stroke-width:1.1; stroke-dasharray:4 3; fill:none; }
    .lbl { fill:#EAEAEA; font-size:12px; }
    .sub { fill:#9AA0A6; font-size:12px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
