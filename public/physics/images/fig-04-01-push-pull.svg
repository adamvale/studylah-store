<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
    <marker id="arwA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.28; stroke:#6FB7E0; stroke-width:1.6; }
    .push { stroke:#6FB7E0; stroke-width:2.4; }
    .pull { stroke:#E8B65A; stroke-width:2.4; }
  </style>
  <!-- PUSH panel (top) -->
  <text x="210" y="34" text-anchor="middle" font-size="16" font-weight="bold">A push</text>
  <rect class="box" x="190" y="60" width="70" height="70"/>
  <line class="push" x1="100" y1="95" x2="180" y2="95" marker-end="url(#arwB)"/>
  <text x="135" y="85" text-anchor="middle" font-size="13.5" fill="#6FB7E0">force</text>
  <text x="210" y="170" text-anchor="middle" font-size="13.5">object is pushed away</text>
  <line x1="40" y1="195" x2="380" y2="195" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- PULL panel (bottom) -->
  <text x="210" y="232" text-anchor="middle" font-size="16" font-weight="bold">A pull</text>
  <rect class="box" x="160" y="258" width="70" height="70"/>
  <line class="pull" x1="235" y1="293" x2="325" y2="293" marker-end="url(#arwA)"/>
  <text x="280" y="283" text-anchor="middle" font-size="13.5" fill="#E8B65A">force</text>
  <text x="210" y="368" text-anchor="middle" font-size="13.5">object is drawn towards you</text>
</svg>
