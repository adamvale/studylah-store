<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
    <marker id="arwA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.28; stroke:#6FB7E0; stroke-width:1.6; }
    .push { stroke:#6FB7E0; stroke-width:2.4; }
    .pull { stroke:#E8B65A; stroke-width:2.4; }
    .hand { fill:none; stroke:#9AA0A6; stroke-width:1.6; }
  </style>
  <!-- PUSH panel -->
  <text x="140" y="34" text-anchor="middle" font-size="15" font-weight="bold">A push</text>
  <rect class="box" x="160" y="70" width="70" height="70"/>
  <line class="push" x1="70" y1="105" x2="150" y2="105" marker-end="url(#arwB)"/>
  <text x="100" y="95" text-anchor="middle" font-size="12" fill="#6FB7E0">force</text>
  <text x="140" y="185" text-anchor="middle" font-size="12">object is pushed away</text>
  <!-- PULL panel -->
  <text x="420" y="34" text-anchor="middle" font-size="15" font-weight="bold">A pull</text>
  <rect class="box" x="330" y="70" width="70" height="70"/>
  <line class="pull" x1="490" y1="105" x2="410" y2="105" marker-end="url(#arwA)"/>
  <text x="465" y="95" text-anchor="middle" font-size="12" fill="#E8B65A">force</text>
  <text x="420" y="185" text-anchor="middle" font-size="12">object is drawn towards you</text>
  <line x1="290" y1="50" x2="290" y2="200" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="4 4"/>
</svg>
