<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .thread { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .magN { fill:#E58F8F; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .magS { fill:#6FB7E0; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .pole { font-size:15px; font-weight:bold; fill:#EAEAEA; }
    .lbl { fill:#E8B65A; font-size:12.5px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .compass { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
  </style>
  <!-- support -->
  <line x1="120" y1="30" x2="340" y2="30" stroke="#EAEAEA" stroke-width="3"/>
  <line class="thread" x1="230" y1="30" x2="230" y2="120"/>
  <text x="250" y="80" class="lbl">thread (free to turn)</text>
  <path class="lead" d="M248,76 L232,72"/>

  <!-- suspended magnet, aligned N-S -->
  <g>
    <rect class="magN" x="130" y="120" width="100" height="34" rx="2"/>
    <rect class="magS" x="230" y="120" width="100" height="34" rx="2"/>
    <text class="pole" x="150" y="142">N</text>
    <text class="pole" x="305" y="142">S</text>
  </g>

  <!-- compass rose showing geographic N-S -->
  <g transform="translate(230,240)">
    <circle class="compass" cx="0" cy="0" r="46"/>
    <line x1="-60" y1="0" x2="60" y2="0" class="compass"/>
    <line x1="0" y1="-60" x2="0" y2="60" class="compass"/>
    <text x="0" y="-66" text-anchor="middle" font-size="13" fill="#E58F8F">geographic North</text>
    <text x="0" y="80" text-anchor="middle" font-size="13" fill="#6FB7E0">geographic South</text>
  </g>

  <text x="120" y="180" class="lbl">north-seeking (N) pole</text>
  <path class="lead" d="M150,176 L165,156"/>
  <text x="300" y="180" text-anchor="end" class="lbl">south-seeking (S) pole</text>
  <path class="lead" d="M300,176 L295,156"/>
</svg>
