<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .string { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .arc { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 4; fill:none; }
    .bob { fill:#6FB7E0; stroke:#EAEAEA; stroke-width:1.4; }
    .ghost { fill:none; stroke:#9AA0A6; stroke-width:1.3; }
    .pivot { fill:#EAEAEA; }
  </style>
  <defs><marker id="sw" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9AA0A6"/></marker></defs>
  <!-- pivot -->
  <line data-step="1" x1="170" y1="40" x2="250" y2="40" stroke="#EAEAEA" stroke-width="2"/>
  <circle data-step="1" class="pivot" cx="210" cy="40" r="4"/>
  <!-- strings -->
  <line data-step="2" class="string" x1="210" y1="40" x2="110" y2="160"/>
  <line data-step="2" class="string" x1="210" y1="40" x2="210" y2="200"/>
  <line data-step="2" class="string" x1="210" y1="40" x2="310" y2="160"/>
  <!-- swing arc with arrows -->
  <path data-step="3" class="arc" d="M110,168 Q210,238 310,168" marker-end="url(#sw)"/>
  <!-- bobs -->
  <circle data-step="4" class="bob" cx="110" cy="160" r="12"/>
  <circle data-step="4" class="bob" cx="210" cy="200" r="12"/>
  <circle data-step="4" class="bob" cx="310" cy="160" r="12"/>
  <!-- labels -->
  <text data-step="5" x="86" y="150" fill="#EAEAEA">A</text>
  <text data-step="5" x="218" y="228" fill="#EAEAEA">B</text>
  <text data-step="5" x="320" y="150" fill="#EAEAEA">C</text>
</svg>
