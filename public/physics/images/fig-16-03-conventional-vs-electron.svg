<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 20 500 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .conv { stroke:#E8B65A; stroke-width:2.4; fill:none; }
    .elec { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <!-- circuit rectangle -->
  <rect data-step="1" class="wire" x="90" y="80" width="340" height="180" fill="none"/>

  <!-- cell at top -->
  <line data-step="2" class="wire" x1="90" y1="80" x2="235" y2="80"/>
  <line data-step="2" class="wire" x1="285" y1="80" x2="430" y2="80"/>
  <line data-step="2" class="wire" x1="235" y1="62" x2="235" y2="98" stroke-width="2.4"/>
  <line data-step="2" class="wire" x1="251" y1="72" x2="251" y2="88" stroke-width="5"/>
  <text data-step="2" x="228" y="52" class="lbl">+</text>
  <text data-step="2" x="253" y="52" class="lbl">&#8722;</text>

  <!-- conventional current : leaves + (left plate is long = +), flows down left side -->
  <path data-step="3" class="conv" d="M90,150 L90,190"/>
  <path data-step="3" class="conv" d="M90,190 l-6,-12 M90,190 l6,-12"/>
  <text data-step="3" x="102" y="150" class="lbl" fill="#E8B65A">conventional</text>
  <text data-step="3" x="102" y="168" class="lbl" fill="#E8B65A">current</text>

  <!-- electron flow : opposite circulation, down the right side -->
  <path data-step="4" class="elec" d="M430,150 L430,190"/>
  <path data-step="4" class="elec" d="M430,190 l-6,-12 M430,190 l6,-12"/>
  <text data-step="4" x="418" y="150" class="lbl" fill="#6FB7E0" text-anchor="end">electron</text>
  <text data-step="4" x="418" y="168" class="lbl" fill="#6FB7E0" text-anchor="end">flow</text>

  <text data-step="4" x="260" y="292" font-size="14" text-anchor="middle" fill="#9AA0A6">Conventional current and electron flow</text>
  <text data-step="4" x="260" y="311" font-size="14" text-anchor="middle" fill="#9AA0A6">travel in opposite directions.</text>
</svg>
