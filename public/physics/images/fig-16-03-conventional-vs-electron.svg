<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .conv { stroke:#E8B65A; stroke-width:2.4; fill:none; }
    .elec { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <!-- circuit rectangle -->
  <rect class="wire" x="90" y="80" width="340" height="180" fill="none"/>

  <!-- cell at top -->
  <line class="wire" x1="90" y1="80" x2="235" y2="80"/>
  <line class="wire" x1="285" y1="80" x2="430" y2="80"/>
  <line class="wire" x1="235" y1="62" x2="235" y2="98" stroke-width="2.4"/>
  <line class="wire" x1="251" y1="72" x2="251" y2="88" stroke-width="5"/>
  <text x="228" y="52" class="lbl">+</text>
  <text x="253" y="52" class="lbl">&#8722;</text>

  <!-- conventional current : leaves + (left plate is long = +), flows down left side -->
  <path class="conv" d="M90,150 L90,190"/>
  <path class="conv" d="M90,190 l-6,-12 M90,190 l6,-12"/>
  <text x="20" y="150" class="lbl" fill="#E8B65A">conventional</text>
  <text x="42" y="165" class="lbl" fill="#E8B65A">current</text>

  <!-- electron flow : opposite circulation, down the right side -->
  <path class="elec" d="M430,150 L430,190"/>
  <path class="elec" d="M430,190 l-6,-12 M430,190 l6,-12"/>
  <text x="445" y="150" class="lbl" fill="#6FB7E0">electron</text>
  <text x="452" y="165" class="lbl" fill="#6FB7E0">flow</text>

  <text x="260" y="300" font-size="12.5" text-anchor="middle" fill="#9AA0A6">Conventional current and electron flow travel in opposite directions.</text>
</svg>
