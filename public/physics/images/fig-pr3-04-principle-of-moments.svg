<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .rule { fill:#EAEAEA; fill-opacity:0.10; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .base { fill:none; stroke:#EAEAEA; stroke-width:2.4; }
    .force-weight { fill:none; stroke:#E58F8F; stroke-width:2.4; }
    .guide { fill:none; stroke:#9AA0A6; stroke-width:1.2; }
    .guide-dash { fill:none; stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:4 3; }
    .lbl-weight { fill:#E58F8F; font-size:13px; }
    .lbl-guide { fill:#9AA0A6; }
  </style>
  <defs>
    <marker id="c4red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
    <marker id="c4gry" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/></marker>
  </defs>

  <!-- TOP: pivot under the centre of gravity, zero perpendicular distance -->
  <rect class="rule" x="70" y="95" width="280" height="12"/>
  <text x="300" y="88">uniform rule</text>
  <path class="pivot" d="M210,107 L196,131 L224,131 Z"/>
  <path class="base" d="M168,131 L252,131"/>
  <path class="guide-dash" d="M210,107 L210,134"/>
  <path class="force-weight" d="M210,40 L210,92" marker-end="url(#c4red)"/>
  <circle cx="210" cy="101" r="3" fill="#EAEAEA"/>
  <text class="lbl-weight" x="218" y="58">weight W</text>
  <text class="lbl-guide" x="236" y="126">d = 0</text>
  <text class="lbl-guide" x="210" y="152" text-anchor="middle">pivot</text>
  <text x="210" y="178" text-anchor="middle">weight acts through the pivot, so the moment is zero</text>

  <!-- BOTTOM: pivot away from the centre of gravity -->
  <rect class="rule" x="70" y="265" width="280" height="12"/>
  <path class="pivot" d="M140,277 L126,301 L154,301 Z"/>
  <path class="base" d="M98,301 L182,301"/>
  <path class="guide" d="M140,250 L210,250" marker-start="url(#c4gry)" marker-end="url(#c4gry)"/>
  <path class="guide" d="M90,250 L140,250" marker-start="url(#c4gry)" marker-end="url(#c4gry)"/>
  <path class="guide-dash" d="M140,252 L140,276"/>
  <text class="lbl-guide" x="175" y="244" text-anchor="middle">d</text>
  <text class="lbl-guide" x="115" y="244" text-anchor="middle">d₂</text>
  <path class="force-weight" d="M210,215 L210,262" marker-end="url(#c4red)"/>
  <circle cx="210" cy="271" r="3" fill="#EAEAEA"/>
  <text class="lbl-weight" x="218" y="233">weight W</text>
  <path class="force-weight" d="M90,279 L90,340" marker-end="url(#c4red)"/>
  <text class="lbl-weight" x="98" y="318">load F</text>
  <text x="210" y="372" text-anchor="middle">the rule's weight acts a distance d from the pivot</text>
</svg>
