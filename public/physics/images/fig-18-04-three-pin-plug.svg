<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 585 400" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .body { fill:#6FB7E0; opacity:0.10; stroke:#EAEAEA; stroke-width:2; }
    .pin { fill:#9AA0A6; opacity:0.35; stroke:#EAEAEA; stroke-width:1.4; }
    .brown { stroke:#E8B65A; stroke-width:3; fill:none; }
    .blue { stroke:#6FB7E0; stroke-width:3; fill:none; }
    .gy { stroke:#86C98B; stroke-width:3; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .term { fill:none; stroke:#EAEAEA; stroke-width:1.4; }
    .fuse { fill:#E8B65A; opacity:0.20; stroke:#E8B65A; stroke-width:1.6; }
  </style>
  <!-- plug body -->
  <path data-step="1" class="body" d="M150,60 Q150,45 175,45 L385,45 Q410,45 410,60 L410,300 Q410,330 360,330 L200,330 Q150,330 150,300 Z"/>

  <!-- earth pin (top) -->
  <rect data-step="2" class="pin" x="272" y="58" width="16" height="46" rx="2"/>
  <!-- live pin (right) & neutral pin (left) -->
  <rect data-step="3" class="pin" x="340" y="150" width="16" height="44" rx="2"/>
  <rect data-step="3" class="pin" x="205" y="150" width="16" height="44" rx="2"/>

  <!-- earth terminal + green/yellow wire -->
  <circle data-step="4" class="term" cx="280" cy="115" r="6"/>
  <path data-step="4" class="gy" d="M280,121 Q262,150 250,180 Q244,215 258,250"/>
  <!-- neutral terminal + blue wire (left pin) -->
  <circle data-step="5" class="term" cx="213" cy="205" r="6"/>
  <path data-step="5" class="blue" d="M213,211 Q210,240 240,258"/>
  <!-- fuse then live wire (right pin) -->
  <rect data-step="6" class="fuse" x="330" y="204" width="46" height="18" rx="3"/>
  <text data-step="6" x="353" y="198" text-anchor="middle" font-size="12" style="fill:#E8B65A">fuse</text>
  <circle data-step="6" class="term" cx="348" cy="240" r="6"/>
  <path data-step="6" class="brown" d="M330,213 L318,213 L318,235 Q318,255 300,262"/>
  <line data-step="6" class="brown" x1="348" y1="222" x2="348" y2="234"/>

  <!-- cord grip -->
  <rect data-step="7" class="term" x="250" y="255" width="60" height="18" rx="3"/>
  <!-- cable sleeve -->
  <path data-step="8" class="body" d="M262,273 L262,315 Q262,330 280,330 Q298,330 298,315 L298,273 Z"/>

  <!-- labels -->
  <line data-step="9" class="lead" x1="250" y1="180" x2="120" y2="150"/>
  <text data-step="9" x="115" y="146" text-anchor="end" font-size="13.5" style="fill:#86C98B">earth wire</text>
  <text data-step="9" x="115" y="162" text-anchor="end" font-size="13.5" style="fill:#86C98B">(green/yellow)</text>
  <line data-step="9" class="lead" x1="213" y1="211" x2="120" y2="235"/>
  <text data-step="9" x="115" y="232" text-anchor="end" font-size="13.5" style="fill:#6FB7E0">neutral wire</text>
  <text data-step="9" x="115" y="248" text-anchor="end" font-size="13.5" style="fill:#6FB7E0">(blue)</text>
  <line data-step="9" class="lead" x1="353" y1="213" x2="470" y2="185"/>
  <text data-step="9" x="475" y="182" font-size="13.5" style="fill:#E8B65A">fuse</text>
  <text data-step="9" x="475" y="198" font-size="13.5" style="fill:#E8B65A">(in live wire)</text>
  <line data-step="9" class="lead" x1="330" y1="235" x2="470" y2="245"/>
  <text data-step="9" x="475" y="242" font-size="13.5" style="fill:#E8B65A">live wire</text>
  <text data-step="9" x="475" y="258" font-size="13.5" style="fill:#E8B65A">(brown)</text>
  <line data-step="9" class="lead" x1="308" y1="264" x2="470" y2="300"/>
  <text data-step="9" x="475" y="303" font-size="13.5">cord grip</text>
  <line data-step="9" class="lead" x1="298" y1="300" x2="465" y2="340"/>
  <text data-step="9" x="470" y="343" font-size="13.5">cable sleeve</text>

  <text data-step="9" x="292" y="380" text-anchor="middle" font-size="13">Colours: live = brown, neutral = blue, earth = green/yellow</text>
</svg>
