<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .out { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .mirror { stroke:#EAEAEA; stroke-width:2.5; }
    .norm { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
  </style>
  <!-- mirror surface with hatching -->
  <line class="mirror" x1="70" y1="220" x2="490" y2="220"/>
  <g stroke="#9AA0A6" stroke-width="1">
    <line x1="90" y1="220" x2="78" y2="234"/><line x1="120" y1="220" x2="108" y2="234"/>
    <line x1="150" y1="220" x2="138" y2="234"/><line x1="180" y1="220" x2="168" y2="234"/>
    <line x1="210" y1="220" x2="198" y2="234"/><line x1="240" y1="220" x2="228" y2="234"/>
    <line x1="270" y1="220" x2="258" y2="234"/><line x1="300" y1="220" x2="288" y2="234"/>
    <line x1="330" y1="220" x2="318" y2="234"/><line x1="360" y1="220" x2="348" y2="234"/>
    <line x1="390" y1="220" x2="378" y2="234"/><line x1="420" y1="220" x2="408" y2="234"/>
    <line x1="450" y1="220" x2="438" y2="234"/>
  </g>
  <!-- normal at P(280,220) -->
  <path class="norm" d="M280,220 L280,60"/>
  <text x="280" y="50" text-anchor="middle" font-size="12">normal</text>
  <!-- incident ray from upper-left to P, i=40 from normal -->
  <path class="inc" marker-end="url(#a1)" d="M177,97 L278,218"/>
  <!-- reflected ray from P to upper-right, r=40 -->
  <path class="out" marker-end="url(#a2)" d="M282,218 L383,97"/>
  <!-- angle arcs -->
  <path class="arc" d="M280,160 A60,60 0 0,0 241,175"/>
  <path class="arc" d="M280,160 A60,60 0 0,1 319,175"/>
  <text x="243" y="170" font-size="14" font-style="italic">i</text>
  <text x="309" y="170" font-size="14" font-style="italic">r</text>
  <text x="150" y="110" text-anchor="end" font-size="12" fill="#E8B65A">incident ray</text>
  <text x="410" y="110" font-size="12" fill="#6FB7E0">reflected ray</text>
  <!-- legend / law box -->
  <text x="300" y="272" text-anchor="middle" font-size="13">Angle of incidence (<tspan font-style="italic">i</tspan>) = angle of reflection (<tspan font-style="italic">r</tspan>)</text>
</svg>
