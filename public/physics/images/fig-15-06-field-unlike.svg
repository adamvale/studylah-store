<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 0 500 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah6" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .fl { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .pos { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.8; }
    .sym { font-size:22px; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <text x="310" y="26" text-anchor="middle" font-size="14">Field lines between two unlike charges</text>
  <!-- + at (200,160), - at (420,160). Lines run from + to - -->
  <!-- straight central line -->
  <line class="fl" x1="224" y1="160" x2="392" y2="160" marker-end="url(#ah6)"/>
  <!-- curved lines above -->
  <path class="fl" d="M215,142 Q310,92 405,142" marker-end="url(#ah6)"/>
  <path class="fl" d="M208,130 Q310,50 412,130" marker-end="url(#ah6)"/>
  <!-- curved lines below -->
  <path class="fl" d="M215,178 Q310,228 405,178" marker-end="url(#ah6)"/>
  <path class="fl" d="M208,190 Q310,270 412,190" marker-end="url(#ah6)"/>
  <!-- outer radial from + (left side, going away) curving toward - -->
  <path class="fl" d="M176,160 Q120,160 150,110" marker-end="url(#ah6)"/>
  <path class="fl" d="M176,160 Q120,160 150,210" marker-end="url(#ah6)"/>
  <!-- outer lines entering - from far side -->
  <path class="fl" d="M470,110 Q500,160 444,160" marker-end="url(#ah6)"/>
  <path class="fl" d="M470,210 Q500,160 444,160" marker-end="url(#ah6)"/>
  <!-- charges -->
  <circle cx="200" cy="160" r="24" class="pos"/>
  <text x="200" y="168" class="sym" fill="#E58F8F">+</text>
  <circle cx="420" cy="160" r="24" class="neg"/>
  <text x="420" y="168" class="sym" fill="#6FB7E0">−</text>
  <!-- labels -->
  <line class="lead" x1="310" y1="52" x2="310" y2="78"/>
  <text x="310" y="46" text-anchor="middle" font-size="12" fill="#9AA0A6">field weaker further out</text>
  <text x="310" y="150" text-anchor="middle" font-size="12" fill="#9AA0A6">field strongest here</text>
</svg>
