    <path class="field" d="M225.0,80.1 L257.0,135.5" marker-end="url(#ah-f)"/>
    <path class="field" d="M261.2,65.1 L277.7,126.9" marker-end="url(#ah-f)"/>
    <path class="field" d="M300.0,60.0 L300.0,124.0" marker-end="url(#ah-f)"/>
    <path class="field" d="M338.8,65.1 L322.3,126.9" marker-end="url(#ah-f)"/>
