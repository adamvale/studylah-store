  <!-- object X -->
  <circle class="planet" cx="300" cy="210" r="78"/>
  <text x="300" y="215" text-anchor="middle" font-size="15">object X</text>
  <!-- object Y placed in the field -->
  <circle cx="392" cy="150" r="8" fill="#E8B65A" stroke="#E8B65A"/>
  <!-- force on Y toward X -->
  <path class="force" d="M382,158 L344,183" marker-end="url(#ah-y)"/>
  <!-- labels -->
  <path class="lead" d="M400,146 L470,120"/>
  <text x="475" y="124" font-size="13" fill="#E8B65A">object Y</text>
  <path class="lead" d="M360,175 L470,175"/>
  <text x="475" y="171" font-size="13" fill="#86C98B">gravitational</text>
  <text x="475" y="187" font-size="13" fill="#86C98B">force</text>
  <path class="lead" d="M158,240 L95,270"/>
  <text x="90" y="266" text-anchor="end" font-size="13">gravitational field</text>
  <text x="90" y="282" text-anchor="end" font-size="13">of object X</text>
  <!-- caption -->
  <text x="310" y="405" text-anchor="middle" font-size="12.5" fill="#9AA0A6">Object X exerts a gravitational force on object Y placed in its field.</text>
