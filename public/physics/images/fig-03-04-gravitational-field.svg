<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .planet { fill:#6FB7E0; opacity:0.28; stroke:#6FB7E0; stroke-width:1.8; }
    .field { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .force { stroke:#86C98B; stroke-width:2.4; fill:none; }
  </style>
  <defs>
    <marker id="ah-f" markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#9AA0A6"/>
    </marker>
    <marker id="ah-y" markerWidth="9" markerHeight="9" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#86C98B"/>
    </marker>
  </defs>
  <!-- radial field lines pointing inward -->
    <path class="field" d="M450.0,210.0 L386.0,210.0" marker-end="url(#ah-f)"/>
