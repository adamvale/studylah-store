<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .bar { fill:#9AA0A6; opacity:0.20; stroke:#EAEAEA; stroke-width:1.5; }
    .coil { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .wire { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .pole { font-size:14px; font-weight:bold; fill:#EAEAEA; }
    .lbl { fill:#E8B65A; font-size:12.5px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .cur { stroke:#86C98B; stroke-width:2; fill:none; }
    .chead { fill:#86C98B; }
  </style>

  <!-- steel bar inside solenoid -->
  <rect class="bar" x="200" y="70" width="240" height="40" rx="2"/>
  <text class="pole" x="212" y="95">N</text>
  <text class="pole" x="420" y="95">S</text>

  <!-- solenoid coils across the bar -->
  <g class="coil">
    <path d="M210,70 C205,55 235,55 230,70"/>
    <path d="M235,70 C230,55 260,55 255,70"/>
    <path d="M260,70 C255,55 285,55 280,70"/>
    <path d="M285,70 C280,55 310,55 305,70"/>
    <path d="M310,70 C305,55 335,55 330,70"/>
    <path d="M335,70 C330,55 360,55 355,70"/>
    <path d="M360,70 C355,55 385,55 380,70"/>
    <path d="M385,70 C380,55 410,55 405,70"/>
    <path d="M410,70 C405,55 435,55 430,70"/>
  </g>

  <!-- leads to battery -->
  <path class="wire" d="M225,110 L225,150 L300,150"/>
  <path class="wire" d="M420,110 L420,150 L345,150"/>
  <!-- battery symbol -->
  <g stroke="#EAEAEA" fill="none">
    <line x1="315" y1="140" x2="315" y2="160" stroke-width="2.4"/>
    <line x1="330" y1="145" x2="330" y2="155" stroke-width="1.4"/>
  </g>
  <text x="322" y="180" text-anchor="middle" class="lbl">d.c. supply</text>

  <text x="200" y="45" class="lbl">solenoid (coil of wire)</text>
  <text x="450" y="90" class="lbl">steel bar becomes a</text>
  <text x="450" y="106" class="lbl">permanent magnet</text>
  <path class="lead" d="M448,101 L440,95"/>

  <!-- ==== end-on rule ==== -->
  <text x="30" y="235" font-size="13" font-weight="bold">Which end becomes which pole?</text>
  <!-- N end: anticlockwise current -->
  <g transform="translate(70,270)">
    <circle cx="0" cy="0" r="26" class="cur"/>
    <path class="cur" d="M0,-26 A26,26 0 0 0 -22,14"/>
    <polygon class="chead" points="-26,4 -18,10 -14,0"/>
    <text x="0" y="55" text-anchor="middle" font-size="12">anticlockwise</text>
    <text x="0" y="70" text-anchor="middle" font-size="12">= North pole</text>
  </g>
  <!-- S end: clockwise current -->
  <g transform="translate(520,270)">
    <circle cx="0" cy="0" r="26" class="cur"/>
    <path class="cur" d="M0,-26 A26,26 0 0 1 22,14"/>
    <polygon class="chead" points="26,4 18,10 14,0"/>
    <text x="0" y="55" text-anchor="middle" font-size="12">clockwise</text>
    <text x="0" y="70" text-anchor="middle" font-size="12">= South pole</text>
  </g>
  <!-- little magnet in middle -->
  <g transform="translate(240,258)">
    <rect class="bar" x="0" y="0" width="160" height="30" rx="2"/>
    <text class="pole" x="10" y="21">N</text>
    <text class="pole" x="140" y="21">S</text>
  </g>
  <text x="320" y="330" text-anchor="middle" class="lbl">(view each end looking along the axis)</text>
</svg>
