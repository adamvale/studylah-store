<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .ray { stroke:#6FB7E0; stroke-width:1.6; fill:none; }
    .lens { fill:#6FB7E0; fill-opacity:0.20; stroke:#6FB7E0; stroke-width:1.6; }
    .axis { stroke:#9AA0A6; stroke-width:1; }
    .fp { stroke:#E8B65A; stroke-width:1.2; stroke-dasharray:5 4; }
    .dim { stroke:#9AA0A6; stroke-width:1.1; }
    .pf { fill:#E8B65A; }
  </style>
  <line data-step="1" class="axis" x1="50" y1="170" x2="470" y2="170"/>
  <text data-step="1" x="60" y="162" font-size="12">principal axis</text>
  <path data-step="1" class="lens" d="M250,90 Q282,170 250,250 Q218,170 250,90 Z"/>
  <!-- parallel incoming rays -->
  <path data-step="1" class="ray" d="M60,110 L250,110"/>
  <path data-step="1" class="ray" d="M60,140 L250,140"/>
  <path data-step="1" class="ray" d="M60,170 L250,170"/>
  <path data-step="1" class="ray" d="M60,200 L250,200"/>
  <path data-step="1" class="ray" d="M60,230 L250,230"/>
  <!-- refracted rays converge to F(400,170) -->
  <path data-step="2" class="ray" marker-end="url(#a2)" d="M250,110 L400,170"/>
  <path data-step="2" class="ray" marker-end="url(#a2)" d="M250,140 L400,170"/>
  <path data-step="2" class="ray" marker-end="url(#a2)" d="M250,170 L400,170"/>
  <path data-step="2" class="ray" marker-end="url(#a2)" d="M250,200 L400,170"/>
  <path data-step="2" class="ray" marker-end="url(#a2)" d="M250,230 L400,170"/>
  <!-- focal plane -->
  <path data-step="3" class="fp" d="M400,95 L400,245"/>
  <text data-step="3" x="408" y="105" font-size="12">focal plane</text>
  <!-- markers -->
  <circle data-step="4" class="pf" cx="250" cy="170" r="3.5"/>
  <text data-step="4" x="250" y="270" text-anchor="middle" font-size="13">C (optical centre)</text>
  <circle data-step="4" class="pf" cx="400" cy="170" r="3.5"/>
  <text data-step="4" x="400" y="188" text-anchor="middle" font-size="13" fill="#E8B65A">F</text>
  <!-- focal length -->
  <line data-step="5" class="dim" x1="250" y1="292" x2="400" y2="292"/>
  <line data-step="5" class="dim" x1="250" y1="286" x2="250" y2="298"/>
  <line data-step="5" class="dim" x1="400" y1="286" x2="400" y2="298"/>
  <text data-step="5" x="325" y="310" text-anchor="middle" font-size="13">focal length <tspan font-style="italic">f</tspan></text>
</svg>
