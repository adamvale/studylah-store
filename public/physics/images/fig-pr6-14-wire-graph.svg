<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 290" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .fit  { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .guide{ stroke:#9AA0A6; stroke-width:1.2; fill:none; stroke-dasharray:5 3; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .mark { fill:#EAEAEA; }
    .ax   { fill:#E8B65A; font-size:13px; }
    .note { fill:#9AA0A6; font-size:12px; }
  </style>
  <defs>
    <marker id="a14" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>

  <!-- axes -->
  <line data-step="1" class="axis" x1="75" y1="235" x2="75" y2="46" marker-end="url(#a14)"/>
  <line data-step="1" class="axis" x1="75" y1="235" x2="385" y2="235" marker-end="url(#a14)"/>
  <text data-step="1" class="ax" x="66" y="36" text-anchor="end">R/L (&#937;/m)</text>
  <text data-step="1" class="ax" x="383" y="262" text-anchor="end">1/L (1/m)</text>
  <text data-step="1" x="67" y="251" text-anchor="end">O</text>

  <!-- best-fit line with a positive intercept -->
  <path data-step="2" class="fit" d="M75,190 L330,70"/>
  <circle data-step="2" class="mark" cx="75" cy="190" r="3.5"/>

  <!-- gradient triangle -->
  <path data-step="3" class="guide" d="M150,154.7 L270,154.7 L270,98.2"/>
  <text data-step="3" class="note" x="210" y="174" text-anchor="middle">&#916;(1/L)</text>
  <text data-step="3" class="note" x="278" y="132">&#916;(R/L)</text>

  <text data-step="3" class="note" x="250" y="52">gradient = R_X</text>
  <path data-step="3" class="lead" d="M86,199 L78,192"/>
  <text data-step="3" class="note" x="88" y="208">intercept = &#961;/A</text>
</svg>
