<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 190" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13.5px; }
    .varbox { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .controlled { fill:none; stroke:#9AA0A6; stroke-width:1.5; stroke-dasharray:6 4; }
    .ctrl-lbl { fill:#9AA0A6; font-size:13px; }
    .sub { fill:#9AA0A6; font-size:11.5px; }
    .link { stroke:#EAEAEA; stroke-width:2; fill:none; }
  </style>
  <defs>
    <marker id="vr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>

  <text data-step="3" x="210" y="34" text-anchor="middle" class="ctrl-lbl">Controlled variables: kept constant</text>
  <rect data-step="1" class="controlled" x="22" y="48" width="376" height="120" rx="8"/>

  <rect data-step="1" class="varbox" x="40" y="76" width="130" height="84" rx="7"/>
  <text data-step="3" x="105" y="104" text-anchor="middle">Independent</text>
  <text data-step="3" x="105" y="122" text-anchor="middle">variable</text>
  <text data-step="3" x="105" y="144" text-anchor="middle" class="sub">you change it</text>

  <line data-step="2" class="link" x1="176" y1="118" x2="244" y2="118" marker-end="url(#vr1)"/>

  <rect data-step="2" class="varbox" x="250" y="76" width="130" height="84" rx="7"/>
  <text data-step="4" x="315" y="104" text-anchor="middle">Dependent</text>
  <text data-step="4" x="315" y="122" text-anchor="middle">variable</text>
  <text data-step="4" x="315" y="144" text-anchor="middle" class="sub">you measure it</text>
</svg>
