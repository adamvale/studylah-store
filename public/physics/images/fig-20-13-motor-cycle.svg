<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .pole { fill:#9AA0A6; fill-opacity:0.20; stroke:#EAEAEA; stroke-width:1.4; }
    .plbl { fill:#EAEAEA; font-size:14px; font-weight:bold; text-anchor:middle; }
    .coil { stroke:#EAEAEA; stroke-width:3; fill:none; }
    .force{ stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .ttl  { fill:#EAEAEA; font-size:13px; font-weight:bold; text-anchor:middle; }
    .ring { stroke:#E8B65A; stroke-width:4; fill:none; }
    .brush{ fill:#86C98B; fill-opacity:0.5; stroke:#86C98B; stroke-width:1.2; }
    .mom  { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .ok   { fill:#86C98B; }
    .off  { fill:#E58F8F; }
  </style>
  <defs>
    <marker id="mf2" markerWidth="12" markerHeight="12" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#E58F8F"/></marker>
    <marker id="mm" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6FB7E0"/></marker>
  </defs>

  <!-- ===== PANEL 1: horizontal ===== -->
  <text class="ttl" x="170" y="24">Coil horizontal &#8212; maximum turning</text>
  <rect class="pole" x="40" y="70" width="34" height="120"/>
  <rect class="pole" x="266" y="70" width="34" height="120"/>
  <text class="plbl" x="57" y="135">N</text>
  <text class="plbl" x="283" y="135">S</text>
  <!-- coil horizontal: left end out, right end in -->
  <line class="coil" x1="120" y1="130" x2="220" y2="130"/>
  <circle cx="120" cy="130" r="9" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.6"/>
  <circle cx="120" cy="130" r="2.6" fill="#EAEAEA"/>
  <circle cx="220" cy="130" r="9" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.6"/>
  <line x1="214" y1="124" x2="226" y2="136" stroke="#EAEAEA" stroke-width="1.4"/>
  <line x1="226" y1="124" x2="214" y2="136" stroke="#EAEAEA" stroke-width="1.4"/>
  <line class="force" x1="120" y1="118" x2="120" y2="82" marker-end="url(#mf2)"/>
  <line class="force" x1="220" y1="142" x2="220" y2="178" marker-end="url(#mf2)"/>
  <text fill="#E58F8F" x="128" y="92">F</text>
  <text fill="#E58F8F" x="228" y="176">F</text>
  <!-- commutator closed -->
  <circle cx="170" cy="235" r="20" class="ring"/>
  <line x1="170" y1="215" x2="170" y2="255" stroke="#0d0d0d" stroke-width="3"/>
  <rect class="brush" x="140" y="228" width="12" height="14"/>
  <rect class="brush" x="188" y="228" width="12" height="14"/>
  <text class="ok" x="170" y="285" text-anchor="middle">brushes touch ring &#8594; current flows</text>

  <!-- divider -->
  <line x1="350" y1="20" x2="350" y2="300" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== PANEL 2: vertical ===== -->
  <text class="ttl" x="510" y="24">Coil vertical &#8212; current cut off</text>
  <rect class="pole" x="380" y="70" width="34" height="120"/>
  <rect class="pole" x="606" y="70" width="34" height="120"/>
  <text class="plbl" x="397" y="135">N</text>
  <text class="plbl" x="623" y="135">S</text>
  <!-- coil vertical -->
  <line class="coil" x1="510" y1="90" x2="510" y2="180"/>
  <circle cx="510" cy="90" r="9" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.6"/>
  <circle cx="510" cy="90" r="2.6" fill="#EAEAEA"/>
  <circle cx="510" cy="180" r="9" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.6"/>
  <line x1="504" y1="174" x2="516" y2="186" stroke="#EAEAEA" stroke-width="1.4"/>
  <line x1="516" y1="174" x2="504" y2="186" stroke="#EAEAEA" stroke-width="1.4"/>
  <!-- momentum arrow -->
  <path class="mom" d="M540,110 A40,40 0 0 1 560,150" marker-end="url(#mm)"/>
  <text fill="#6FB7E0" x="566" y="130">momentum</text>
  <!-- commutator open: gaps aligned with brushes -->
  <circle cx="510" cy="235" r="20" class="ring"/>
  <line x1="490" y1="235" x2="530" y2="235" stroke="#0d0d0d" stroke-width="3"/>
  <rect class="brush" x="480" y="228" width="12" height="14"/>
  <rect class="brush" x="528" y="228" width="12" height="14"/>
  <text class="off" x="510" y="285" text-anchor="middle">gaps meet brushes &#8594; circuit open</text>
</svg>
