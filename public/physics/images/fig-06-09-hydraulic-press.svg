<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .tube { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .liq { fill:#6FB7E0; opacity:0.20; }
    .piston { fill:#9AA0A6; opacity:0.40; stroke:#EAEAEA; stroke-width:1.5; }
    .force { stroke:#E58F8F; stroke-width:2.4; }
    .lbl { font-size:11px; }
    .amber { fill:#E8B65A; }
  </style>
  <!-- U-shaped vessel: narrow left limb, wide right limb -->
  <path class="liq" d="M60,120 L60,220 L420,220 L420,110 L360,110 L360,180 L120,180 L120,120 Z"/>
  <path class="tube" d="M60,90 L60,220 L420,220 L420,80"/>
  <path class="tube" d="M120,90 L120,180 L360,180 L360,80"/>
  <!-- small piston M (left) -->
  <rect class="piston" x="60" y="112" width="60" height="12"/>
  <line class="force" x1="90" y1="70" x2="90" y2="108" marker-end="url(#hf)"/>
  <text x="98" y="86" class="lbl amber">F&#8321; (small)</text>
  <text x="55" y="145" class="lbl">piston M, area A&#8321;</text>

  <!-- large piston N (right) -->
  <rect class="piston" x="360" y="102" width="60" height="12"/>
  <line class="force" x1="390" y1="102" x2="390" y2="64" marker-end="url(#hf)"/>
  <text x="360" y="56" class="lbl amber">F&#8322; (large)</text>
  <text x="360" y="140" class="lbl">piston N, area A&#8322;</text>

  <text x="240" y="215" text-anchor="middle" class="lbl">liquid (incompressible)</text>
  <text x="240" y="250" text-anchor="middle" class="lbl amber">Pressure equal both sides:  F&#8321;/A&#8321; = F&#8322;/A&#8322;</text>
  <defs>
    <marker id="hf" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto"><path d="M0,0 L4,7 L8,0 Z" fill="#E58F8F"/></marker>
  </defs>
</svg>
