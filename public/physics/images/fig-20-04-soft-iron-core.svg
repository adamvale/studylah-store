<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .coil { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .core { fill:#9AA0A6; fill-opacity:0.28; stroke:#9AA0A6; stroke-width:1.4; }
    .fld  { stroke:#9AA0A6; stroke-width:1.5; fill:none; }
    .lbl  { fill:#E8B65A; font-size:14px; }
    .pole { fill:#EAEAEA; font-size:16px; font-weight:bold; text-anchor:middle; }
    .poleN { fill:#E58F8F; font-size:16px; font-weight:bold; text-anchor:middle; }
    .poleS { fill:#6FB7E0; font-size:16px; font-weight:bold; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <defs>
    <marker id="f4" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9AA0A6"/>
    </marker>
  </defs>

  <!-- soft iron core bar -->
  <rect data-step="1" class="core" x="150" y="128" width="260" height="44" rx="4"/>
  <text data-step="1" class="poleN" x="168" y="158">N</text>
  <text data-step="1" class="poleS" x="392" y="158">S</text>

  <!-- coil turns wound over the core -->
  <g data-step="2" class="coil">
    <path d="M170,128 q14,-20 28,0"/>
    <path d="M198,128 q14,-20 28,0"/>
    <path d="M226,128 q14,-20 28,0"/>
    <path d="M254,128 q14,-20 28,0"/>
    <path d="M282,128 q14,-20 28,0"/>
    <path d="M310,128 q14,-20 28,0"/>
    <path d="M338,128 q14,-20 28,0"/>
    <path d="M170,172 q14,20 28,0"/>
    <path d="M198,172 q14,20 28,0"/>
    <path d="M226,172 q14,20 28,0"/>
    <path d="M254,172 q14,20 28,0"/>
    <path d="M282,172 q14,20 28,0"/>
    <path d="M310,172 q14,20 28,0"/>
    <path d="M338,172 q14,20 28,0"/>
  </g>

  <!-- external field lines (strong electromagnet) -->
  <path data-step="3" class="fld" d="M160,120 C120,60 440,60 400,120" marker-end="url(#f4)"/>
  <path data-step="3" class="fld" d="M160,180 C120,240 440,240 400,180" marker-end="url(#f4)"/>

  <text data-step="3" class="lbl" x="424" y="152">soft iron core</text>
  <path data-step="3" class="lead" d="M420,149 L412,150"/>
  <text data-step="3" class="lbl" x="280" y="40" text-anchor="middle">a stronger electromagnet is produced</text>
  <path data-step="3" class="lead" d="M280,46 L280,88"/>
</svg>
