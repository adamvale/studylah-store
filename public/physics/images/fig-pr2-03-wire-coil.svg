<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 232" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .pencil { fill:#EAEAEA; fill-opacity:0.10; stroke:#EAEAEA; stroke-width:1.8; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .len { stroke:#6FB7E0; stroke-width:2.2; fill:none; }
    .lentx { fill:#6FB7E0; font-size:15px; }
    .guide { stroke:#9AA0A6; stroke-width:1.1; stroke-dasharray:4 3; fill:none; }
    .lbl { fill:#EAEAEA; font-size:12px; }
    .sub { fill:#9AA0A6; font-size:12px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <defs><marker id="bl3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/></marker><marker id="bl3s" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#6FB7E0"/></marker></defs>
  <path data-step="1" class="pencil" d="M40,88 L360,88 L400,107 L360,126 L40,126 Z"/>
