  <text data-step="3" class="lbl" x="210" y="55" text-anchor="middle">wire wound in tight turns</text>
  <path data-step="2" class="lead" d="M210,61 L210,86"/>
  <text data-step="3" class="sub" x="55" y="78">pencil</text>
  <path data-step="2" class="lead" d="M70,82 L80,90"/>
  <text data-step="4" x="210" y="192" text-anchor="middle">n = 16 turns</text>
  <text data-step="4" x="210" y="216" text-anchor="middle">one diameter = d / n</text>
