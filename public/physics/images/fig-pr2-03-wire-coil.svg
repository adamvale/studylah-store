  <ellipse data-step="1" class="wire" cx="192" cy="107" rx="6" ry="21"/>
  <ellipse data-step="1" class="wire" cx="204" cy="107" rx="6" ry="21"/>
  <ellipse data-step="1" class="wire" cx="216" cy="107" rx="6" ry="21"/>
  <ellipse data-step="1" class="wire" cx="228" cy="107" rx="6" ry="21"/>
  <ellipse data-step="2" class="wire" cx="240" cy="107" rx="6" ry="21"/>
  <ellipse data-step="2" class="wire" cx="252" cy="107" rx="6" ry="21"/>
