<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .cliff { fill:#6FB7E0; opacity:0.20; stroke:#EAEAEA; stroke-width:1.4; }
    .ground { stroke:#EAEAEA; stroke-width:1.6; }
    .path { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:4 3; fill:none; }
    .arr { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ball { fill:#6FB7E0; stroke:#EAEAEA; stroke-width:1.2; }
    .lb { fill:#E8B65A; font-size:12px; }
  </style>
  <defs>
    <marker id="ct" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
  </defs>
  <!-- cliff block -->
  <rect class="cliff" x="60" y="140" width="140" height="120"/>
  <line class="ground" x1="60" y1="260" x2="380" y2="260"/>
  <text x="110" y="205">cliff</text>
  <!-- ball at top edge, thrown up -->
  <circle class="ball" cx="210" cy="140" r="8"/>
  <line class="arr" x1="210" y1="132" x2="210" y2="70" marker-end="url(#ct)"/>
  <text class="lb" x="220" y="100">7 m/s (up)</text>
  <!-- path down to ground -->
  <path class="path" d="M210,150 C245,180 245,235 245,255"/>
  <line class="arr" x1="245" y1="215" x2="245" y2="255" marker-end="url(#ct)"/>
  <text x="255" y="270">ground</text>
</svg>
