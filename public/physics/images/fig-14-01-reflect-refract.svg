<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .out { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .opaque { fill:#EAEAEA; opacity:0.85; }
    .glass { fill:#6FB7E0; opacity:0.22; stroke:#6FB7E0; stroke-width:1.4; }
    .norm { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:5 4; }
  </style>
  <!-- Panel 1: reflection off opaque surface -->
  <rect class="opaque" x="120" y="150" width="220" height="14" rx="2"/>
  <path class="inc" marker-end="url(#a1)" d="M140,50 L228,148"/>
  <path class="out" marker-end="url(#a2)" d="M232,148 L320,50"/>
  <text x="230" y="196" text-anchor="middle" font-size="14">Light is <tspan fill="#6FB7E0">reflected</tspan> at an</text>
  <text x="230" y="215" text-anchor="middle" font-size="14">opaque surface.</text>
  <!-- Panel 2: refraction into transparent medium -->
  <rect class="glass" x="130" y="305" width="200" height="115"/>
  <path class="norm" d="M220,270 L220,360"/>
  <path class="inc" marker-end="url(#a1)" d="M160,270 L218,305"/>
  <path class="out" marker-end="url(#a2)" d="M220,305 L262,395"/>
  <text x="230" y="446" text-anchor="middle" font-size="14">Light is <tspan fill="#6FB7E0">refracted</tspan> entering</text>
  <text x="230" y="465" text-anchor="middle" font-size="14">a transparent medium.</text>
</svg>
