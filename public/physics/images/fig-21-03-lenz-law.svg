<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .coil { fill:none; stroke:#6FB7E0; stroke-width:1.6; }
    .mag { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .magS { fill:#6FB7E0; opacity:0.28; }
    .magN { fill:#E58F8F; opacity:0.28; }
    .mot { stroke:#E8B65A; stroke-width:1.8; fill:none; marker-end:url(#ar); }
    .pole { font-size:14px; fill:#E58F8F; }
    .poleS { font-size:14px; fill:#6FB7E0; }
    .force { stroke:#86C98B; stroke-width:1.8; fill:none; marker-end:url(#ag); }
    .note { font-size:12px; text-anchor:middle; }
  </style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#E8B65A"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#86C98B"/></marker>
  </defs>

  <!-- Panel A: N-pole moving towards -> induced N-pole (repels) -->
  <g>
    <text x="60" y="46" font-size="12">towards</text>
    <path class="mot" d="M50,58 L130,58"/>
    <rect class="mag magS" x="30" y="72" width="45" height="34"/>
    <rect class="mag magN" x="75" y="72" width="45" height="34"/>
    <rect class="mag" x="30" y="72" width="90" height="34"/>
    <text x="46" y="94" font-size="14">S</text><text x="92" y="94" font-size="14">N</text>
    <!-- induced N pole faces magnet -->
    <text class="pole" x="150" y="94">N</text>
    <text class="poleS" x="253" y="94">S</text>
    <g class="coil">
      <ellipse cx="172" cy="89" rx="7" ry="20"/><ellipse cx="188" cy="89" rx="7" ry="20"/>
      <ellipse cx="204" cy="89" rx="7" ry="20"/><ellipse cx="220" cy="89" rx="7" ry="20"/>
      <ellipse cx="236" cy="89" rx="7" ry="20"/>
    </g>
    <!-- repulsion arrow -->
    <path class="force" d="M138,120 L112,120"/>
    <text x="150" y="150" font-size="11" fill="#86C98B">coil repels magnet</text>
    <path class="wire" d="M165,89 L158,89 L158,200 L185,200"/>
    <path class="wire" d="M243,89 L250,89 L250,200 L223,200"/>
    <circle cx="204" cy="200" r="15" fill="none" stroke="#EAEAEA" stroke-width="1.6"/>
    <text x="200" y="205" font-size="13" text-anchor="middle" fill="#E8B65A">G</text>
    <text class="note" x="150" y="255">N approaches &#8594; induced N-pole</text>
    <text class="note" x="150" y="272">opposes the motion (repulsion)</text>
  </g>

  <!-- Panel B: N-pole moving away -> induced S-pole (attracts) -->
  <g transform="translate(360,0)">
    <text x="60" y="46" font-size="12">away</text>
    <path class="mot" d="M130,58 L50,58"/>
    <rect class="mag magS" x="30" y="72" width="45" height="34"/>
    <rect class="mag magN" x="75" y="72" width="45" height="34"/>
    <rect class="mag" x="30" y="72" width="90" height="34"/>
    <text x="46" y="94" font-size="14">S</text><text x="92" y="94" font-size="14">N</text>
    <text class="poleS" x="150" y="94">S</text>
    <text class="pole" x="253" y="94">N</text>
    <g class="coil">
      <ellipse cx="172" cy="89" rx="7" ry="20"/><ellipse cx="188" cy="89" rx="7" ry="20"/>
      <ellipse cx="204" cy="89" rx="7" ry="20"/><ellipse cx="220" cy="89" rx="7" ry="20"/>
      <ellipse cx="236" cy="89" rx="7" ry="20"/>
    </g>
    <path class="force" d="M112,120 L138,120"/>
    <text x="150" y="150" font-size="11" fill="#86C98B">coil attracts magnet</text>
    <path class="wire" d="M165,89 L158,89 L158,200 L185,200"/>
    <path class="wire" d="M243,89 L250,89 L250,200 L223,200"/>
    <circle cx="204" cy="200" r="15" fill="none" stroke="#EAEAEA" stroke-width="1.6"/>
    <text x="200" y="205" font-size="13" text-anchor="middle" fill="#E8B65A">G</text>
    <text class="note" x="150" y="255">N recedes &#8594; induced S-pole</text>
    <text class="note" x="150" y="272">opposes the motion (attraction)</text>
  </g>
</svg>
