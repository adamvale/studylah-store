<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .glass { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .merc { fill:#9AA0A6; opacity:0.55; }
    .height { stroke:#E8B65A; stroke-width:1.5; }
    .lbl { font-size:11px; }
  </style>
  <!-- reservoir -->
  <path class="glass" d="M120,300 L120,272 Q120,262 130,262 L270,262 Q280,262 280,272 L280,300"/>
  <rect class="merc" x="122" y="270" width="156" height="30"/>
  <!-- tube -->
  <path class="glass" d="M175,270 L175,70 Q175,58 187,58 Q199,58 199,70 L199,270"/>
  <rect class="merc" x="176" y="105" width="22" height="165"/>
  <text x="215" y="80" class="lbl">vacuum</text>

  <!-- point A: near top of column -->
  <circle cx="187" cy="130" r="3.5" fill="#E8B65A"/>
  <text x="205" y="134" class="lbl" fill="#E8B65A">A</text>
  <!-- height from top surface (105) down to A (130) = 22 cm -->
  <line class="height" x1="150" y1="105" x2="150" y2="130"/>
  <line class="height" x1="145" y1="105" x2="155" y2="105"/><line class="height" x1="145" y1="130" x2="155" y2="130"/>
  <text x="118" y="122" class="lbl" fill="#E8B65A">22 cm</text>

  <!-- point B: at reservoir surface level (270) -->
  <circle cx="187" cy="270" r="3.5" fill="#E8B65A"/>
  <text x="205" y="266" class="lbl" fill="#E8B65A">B</text>
  <text x="215" y="282" class="lbl">(reservoir level)</text>

  <!-- point C: below reservoir surface -->
  <circle cx="187" cy="290" r="3.5" fill="#E8B65A"/>
  <text x="205" y="294" class="lbl" fill="#E8B65A">C</text>
  <line class="height" x1="150" y1="270" x2="150" y2="290"/>
  <line class="height" x1="145" y1="270" x2="155" y2="270"/><line class="height" x1="145" y1="290" x2="155" y2="290"/>
  <text x="118" y="285" class="lbl" fill="#E8B65A">4 cm</text>

  <!-- full column height -->
  <line class="height" x1="300" y1="105" x2="300" y2="270"/>
  <line class="height" x1="295" y1="105" x2="305" y2="105"/><line class="height" x1="295" y1="270" x2="305" y2="270"/>
  <text x="308" y="192" class="lbl" fill="#E8B65A">76 cm</text>
</svg>
