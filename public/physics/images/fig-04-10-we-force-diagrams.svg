<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.24; stroke:#6FB7E0; stroke-width:1.5; }
    .f { stroke:#EAEAEA; stroke-width:2.2; }
    .lbl { font-size:12; }
  </style>
  <!-- (i) vertical -->
  <text x="110" y="26" text-anchor="middle" font-size="13" font-weight="bold">(i)</text>
  <rect class="box" x="85" y="110" width="50" height="40"/>
  <line class="f" x1="110" y1="110" x2="110" y2="45" marker-end="url(#arw)"/>
  <text x="120" y="70" class="lbl">90 N</text>
  <line class="f" x1="110" y1="150" x2="110" y2="215" marker-end="url(#arw)"/>
  <text x="120" y="195" class="lbl">140 N</text>
  <!-- (ii) horizontal -->
  <text x="330" y="26" text-anchor="middle" font-size="13" font-weight="bold">(ii)</text>
  <rect class="box" x="305" y="95" width="50" height="40"/>
  <line class="f" x1="300" y1="115" x2="235" y2="115" marker-end="url(#arw)"/>
  <text x="248" y="105" class="lbl">30 N</text>
  <line class="f" x1="360" y1="115" x2="425" y2="115" marker-end="url(#arw)"/>
  <text x="385" y="105" class="lbl">45 N</text>
  <!-- (iii) cross -->
  <text x="540" y="26" text-anchor="middle" font-size="13" font-weight="bold">(iii)</text>
  <rect class="box" x="515" y="110" width="50" height="40"/>
  <line class="f" x1="510" y1="130" x2="450" y2="130" marker-end="url(#arw)"/>
  <text x="455" y="120" class="lbl">120 N</text>
  <line class="f" x1="565" y1="130" x2="620" y2="130" marker-end="url(#arw)"/>
  <text x="580" y="120" class="lbl">120 N</text>
  <line class="f" x1="540" y1="110" x2="540" y2="55" marker-end="url(#arw)"/>
  <text x="548" y="72" class="lbl">60 N</text>
  <line class="f" x1="540" y1="150" x2="540" y2="205" marker-end="url(#arw)"/>
  <text x="548" y="190" class="lbl">15 N</text>
  <text x="310" y="248" text-anchor="middle" font-size="11.5">Find the resultant force in each diagram.</text>
</svg>
