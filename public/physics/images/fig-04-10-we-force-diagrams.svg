<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.24; stroke:#6FB7E0; stroke-width:1.5; }
    .f { stroke:#EAEAEA; stroke-width:2.2; }
    .lbl { font-size:13; }
  </style>
  <!-- (i) vertical -->
  <text data-step="1" x="210" y="30" text-anchor="middle" font-size="14" font-weight="bold">(i)</text>
  <rect data-step="1" class="box" x="185" y="110" width="50" height="40"/>
  <line data-step="1" class="f" x1="210" y1="110" x2="210" y2="45" marker-end="url(#arw)"/>
  <text data-step="1" x="220" y="70" class="lbl">90 N</text>
  <line data-step="1" class="f" x1="210" y1="150" x2="210" y2="215" marker-end="url(#arw)"/>
  <text data-step="1" x="220" y="195" class="lbl">140 N</text>
  <!-- (ii) horizontal -->
  <text data-step="2" x="210" y="272" text-anchor="middle" font-size="14" font-weight="bold">(ii)</text>
  <rect data-step="2" class="box" x="185" y="295" width="50" height="40"/>
  <line data-step="2" class="f" x1="180" y1="315" x2="115" y2="315" marker-end="url(#arw)"/>
  <text data-step="2" x="128" y="303" class="lbl">30 N</text>
  <line data-step="2" class="f" x1="240" y1="315" x2="305" y2="315" marker-end="url(#arw)"/>
  <text data-step="2" x="262" y="303" class="lbl">45 N</text>
  <!-- (iii) cross -->
  <text data-step="3" x="210" y="392" text-anchor="middle" font-size="14" font-weight="bold">(iii)</text>
  <rect data-step="3" class="box" x="185" y="440" width="50" height="40"/>
  <line data-step="3" class="f" x1="180" y1="460" x2="115" y2="460" marker-end="url(#arw)"/>
  <text data-step="3" x="115" y="448" class="lbl">120 N</text>
  <line data-step="3" class="f" x1="240" y1="460" x2="305" y2="460" marker-end="url(#arw)"/>
  <text data-step="3" x="262" y="448" class="lbl">120 N</text>
  <line data-step="3" class="f" x1="210" y1="440" x2="210" y2="405" marker-end="url(#arw)"/>
  <text data-step="3" x="220" y="418" class="lbl">60 N</text>
  <line data-step="3" class="f" x1="210" y1="480" x2="210" y2="535" marker-end="url(#arw)"/>
  <text data-step="3" x="220" y="520" class="lbl">15 N</text>
  <text data-step="3" x="210" y="590" text-anchor="middle" font-size="13.5">Find the resultant force in each diagram.</text>
</svg>
