<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .turn { stroke:#86C98B; stroke-width:1.8; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect class="beam" x="50" y="110" width="380" height="11"/>
  <!-- central pivot -->
  <polygon class="pivot" points="228,150 252,150 240,121"/>
  <text class="lbl" x="240" y="170" text-anchor="middle">pivot</text>
  <!-- vertical centre line -->
  <line class="dim" x1="240" y1="60" x2="240" y2="121" stroke-dasharray="4 3"/>
  <!-- d1 left -->
  <line class="dim" x1="100" y1="80" x2="240" y2="80"/>
  <path class="dim" d="M100,80 l8,-4 M100,80 l8,4"/>
  <path class="dim" d="M240,80 l-8,-4 M240,80 l-8,4"/>
  <text class="lbl" x="170" y="74" text-anchor="middle">distance, d₁</text>
  <!-- d2 right -->
  <line class="dim" x1="240" y1="80" x2="370" y2="80"/>
  <path class="dim" d="M240,80 l8,-4 M240,80 l8,4"/>
  <path class="dim" d="M370,80 l-8,-4 M370,80 l-8,4"/>
  <text class="lbl" x="305" y="74" text-anchor="middle">distance, d₂</text>
  <!-- F1 down left -->
  <line class="dim" x1="100" y1="80" x2="100" y2="110" stroke-dasharray="3 3"/>
  <line class="force" x1="100" y1="98" x2="100" y2="145"/>
  <path class="force" d="M100,145 l-5,-10 M100,145 l5,-10"/>
  <text class="lbl" x="100" y="165" text-anchor="middle" fill="#E58F8F">F₁</text>
  <!-- F2 down right -->
  <line class="dim" x1="370" y1="80" x2="370" y2="110" stroke-dasharray="3 3"/>
  <line class="force" x1="370" y1="98" x2="370" y2="145"/>
  <path class="force" d="M370,145 l-5,-10 M370,145 l5,-10"/>
  <text class="lbl" x="370" y="165" text-anchor="middle" fill="#E58F8F">F₂</text>
  <!-- turning labels -->
  <path class="turn" d="M150,200 A26,26 0 0 1 176,178"/>
  <path class="turn" d="M150,200 l1,-9 M150,200 l9,1"/>
  <text class="lbl" x="150" y="222" text-anchor="middle" fill="#86C98B">anticlockwise</text>
  <path class="turn" d="M330,200 A26,26 0 0 0 304,178"/>
  <path class="turn" d="M330,200 l-1,-9 M330,200 l-9,1"/>
  <text class="lbl" x="330" y="222" text-anchor="middle" fill="#86C98B">clockwise</text>
  <text class="lbl" x="240" y="242" text-anchor="middle" font-size="13">Balanced when  F₁ × d₁ = F₂ × d₂</text>
</svg>
