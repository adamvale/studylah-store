<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#9AA0A6; opacity:0.35; stroke:#9AA0A6; stroke-width:1.6; }
    .force { stroke:#E8B65A; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect data-step="1" class="beam" x="55" y="80" width="370" height="10"/>
  <!-- pivot right-of-centre at P -->
  <polygon data-step="1" class="pivot" points="288,118 312,118 300,90"/>
  <text data-step="1" class="lbl" x="300" y="138" text-anchor="middle">P</text>
  <!-- distances -->
  <line data-step="2" class="dim" x1="120" y1="52" x2="300" y2="52"/>
  <path data-step="2" class="dim" d="M120,52 l8,-4 M120,52 l8,4"/>
  <path data-step="2" class="dim" d="M300,52 l-8,-4 M300,52 l-8,4"/>
  <text data-step="2" class="lbl" x="210" y="46" text-anchor="middle">6 m</text>
  <line data-step="2" class="dim" x1="300" y1="52" x2="360" y2="52"/>
  <path data-step="2" class="dim" d="M300,52 l8,-4 M300,52 l8,4"/>
  <path data-step="2" class="dim" d="M360,52 l-8,-4 M360,52 l-8,4"/>
  <text data-step="2" class="lbl" x="330" y="46" text-anchor="middle">2 m</text>
  <line data-step="2" class="dim" x1="120" y1="52" x2="120" y2="80" stroke-dasharray="3 3"/>
  <line data-step="2" class="dim" x1="300" y1="52" x2="300" y2="90" stroke-dasharray="3 3"/>
  <line data-step="2" class="dim" x1="360" y1="52" x2="360" y2="80" stroke-dasharray="3 3"/>
  <!-- forces -->
  <line data-step="3" class="force" x1="120" y1="90" x2="120" y2="135"/>
  <path data-step="3" class="force" d="M120,135 l-5,-10 M120,135 l5,-10"/>
  <text data-step="3" class="lbl" x="120" y="153" text-anchor="middle" fill="#E8B65A">6 N</text>
  <line data-step="3" class="force" x1="360" y1="90" x2="360" y2="135"/>
  <path data-step="3" class="force" d="M360,135 l-5,-10 M360,135 l5,-10"/>
  <text data-step="3" class="lbl" x="360" y="153" text-anchor="middle" fill="#E8B65A">W</text>
</svg>
