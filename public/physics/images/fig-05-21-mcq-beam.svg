<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <rect class="beam" x="55" y="80" width="370" height="10"/>
  <!-- pivot right-of-centre at P -->
  <polygon class="pivot" points="288,118 312,118 300,90"/>
  <text class="lbl" x="300" y="138" text-anchor="middle">P</text>
  <!-- distances -->
  <line class="dim" x1="120" y1="52" x2="300" y2="52"/>
  <path class="dim" d="M120,52 l8,-4 M120,52 l8,4"/>
  <path class="dim" d="M300,52 l-8,-4 M300,52 l-8,4"/>
  <text class="lbl" x="210" y="46" text-anchor="middle">6 m</text>
  <line class="dim" x1="300" y1="52" x2="390" y2="52"/>
  <path class="dim" d="M300,52 l8,-4 M300,52 l8,4"/>
  <path class="dim" d="M390,52 l-8,-4 M390,52 l-8,4"/>
  <text class="lbl" x="345" y="46" text-anchor="middle">2 m</text>
  <line class="dim" x1="120" y1="52" x2="120" y2="80" stroke-dasharray="3 3"/>
  <line class="dim" x1="300" y1="52" x2="300" y2="90" stroke-dasharray="3 3"/>
  <line class="dim" x1="390" y1="52" x2="390" y2="80" stroke-dasharray="3 3"/>
  <!-- forces -->
  <line class="force" x1="120" y1="90" x2="120" y2="135"/>
  <path class="force" d="M120,135 l-5,-10 M120,135 l5,-10"/>
  <text class="lbl" x="120" y="153" text-anchor="middle" fill="#E58F8F">6 N</text>
  <line class="force" x1="390" y1="90" x2="390" y2="135"/>
  <path class="force" d="M390,135 l-5,-10 M390,135 l5,-10"/>
  <text class="lbl" x="390" y="153" text-anchor="middle" fill="#E58F8F">W</text>
</svg>
