<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .glass { fill:none; stroke:#9AA0A6; stroke-width:2; }
    .merc { fill:#6FB7E0; opacity:0.55; }
    .lead { stroke:#9AA0A6; stroke-width:1; }
    .height { stroke:#E8B65A; stroke-width:1.6; }
    .arrow { stroke:#E8B65A; stroke-width:2; }
    .lbl { font-size:12px; }
  </style>
  <!-- reservoir -->
  <path data-step="1" class="glass" d="M150,300 L150,270 Q150,260 160,260 L280,260 Q290,260 290,270 L290,300"/>
  <rect data-step="1" class="merc" x="152" y="268" width="136" height="30"/>
  <!-- tube -->
  <path data-step="2" class="glass" d="M200,268 L200,70 Q200,58 212,58 Q224,58 224,70 L224,268"/>
  <!-- mercury column in tube -->
  <rect data-step="3" class="merc" x="201" y="100" width="22" height="168"/>
  <!-- vacuum at top -->
  <text data-step="4" x="248" y="80" class="lbl">vacuum</text>
  <text data-step="4" x="248" y="94" class="lbl">(zero pressure)</text>
  <line data-step="4" class="lead" x1="218" y1="82" x2="240" y2="80"/>

  <!-- height marker 76 cm -->
  <line data-step="5" class="height" x1="160" y1="100" x2="160" y2="268"/>
  <line data-step="5" class="height" x1="155" y1="100" x2="165" y2="100"/>
  <line data-step="5" class="height" x1="155" y1="268" x2="165" y2="268"/>
  <text data-step="5" x="100" y="195" class="lbl" fill="#E8B65A">76 cm</text>
  <text data-step="5" x="100" y="210" class="lbl" fill="#E8B65A">(760 mm)</text>

  <!-- atmospheric pressure pushing on reservoir -->
  <line data-step="6" class="arrow" x1="265" y1="240" x2="265" y2="262" marker-end="url(#ba)"/>
  <text data-step="6" x="278" y="248" class="lbl">atmospheric</text>
  <text data-step="6" x="278" y="262" class="lbl">pressure</text>

  <text data-step="6" x="125" y="314" class="lbl">mercury reservoir</text>
  <defs>
    <marker id="ba" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#E8B65A"/></marker>
  </defs>
</svg>
