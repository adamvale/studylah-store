<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .tank { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .liq { fill:#6FB7E0; opacity:0.18; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; }
    .depth { stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:1.8; }
    .lbl { font-size:11px; }
  </style>
  <rect class="liq" x="60" y="60" width="330" height="150"/>
  <path class="tank" d="M60,45 L60,210 L390,210 L390,45"/>
  <line x1="60" y1="60" x2="390" y2="60" stroke="#6FB7E0" stroke-width="1.4"/>
  <text x="70" y="52" class="lbl">liquid surface</text>

  <!-- depth marker -->
  <line class="depth" x1="130" y1="60" x2="130" y2="150"/>
  <line class="depth" x1="125" y1="60" x2="135" y2="60"/>
  <line class="depth" x1="125" y1="150" x2="135" y2="150"/>
  <text x="140" y="110" class="lbl" fill="#E8B65A">depth h</text>

  <!-- particles column above point -->
  <g stroke="#9AA0A6" stroke-width="1" fill="none">
    <circle cx="235" cy="78" r="8"/><circle cx="253" cy="78" r="8"/><circle cx="271" cy="78" r="8"/>
    <circle cx="235" cy="96" r="8"/><circle cx="253" cy="96" r="8"/><circle cx="271" cy="96" r="8"/>
    <circle cx="235" cy="114" r="8"/><circle cx="253" cy="114" r="8"/><circle cx="271" cy="114" r="8"/>
  </g>
  <text x="300" y="98" class="lbl">particles above the point</text>
  <text x="300" y="114" class="lbl">have weight (mass &#215; g)</text>

  <!-- point with pressure acting in all directions -->
  <circle cx="253" cy="150" r="4" fill="#E8B65A"/>
  <g class="force">
    <line x1="253" y1="150" x2="253" y2="128" marker-end="url(#p)"/>
    <line x1="253" y1="150" x2="253" y2="172" marker-end="url(#p)"/>
    <line x1="253" y1="150" x2="231" y2="150" marker-end="url(#p)"/>
    <line x1="253" y1="150" x2="275" y2="150" marker-end="url(#p)"/>
  </g>
  <text x="180" y="200" text-anchor="middle" class="lbl">pressure acts in all directions</text>
  <text x="320" y="200" text-anchor="middle" class="lbl" fill="#E8B65A">P = h&#961;g</text>
  <defs>
    <marker id="p" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <path d="M0,0 L3.5,7 L7,0 Z" fill="#E58F8F"/>
    </marker>
  </defs>
</svg>
