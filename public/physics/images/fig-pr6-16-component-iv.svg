<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .fit  { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .guide{ stroke:#9AA0A6; stroke-width:1.2; fill:none; stroke-dasharray:5 3; }
    .ax   { fill:#E8B65A; font-size:13px; }
    .note { fill:#9AA0A6; font-size:12px; }
    .cx   { fill:#6FB7E0; font-size:12px; }
  </style>
  <defs>
    <marker id="a16" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>

  <!-- axes -->
  <line data-step="1" class="axis" x1="70" y1="235" x2="70" y2="46" marker-end="url(#a16)"/>
  <line data-step="1" class="axis" x1="70" y1="235" x2="385" y2="235" marker-end="url(#a16)"/>
  <text data-step="1" class="ax" x="62" y="36" text-anchor="end">I / A</text>
  <text data-step="1" class="ax" x="383" y="258" text-anchor="end">V / V</text>
  <text data-step="1" x="62" y="251" text-anchor="end">O</text>

  <!-- best-fit line: straight, through the origin -->
  <path data-step="2" class="fit" d="M70,235 L320,80"/>
  <text data-step="2" class="cx" x="95" y="80">component X</text>

  <!-- gradient triangle -->
  <path data-step="3" class="guide" d="M140,191.6 L250,191.6 L250,123.4"/>
  <text data-step="3" class="note" x="195" y="209" text-anchor="middle">&#916;V</text>
  <text data-step="3" class="note" x="258" y="162">&#916;I</text>

  <text data-step="3" class="note" x="250" y="60">gradient = 1/R</text>
  <text data-step="3" class="note" x="100" y="258">straight through O: ohmic</text>
</svg>
