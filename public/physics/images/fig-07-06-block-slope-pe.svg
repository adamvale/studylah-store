<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .slope { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .fill { fill:#9AA0A6; opacity:0.12; stroke:none; }
    .block { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .force { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { fill:#E8B65A; font-size:12px; }
  </style>
  <defs>
    <marker id="fm" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#86C98B"/></marker>
    <marker id="v1" markerWidth="10" markerHeight="9" refX="8" refY="3.5" orient="auto-start-reverse"><path d="M0,0 L8,3.5 L0,7 Z" fill="#9AA0A6"/></marker>
    <marker id="v2" markerWidth="10" markerHeight="9" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#9AA0A6"/></marker>
  </defs>
  <!-- triangle: base bottom, right vertical -->
  <polygon data-step="1" class="fill" points="60,210 330,210 330,60"/>
  <polyline data-step="1" class="slope" points="60,210 330,60"/>
  <line data-step="1" class="slope" x1="60" y1="210" x2="330" y2="210"/>
  <line data-step="1" class="slope" x1="330" y1="210" x2="330" y2="60"/>
  <!-- block on slope -->
  <g data-step="2" transform="translate(150,153) rotate(-29)">
    <rect class="block" x="-22" y="-16" width="44" height="30"/>
  </g>
  <!-- pushing force up the slope -->
  <line data-step="3" class="force" x1="88" y1="180" x2="124" y2="160" marker-end="url(#fm)"/>
  <text data-step="3" class="lbl" x="88" y="150">push</text>
  <!-- slope length label -->
  <text data-step="4" class="lbl" x="205" y="120" transform="rotate(-29 205 120)">5 m</text>
  <!-- height dimension -->
  <line data-step="5" class="dim" x1="360" y1="60" x2="360" y2="210" marker-start="url(#v1)" marker-end="url(#v2)"/>
  <text data-step="5" class="lbl" x="370" y="140">3 m</text>
  <line data-step="5" class="dim" x1="330" y1="60" x2="365" y2="60" stroke-dasharray="3 3"/>
</svg>
