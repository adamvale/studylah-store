<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .pole { fill:#9AA0A6; fill-opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .plbl { fill:#EAEAEA; font-size:16px; font-weight:bold; text-anchor:middle; }
    .fld  { stroke:#6FB7E0; stroke-width:1.4; fill:none; }
    .force{ stroke:#E58F8F; stroke-width:2.6; fill:none; }
    .coil { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .lbl  { fill:#E8B65A; }
    .rot  { stroke:#86C98B; stroke-width:2; fill:none; }
  </style>
  <defs>
    <marker id="fb" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6FB7E0"/></marker>
    <marker id="fp" markerWidth="12" markerHeight="12" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#E58F8F"/></marker>
    <marker id="rr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#86C98B"/></marker>
  </defs>

  <!-- poles -->
  <rect data-step="1" class="pole" x="40" y="70" width="46" height="190"/>
  <rect data-step="1" class="pole" x="534" y="70" width="46" height="190"/>
  <text data-step="1" class="plbl" x="63" y="172">N</text>
  <text data-step="1" class="plbl" x="557" y="172">S</text>

  <!-- field lines left(N) -> right(S), distorted around conductors -->
  <path data-step="2" class="fld" d="M86,110 C240,102 380,102 534,110" marker-end="url(#fb)"/>
  <path data-step="2" class="fld" d="M86,165 C180,165 200,140 250,150" marker-end="url(#fb)"/>
  <path data-step="2" class="fld" d="M270,152 C320,160 340,180 390,175" marker-end="url(#fb)"/>
  <path data-step="2" class="fld" d="M410,178 C460,182 500,165 534,165" marker-end="url(#fb)"/>
  <path data-step="2" class="fld" d="M86,220 C240,228 380,228 534,220" marker-end="url(#fb)"/>

  <!-- left conductor: current out -> force up -->
  <circle data-step="3" cx="255" cy="165" r="12" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.8"/>
  <circle data-step="3" cx="255" cy="165" r="3.2" fill="#EAEAEA"/>
  <line data-step="3" class="force" x1="255" y1="152" x2="255" y2="96" marker-end="url(#fp)"/>
  <text data-step="3" fill="#E58F8F" x="230" y="90" font-weight="bold">F</text>

  <!-- right conductor: current in -> force down -->
  <circle data-step="4" cx="400" cy="165" r="12" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.8"/>
  <line data-step="4" x1="393" y1="158" x2="407" y2="172" stroke="#EAEAEA" stroke-width="1.6"/>
  <line data-step="4" x1="407" y1="158" x2="393" y2="172" stroke="#EAEAEA" stroke-width="1.6"/>
  <line data-step="4" class="force" x1="400" y1="178" x2="400" y2="238" marker-end="url(#fp)"/>
  <text data-step="4" fill="#E58F8F" x="408" y="238" font-weight="bold">F</text>

  <text data-step="4" class="lbl" x="255" y="290" text-anchor="middle">current out (&#8857;)</text>
  <text data-step="4" class="lbl" x="400" y="290" text-anchor="middle">current in (&#8855;)</text>

  <!-- rotation indicator -->
  <path data-step="5" class="rot" d="M300,120 A40,40 0 0 1 355,120" marker-end="url(#rr)"/>
  <text data-step="5" fill="#86C98B" x="327" y="84" text-anchor="middle">turning effect (couple)</text>
</svg>
