<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { stroke:#EAEAEA; stroke-width:3; fill:none; }
    .fld  { stroke:#6FB7E0; stroke-width:1.6; fill:none; }
    .lbl  { fill:#E8B65A; font-size:12px; }
    .cap  { font-size:12px; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
    .ah   { fill:#6FB7E0; }
  </style>
  <defs>
    <marker id="cur" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#EAEAEA"/>
    </marker>
  </defs>

  <!-- SIDE VIEW -->
  <text x="120" y="34" text-anchor="middle" font-size="13" font-weight="bold">Side view</text>
  <line class="wire" x1="120" y1="315" x2="120" y2="70" marker-end="url(#cur)"/>
  <text class="lbl" x="150" y="70">current, I</text>
  <ellipse class="fld" cx="120" cy="120" rx="58" ry="15"/>
  <ellipse class="fld" cx="120" cy="180" rx="58" ry="15"/>
  <ellipse class="fld" cx="120" cy="240" rx="58" ry="15"/>
  <text class="lbl" x="120" y="345" text-anchor="middle">magnetic field</text>
  <path class="lead" d="M120,332 L178,240"/>

  <!-- TOP VIEW: current OUT of page -->
  <text x="400" y="34" text-anchor="middle" font-size="13" font-weight="bold">Top view</text>
  <g>
    <circle class="fld" cx="400" cy="185" r="26"/>
    <circle class="fld" cx="400" cy="185" r="46"/>
    <circle class="fld" cx="400" cy="185" r="66"/>
    <!-- current out: dot -->
    <circle cx="400" cy="185" r="9" fill="none" stroke="#EAEAEA" stroke-width="1.5"/>
    <circle cx="400" cy="185" r="2.6" fill="#EAEAEA"/>
    <!-- anticlockwise arrowheads: top points left, bottom points right -->
    <path class="ah" d="M404,159 L396,155 L404,151 z"/>
    <path class="ah" d="M396,211 L404,215 L396,219 z"/>
    <path class="ah" d="M374,181 L370,189 L366,181 z"/>
  </g>
  <text class="cap" x="400" y="285">current OUT of page (&#8857;)</text>
  <text class="cap" x="400" y="303" fill="#86C98B">field is anticlockwise</text>

  <!-- TOP VIEW: current INTO page -->
  <g>
    <circle class="fld" cx="600" cy="185" r="26"/>
    <circle class="fld" cx="600" cy="185" r="46"/>
    <circle class="fld" cx="600" cy="185" r="66"/>
    <!-- current in: cross -->
    <circle cx="600" cy="185" r="9" fill="none" stroke="#EAEAEA" stroke-width="1.5"/>
    <line x1="594" y1="179" x2="606" y2="191" stroke="#EAEAEA" stroke-width="1.5"/>
    <line x1="606" y1="179" x2="594" y2="191" stroke="#EAEAEA" stroke-width="1.5"/>
    <!-- clockwise arrowheads: top points right, bottom points left -->
    <path class="ah" d="M596,159 L604,155 L596,151 z"/>
    <path class="ah" d="M604,211 L596,215 L604,219 z"/>
    <path class="ah" d="M626,181 L630,189 L634,181 z"/>
  </g>
  <text class="cap" x="600" y="285">current INTO page (&#8855;)</text>
  <text class="cap" x="600" y="303" fill="#E58F8F">field is clockwise</text>
</svg>
