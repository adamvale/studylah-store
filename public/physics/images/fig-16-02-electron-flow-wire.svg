<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .e { fill:#6FB7E0; fill-opacity:0.30; stroke:#6FB7E0; stroke-width:1.4; }
    .arrow { stroke:#E8B65A; stroke-width:2.2; fill:none; }
  </style>
  <!-- cylindrical wire -->
  <ellipse class="wire" cx="160" cy="130" rx="26" ry="60"/>
  <path class="wire" d="M160,70 L420,70"/>
  <path class="wire" d="M160,190 L420,190"/>
  <path class="wire" d="M420,70 A26,60 0 0 1 420,190"/>
  <path class="wire" d="M420,70 A26,60 0 0 0 420,190" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- free electrons -->
  <g font-size="12" text-anchor="middle">
    <circle class="e" cx="240" cy="105" r="12"/><text x="240" y="109" fill="#6FB7E0">&#8722;</text>
    <circle class="e" cx="300" cy="95" r="12"/><text x="300" y="99" fill="#6FB7E0">&#8722;</text>
    <circle class="e" cx="360" cy="108" r="12"/><text x="360" y="112" fill="#6FB7E0">&#8722;</text>
    <circle class="e" cx="270" cy="150" r="12"/><text x="270" y="154" fill="#6FB7E0">&#8722;</text>
    <circle class="e" cx="330" cy="158" r="12"/><text x="330" y="162" fill="#6FB7E0">&#8722;</text>
    <circle class="e" cx="215" cy="150" r="12"/><text x="215" y="154" fill="#6FB7E0">&#8722;</text>
  </g>

  <!-- movement arrow (electrons drift left, toward + terminal externally) -->
  <path class="arrow" d="M215,130 L120,130"/>
  <path class="arrow" d="M120,130 l12,-6 M120,130 l12,6" fill="none"/>
  <text x="66" y="122" font-size="14" text-anchor="middle">movement</text>
  <text x="66" y="140" font-size="14" text-anchor="middle">of electrons</text>

  <!-- labels -->
  <line class="lead" x1="360" y1="108" x2="360" y2="225"/>
  <text x="360" y="243" font-size="14" text-anchor="middle">free electrons</text>
  <line class="lead" x1="400" y1="42" x2="400" y2="64"/>
  <text x="400" y="32" font-size="14" text-anchor="middle">conducting wire</text>
</svg>
