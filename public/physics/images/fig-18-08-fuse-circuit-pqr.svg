<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { stroke:#EAEAEA; stroke-width:1.8; fill:none; }
    .res { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.6; }
    .fuse { fill:#E8B65A; opacity:0.20; stroke:#E8B65A; stroke-width:1.6; }
    .open { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .amber { fill:#E8B65A; }
  </style>
  <!-- top rail with fuse and mains -->
  <line data-step="1" class="wire" x1="60" y1="50" x2="150" y2="50"/>
  <rect data-step="1" class="fuse" x="150" y="42" width="46" height="16" rx="3"/>
  <text data-step="1" x="173" y="35" text-anchor="middle" font-size="13.5" class="amber">fuse</text>
  <line data-step="1" class="wire" x1="196" y1="50" x2="280" y2="50"/>
  <circle data-step="1" cx="300" cy="50" r="3" class="wire"/>
  <circle data-step="1" cx="340" cy="50" r="3" class="wire"/>
  <line data-step="1" class="wire" x1="303" y1="50" x2="337" y2="50"/>
  <text data-step="1" x="320" y="35" text-anchor="middle" font-size="13.5">mains supply</text>
  <line data-step="1" class="wire" x1="343" y1="50" x2="420" y2="50"/>

  <!-- sides -->
  <line data-step="2" class="wire" x1="60" y1="50" x2="60" y2="270"/>
  <line data-step="2" class="wire" x1="420" y1="50" x2="420" y2="270"/>
  <line data-step="2" class="wire" x1="60" y1="270" x2="120" y2="270"/>

  <!-- three parallel branches P Q R each with switch -->
  <!-- P -->
  <line data-step="3" class="wire" x1="120" y1="270" x2="120" y2="120"/>
  <line data-step="3" class="wire" x1="120" y1="120" x2="160" y2="120"/>
  <rect data-step="3" class="res" x="160" y="108" width="64" height="24" rx="3"/>
  <text data-step="3" x="192" y="102" text-anchor="middle" font-size="14">P</text>
  <line data-step="3" class="wire" x1="224" y1="120" x2="270" y2="120"/>
  <line data-step="3" class="open" x1="290" y1="120" x2="312" y2="108"/>
  <circle data-step="3" cx="290" cy="120" r="2.5" class="amber"/>
  <line data-step="3" class="wire" x1="315" y1="120" x2="420" y2="120"/>
  <!-- Q -->
  <line data-step="4" class="wire" x1="120" y1="270" x2="120" y2="180" opacity="0"/>
  <line data-step="4" class="wire" x1="140" y1="180" x2="160" y2="180"/>
  <line data-step="4" class="wire" x1="140" y1="120" x2="140" y2="180"/>
  <rect data-step="4" class="res" x="160" y="168" width="64" height="24" rx="3"/>
  <text data-step="4" x="192" y="162" text-anchor="middle" font-size="14">Q</text>
  <line data-step="4" class="wire" x1="224" y1="180" x2="270" y2="180"/>
  <line data-step="4" class="open" x1="290" y1="180" x2="312" y2="168"/>
  <circle data-step="4" cx="290" cy="180" r="2.5" class="amber"/>
  <line data-step="4" class="wire" x1="315" y1="180" x2="400" y2="180"/>
  <line data-step="4" class="wire" x1="400" y1="120" x2="400" y2="240"/>
  <!-- R -->
  <line data-step="5" class="wire" x1="120" y1="240" x2="160" y2="240"/>
  <rect data-step="5" class="res" x="160" y="228" width="64" height="24" rx="3"/>
  <text data-step="5" x="192" y="222" text-anchor="middle" font-size="14">R</text>
  <line data-step="5" class="wire" x1="224" y1="240" x2="270" y2="240"/>
  <line data-step="5" class="open" x1="290" y1="240" x2="312" y2="228"/>
  <circle data-step="5" cx="290" cy="240" r="2.5" class="amber"/>
  <line data-step="5" class="wire" x1="315" y1="240" x2="400" y2="240"/>
</svg>
