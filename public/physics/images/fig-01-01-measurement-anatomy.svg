<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 210" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .lead { stroke:#9AA0A6; stroke-width:1.4; fill:none; }
    .blue { fill:#6FB7E0; }
    .amber { fill:#E8B65A; }
    .green { fill:#86C98B; }
  </style>
  <!-- central expression, split into parts so each leader lines up exactly -->
  <g font-size="24" font-weight="700">
    <text x="160" y="64" text-anchor="middle">Mass of copper</text>
    <text x="265" y="64" text-anchor="middle">=</text>
    <text x="305" y="64" text-anchor="middle" class="amber">10</text>
    <text x="355" y="64" text-anchor="middle" class="blue">kg</text>
  </g>
  <!-- leader to physical quantity -->
  <path class="lead" d="M160,74 L120,140"/>
  <text x="120" y="162" text-anchor="middle" font-size="15" class="green">physical quantity</text>
  <text x="120" y="182" text-anchor="middle" font-size="13">(what is measured)</text>
  <!-- leader to numerical magnitude -->
  <path class="lead" d="M305,74 L280,140"/>
  <text x="280" y="162" text-anchor="middle" font-size="15" class="amber">numerical magnitude</text>
  <text x="273" y="182" text-anchor="middle" font-size="13">(the size of the value)</text>
  <!-- leader to unit -->
  <path class="lead" d="M355,74 L430,140"/>
  <text x="430" y="162" text-anchor="middle" font-size="15" class="blue">unit</text>
  <text x="430" y="182" text-anchor="middle" font-size="13">(the standard used)</text>
</svg>
