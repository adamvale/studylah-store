<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect data-step="1" class="beam" x="60" y="120" width="350" height="11"/>
  <polygon data-step="1" class="pivot" points="62,157 86,157 74,131"/>
  <text data-step="1" class="lbl" x="74" y="177" text-anchor="middle">pivot</text>
  <!-- d1 -->
  <line data-step="1" class="dim" x1="74" y1="90" x2="200" y2="90"/>
  <path data-step="1" class="dim" d="M74,90 l8,-4 M74,90 l8,4"/>
  <path data-step="1" class="dim" d="M200,90 l-8,-4 M200,90 l-8,4"/>
  <text data-step="1" class="lbl" x="137" y="84" text-anchor="middle">d₁</text>
  <!-- d2 -->
  <line data-step="2" class="dim" x1="74" y1="62" x2="340" y2="62"/>
  <path data-step="2" class="dim" d="M74,62 l8,-4 M74,62 l8,4"/>
  <path data-step="2" class="dim" d="M340,62 l-8,-4 M340,62 l-8,4"/>
  <text data-step="2" class="lbl" x="207" y="56" text-anchor="middle">d₂</text>
  <!-- guides -->
  <line data-step="3" class="dim" x1="74" y1="62" x2="74" y2="131" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="200" y1="90" x2="200" y2="120" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="340" y1="62" x2="340" y2="120" stroke-dasharray="3 3"/>
  <!-- forces -->
  <line data-step="4" class="force" x1="200" y1="105" x2="200" y2="155"/>
  <path data-step="4" class="force" d="M200,155 l-5,-10 M200,155 l5,-10"/>
  <text data-step="4" class="lbl" x="200" y="176" text-anchor="middle" fill="#E58F8F">F₁</text>
  <line data-step="4" class="force" x1="340" y1="105" x2="340" y2="155"/>
  <path data-step="4" class="force" d="M340,155 l-5,-10 M340,155 l5,-10"/>
  <text data-step="4" class="lbl" x="340" y="176" text-anchor="middle" fill="#E58F8F">F₂</text>
  <text data-step="4" class="lbl" x="230" y="212" text-anchor="middle" font-size="13">Both forces turn the beam the same way:</text>
  <text data-step="4" class="lbl" x="230" y="231" text-anchor="middle" font-size="13">total moment = F₁d₁ + F₂d₂</text>
</svg>
