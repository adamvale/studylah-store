<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 285" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .truevalue { stroke:#9AA0A6; stroke-width:1.8; stroke-dasharray:7 4; }
    .true-lbl { fill:#9AA0A6; font-size:12px; }
    .shifted { stroke:#E58F8F; stroke-width:1.8; stroke-dasharray:7 4; }
    .shift-lbl { fill:#E58F8F; font-size:12px; }
    .reading { stroke:#EAEAEA; stroke-width:2; stroke-linecap:round; }
    .offset { stroke:#EAEAEA; stroke-width:1.6; }
    .scale { stroke:#EAEAEA; stroke-width:1.8; }
    .tick { stroke:#EAEAEA; stroke-width:1.4; }
    .pointer { stroke:#E58F8F; stroke-width:2.2; }
    .num { font-size:11.5px; fill:#9AA0A6; }
    .cap { font-size:13px; }
  </style>
  <defs>
    <marker id="se1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
    <marker id="se1back" markerWidth="9" markerHeight="8" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
    <marker id="se2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/>
    </marker>
  </defs>

  <!-- top: whole spread shifted off the true value -->
  <line data-step="1" class="shifted" x1="60" y1="78" x2="300" y2="78"/>
  <text data-step="1" x="308" y="82" class="shift-lbl">readings</text>
  <line data-step="1" class="truevalue" x1="60" y1="120" x2="300" y2="120"/>
  <text data-step="1" x="308" y="124" class="true-lbl">true value</text>

  <path data-step="1" class="reading" d="M70,66 l10,10 M80,66 l-10,10"/>
  <path data-step="1" class="reading" d="M100,78 l10,10 M110,78 l-10,10"/>
  <path data-step="1" class="reading" d="M130,69 l10,10 M140,69 l-10,10"/>
  <path data-step="1" class="reading" d="M220,80 l10,10 M230,80 l-10,10"/>
  <path data-step="1" class="reading" d="M250,67 l10,10 M260,67 l-10,10"/>
  <path data-step="1" class="reading" d="M280,76 l10,10 M290,76 l-10,10"/>

  <line data-step="1" class="offset" x1="180" y1="78" x2="180" y2="120" marker-start="url(#se1back)" marker-end="url(#se1)"/>
  <text data-step="1" x="190" y="107">fixed offset</text>
  <text data-step="1" x="60" y="152" class="cap">Every reading is off the same way</text>

  <!-- bottom: zero error on the instrument -->
  <line data-step="2" class="scale" x1="60" y1="215" x2="300" y2="215"/>
  <path data-step="2" class="tick" d="M60,215 v7 M110,215 v7 M160,215 v7 M210,215 v7 M260,215 v7"/>
  <text data-step="2" x="60" y="237" text-anchor="middle" class="num">0</text>
  <text data-step="2" x="110" y="237" text-anchor="middle" class="num">1</text>
  <text data-step="2" x="160" y="237" text-anchor="middle" class="num">2</text>
  <text data-step="2" x="210" y="237" text-anchor="middle" class="num">3</text>
  <text data-step="2" x="260" y="237" text-anchor="middle" class="num">4</text>
  <line data-step="2" class="pointer" x1="72" y1="184" x2="72" y2="212" marker-end="url(#se2)"/>
  <text data-step="2" x="82" y="190" class="shift-lbl">pointer sits here with nothing measured</text>
  <text data-step="2" x="60" y="266" class="cap">Zero error: it does not read 0</text>
</svg>
