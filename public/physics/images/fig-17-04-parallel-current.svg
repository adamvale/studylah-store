<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah4" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .res { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cellL { stroke:#EAEAEA; stroke-width:2; }
    .cellS { stroke:#EAEAEA; stroke-width:5; }
    .cur { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .lbl { fill:#6FB7E0; font-style:italic; }
    .accent { fill:#E8B65A; }
    .lead { fill:none; stroke:#9AA0A6; stroke-width:1.3; }
  </style>
  <!-- top wire with cell -->
  <path class="wire" d="M70,55 L235,55"/>
  <path class="wire" d="M285,55 L400,55"/>
  <line class="cellL" x1="248" y1="37" x2="248" y2="73"/>
  <line class="cellS" x1="262" y1="47" x2="262" y2="63"/>
  <!-- left and right rails down -->
  <path class="wire" d="M70,55 L70,190"/>
  <path class="wire" d="M400,55 L400,190"/>
  <!-- branch 1 -->
  <path class="wire" d="M70,110 L175,110"/>
  <path class="wire" d="M235,110 L400,110"/>
  <rect class="res" x="175" y="96" width="60" height="28"/>
  <!-- branch 2 -->
  <path class="wire" d="M70,190 L175,190"/>
  <path class="wire" d="M235,190 L400,190"/>
  <rect class="res" x="175" y="176" width="60" height="28"/>
  <!-- main current I -->
  <line class="cur" x1="150" y1="55" x2="120" y2="55" marker-end="url(#ah4)"/>
  <text x="150" y="44" font-size="14" class="lbl">I</text>
  <!-- branch currents -->
  <line class="cur" x1="120" y1="110" x2="150" y2="110" marker-end="url(#ah4)"/>
  <text x="120" y="102" font-size="14" class="lbl">I</text><text x="130" y="106" font-size="10" class="lbl">1</text>
  <line class="cur" x1="120" y1="190" x2="150" y2="190" marker-end="url(#ah4)"/>
  <text x="120" y="182" font-size="14" class="lbl">I</text><text x="130" y="186" font-size="10" class="lbl">2</text>
  <!-- split label -->
  <path class="lead" d="M40,150 L68,120"/>
  <path class="lead" d="M40,150 L68,178"/>
  <text x="20" y="155" font-size="11" fill="#9AA0A6">splits</text>
  <!-- identity box -->
  <rect x="430" y="105" width="110" height="40" rx="4" fill="none" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="485" y="130" text-anchor="middle" font-size="13" class="accent">I = I₁ + I₂ + …</text>
</svg>
