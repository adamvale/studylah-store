<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .shape { fill:#6FB7E0; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .med { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; fill:none; }
    .cg { fill:#E8B65A; stroke:#E8B65A; }
    .lbl { font-size:12px; }
  </style>
  <!-- triangle -->
  <polygon class="shape" points="40,140 120,140 95,60"/>
  <line class="med" x1="40" y1="140" x2="107" y2="100"/>
  <line class="med" x1="120" y1="140" x2="67" y2="100"/>
  <line class="med" x1="95" y1="60" x2="80" y2="140"/>
  <circle class="cg" cx="85" cy="113" r="3.4"/>
  <text class="lbl" x="80" y="165" text-anchor="middle">triangle</text>
  <!-- circle -->
  <circle class="shape" cx="205" cy="105" r="42"/>
  <circle class="cg" cx="205" cy="105" r="3.4"/>
  <text class="lbl" x="205" y="165" text-anchor="middle">circle</text>
  <!-- square -->
  <rect class="shape" x="285" y="65" width="80" height="80"/>
  <line class="med" x1="285" y1="65" x2="365" y2="145"/>
  <line class="med" x1="365" y1="65" x2="285" y2="145"/>
  <circle class="cg" cx="325" cy="105" r="3.4"/>
  <text class="lbl" x="325" y="165" text-anchor="middle">square</text>
  <!-- rectangle -->
  <rect class="shape" x="400" y="80" width="100" height="55"/>
  <line class="med" x1="400" y1="80" x2="500" y2="135"/>
  <line class="med" x1="500" y1="80" x2="400" y2="135"/>
  <circle class="cg" cx="450" cy="107.5" r="3.4"/>
  <text class="lbl" x="450" y="165" text-anchor="middle">rectangle</text>
  <text class="lbl" x="260" y="192" text-anchor="middle" fill="#E8B65A">● = centre of gravity (at the geometric centre)</text>
</svg>
