<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
    <marker id="arwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#86C98B"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.8; }
    .line { stroke:#6FB7E0; stroke-width:2.6; }
    .grid { stroke:#3a3f44; stroke-width:1; }
    .lbl { font-size:11.5; }
    .drop { stroke:#86C98B; stroke-width:2; }
    .obj { fill:none; stroke:#E8B65A; stroke-width:1.6; }
  </style>
  <!-- drop sequence on left -->
  <text x="90" y="30" text-anchor="middle" font-size="11.5" font-weight="bold">Free fall</text>
  <g class="lbl">
    <rect class="obj" x="75" y="50" width="16" height="16"/><text x="100" y="62">t = 0 s: 0 m/s</text>
    <line class="drop" x1="83" y1="66" x2="83" y2="92" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="96" width="16" height="16"/><text x="100" y="108">t = 1 s: 10 m/s</text>
    <line class="drop" x1="83" y1="112" x2="83" y2="142" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="146" width="16" height="16"/><text x="100" y="158">t = 2 s: 20 m/s</text>
    <line class="drop" x1="83" y1="162" x2="83" y2="196" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="200" width="16" height="16"/><text x="100" y="212">t = 3 s: 30 m/s</text>
  </g>
  <text x="130" y="250" text-anchor="middle" font-size="11">v rises by 10 m/s each second</text>
  <!-- graph on right -->
  <line class="axis" x1="300" y1="40" x2="300" y2="280" marker-end="url(#arw)"/>
  <line class="axis" x1="300" y1="280" x2="540" y2="280" marker-end="url(#arw)"/>
  <text x="300" y="30" text-anchor="middle" class="lbl">velocity (m/s)</text>
  <text x="548" y="295" text-anchor="end" class="lbl">time (s)</text>
  <!-- gridlines -->
  <g class="lbl" fill="#EAEAEA">
    <text x="292" y="245" text-anchor="end">10</text>
    <text x="292" y="205" text-anchor="end">20</text>
    <text x="292" y="165" text-anchor="end">30</text>
    <text x="292" y="125" text-anchor="end">40</text>
    <text x="292" y="85" text-anchor="end">50</text>
    <text x="340" y="296">1</text><text x="380" y="296">2</text><text x="420" y="296">3</text><text x="460" y="296">4</text><text x="500" y="296">5</text>
  </g>
  <!-- straight line gradient 10 -->
  <line class="line" x1="300" y1="280" x2="500" y2="80"/>
  <text x="430" y="150" font-size="11" fill="#6FB7E0">gradient = 10 m/s&#178;</text>
</svg>
