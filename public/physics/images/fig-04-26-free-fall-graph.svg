<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
    <marker id="arwd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#86C98B"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.8; }
    .line { stroke:#6FB7E0; stroke-width:2.6; }
    .lbl { font-size:13; }
    .drop { stroke:#86C98B; stroke-width:2; }
    .obj { fill:none; stroke:#E8B65A; stroke-width:1.6; }
  </style>
  <!-- drop sequence on top -->
  <text data-step="1" x="75" y="26" font-size="13.5" font-weight="bold">Free fall</text>
  <g data-step="1" class="lbl">
    <rect class="obj" x="75" y="40" width="16" height="16"/><text x="102" y="53">t = 0 s: 0 m/s</text>
    <line class="drop" x1="83" y1="60" x2="83" y2="84" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="88" width="16" height="16"/><text x="102" y="101">t = 1 s: 10 m/s</text>
    <line class="drop" x1="83" y1="108" x2="83" y2="136" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="140" width="16" height="16"/><text x="102" y="153">t = 2 s: 20 m/s</text>
    <line class="drop" x1="83" y1="160" x2="83" y2="192" marker-end="url(#arwd)"/>
    <rect class="obj" x="75" y="196" width="16" height="16"/><text x="102" y="209">t = 3 s: 30 m/s</text>
  </g>
  <text data-step="1" x="95" y="246" font-size="13">v rises by 10 m/s each second</text>
  <!-- graph below -->
  <line data-step="2" class="axis" x1="80" y1="560" x2="80" y2="300" marker-end="url(#arw)"/>
  <line data-step="2" class="axis" x1="80" y1="560" x2="420" y2="560" marker-end="url(#arw)"/>
  <text data-step="2" x="80" y="288" text-anchor="middle" class="lbl">velocity (m/s)</text>
  <text data-step="2" x="250" y="600" text-anchor="middle" class="lbl">time (s)</text>
  <!-- gridline labels -->
  <g data-step="3" class="lbl" fill="#EAEAEA">
    <text x="72" y="520" text-anchor="end">10</text>
    <text x="72" y="476" text-anchor="end">20</text>
    <text x="72" y="432" text-anchor="end">30</text>
    <text x="72" y="388" text-anchor="end">40</text>
    <text x="72" y="344" text-anchor="end">50</text>
    <text x="140" y="578" text-anchor="middle">1</text>
    <text x="200" y="578" text-anchor="middle">2</text>
    <text x="260" y="578" text-anchor="middle">3</text>
    <text x="320" y="578" text-anchor="middle">4</text>
    <text x="380" y="578" text-anchor="middle">5</text>
  </g>
  <!-- straight line gradient 10 -->
  <line data-step="4" class="line" x1="80" y1="560" x2="380" y2="340"/>
  <text data-step="4" x="255" y="475" font-size="13" fill="#6FB7E0">gradient = 10 m/s&#178;</text>
</svg>
