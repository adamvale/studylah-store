<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .prism { fill:#6FB7E0; fill-opacity:0.16; stroke:#EAEAEA; stroke-width:1.8; }
    .norm { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- right-angle prism -->
  <polygon data-step="1" class="prism" points="150,80 150,260 330,260"/>
  <!-- incident ray enters vertical face normally -->
  <path data-step="2" class="inc" marker-end="url(#a1)" d="M70,140 L208,140"/>
  <text data-step="2" x="90" y="130" font-size="13" fill="#E8B65A">incident ray</text>
  <!-- normal at hitting point H(210,140), perpendicular to hypotenuse -->
  <path data-step="3" class="norm" d="M170,180 L250,100"/>
  <!-- reflected ray goes straight down, exits bottom face -->
  <path data-step="4" class="ref" marker-end="url(#a2)" d="M210,140 L210,318"/>
  <text data-step="4" x="222" y="300" font-size="13" fill="#6FB7E0">reflected ray</text>
  <!-- angle marks -->
  <path data-step="5" class="arc" d="M186,140 A24,24 0 0,0 199,120"/>
  <text data-step="5" x="176" y="128" font-size="12">45&#176;</text>
  <path data-step="5" class="arc" d="M210,164 A24,24 0 0,0 226,157"/>
  <text data-step="5" x="216" y="180" font-size="12">45&#176;</text>
  <text data-step="5" x="220" y="70" text-anchor="middle" font-size="13">45&#176; &gt; critical angle &#8594; total internal reflection</text>
</svg>
