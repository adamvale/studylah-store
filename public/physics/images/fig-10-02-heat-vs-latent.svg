<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .b { fill:#6FB7E0; stroke:#EAEAEA; stroke-width:1.2; }
    .head { fill:#E8B65A; font-size:16px; font-weight:bold; }
    .t { font-size:14px; }
  </style>

  <!-- TOP: heat capacity, energy changes KE, temperature changes -->
  <text class="head" x="24" y="38">Heat capacity</text>
  <g>
    <circle class="b" cx="60" cy="84" r="12"/>
    <circle class="b" cx="120" cy="84" r="12"/>
    <g stroke="#E58F8F" stroke-width="1.4" fill="none">
      <path d="M60,66 l0,-11"/><path d="M60,102 l0,11"/>
      <path d="M120,66 l0,-11"/><path d="M120,102 l0,11"/>
    </g>
  </g>
  <text class="t" x="24" y="142">Energy transfer changes the <tspan fill="#6FB7E0">average</tspan></text>
  <text class="t" x="24" y="161"><tspan fill="#6FB7E0">kinetic energy</tspan> of the particles.</text>
  <text class="t" x="24" y="188">&#8594; the temperature <tspan fill="#E8B65A">changes</tspan>.</text>

  <line x1="20" y1="212" x2="400" y2="212" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- BOTTOM: latent heat, energy changes PE, temperature constant -->
  <text class="head" x="24" y="248">Latent heat</text>
  <g>
    <circle class="b" cx="60" cy="292" r="12"/>
    <circle class="b" cx="150" cy="292" r="12"/>
    <line x1="74" y1="292" x2="136" y2="292" stroke="#86C98B" stroke-width="1.4" stroke-dasharray="4 3"/>
    <path d="M76,292 l9,-5 M76,292 l9,5" stroke="#86C98B" stroke-width="1.4" fill="none"/>
    <path d="M134,292 l-9,-5 M134,292 l-9,5" stroke="#86C98B" stroke-width="1.4" fill="none"/>
  </g>
  <text class="t" x="24" y="350">Energy transfer changes the <tspan fill="#86C98B">potential</tspan></text>
  <text class="t" x="24" y="369"><tspan fill="#86C98B">energy</tspan> (separation) of the particles.</text>
  <text class="t" x="24" y="396">&#8594; the temperature stays <tspan fill="#E8B65A">constant</tspan>.</text>
</svg>
