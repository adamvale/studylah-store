<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 470" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .fl { stroke:#6FB7E0; stroke-width:1.8; fill:none; }
    .fhead { fill:#6FB7E0; }
    .title { font-size:15px; font-weight:bold; }
    .note { font-size:13.5px; fill:#9AA0A6; }
  </style>

  <!-- PANEL 1: uniform, parallel, equally spaced -->
  <text x="24" y="28" class="title">Uniform field</text>
  <g class="fl">
    <line x1="40" y1="55" x2="280" y2="55"/>
    <line x1="40" y1="80" x2="280" y2="80"/>
    <line x1="40" y1="105" x2="280" y2="105"/>
    <line x1="40" y1="130" x2="280" y2="130"/>
    <line x1="40" y1="155" x2="280" y2="155"/>
  </g>
  <g class="fhead">
    <polygon points="160,50 160,60 173,55"/>
    <polygon points="160,75 160,85 173,80"/>
    <polygon points="160,100 160,110 173,105"/>
    <polygon points="160,125 160,135 173,130"/>
    <polygon points="160,150 160,160 173,155"/>
  </g>
  <text x="24" y="192" class="note">equally spaced and parallel,</text>
  <text x="24" y="208" class="note">the same force everywhere</text>

  <!-- PANEL 2: non-uniform, fanning out, unequal spacing -->
  <text x="24" y="252" class="title">Non-uniform field</text>
  <g class="fl">
    <path d="M40,330 C110,290 180,275 290,262"/>
    <path d="M40,330 C110,308 180,300 290,293"/>
    <path d="M40,330 C120,330 200,330 290,330"/>
    <path d="M40,330 C110,352 180,360 290,366"/>
    <path d="M40,330 C110,370 180,385 290,398"/>
  </g>
  <g class="fhead">
    <polygon points="185,272 185,282 198,276"/>
    <polygon points="185,296 185,306 198,300"/>
    <polygon points="185,325 185,335 198,330"/>
    <polygon points="185,353 185,363 198,358"/>
    <polygon points="185,377 185,387 198,382"/>
  </g>
  <text x="24" y="432" class="note">unequally spaced and not parallel,</text>
  <text x="24" y="448" class="note">the force varies from point to point</text>
</svg>
