<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#86C98B"/></marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.24; stroke:#6FB7E0; stroke-width:1.6; }
    .air { stroke:#86C98B; stroke-width:2.4; }
    .w { stroke:#E58F8F; stroke-width:2.8; }
  </style>
  <rect class="box" x="175" y="115" width="60" height="50"/>
  <!-- air resistance up (smaller) -->
  <line class="air" x1="205" y1="115" x2="205" y2="60" marker-end="url(#arwG)"/>
  <text x="215" y="80" font-size="12" fill="#86C98B">air resistance (up)</text>
  <!-- weight down (larger) -->
  <line class="w" x1="205" y1="165" x2="205" y2="235" marker-end="url(#arwR)"/>
  <text x="215" y="215" font-size="12" fill="#E58F8F">weight (down)</text>
  <text x="205" y="268" text-anchor="middle" font-size="11.5">Taking down as positive: resultant = weight &#8722; air resistance.</text>
</svg>
