<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 590" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .bd { stroke:#EAEAEA; stroke-width:1.6; }
    .dense { fill:#6FB7E0; opacity:0.14; }
    .norm { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- Panel 1: less dense to denser, bends toward normal, i > r -->
  <rect class="dense" x="40" y="150" width="270" height="110"/>
  <line class="bd" x1="40" y1="150" x2="310" y2="150"/>
  <path class="norm" d="M175,60 L175,255"/>
  <path class="inc" marker-end="url(#a1)" d="M99,86 L173,148"/>
  <path class="ref" marker-end="url(#a2)" d="M175,150 L215,219"/>
  <path class="arc" d="M175,105 A45,45 0 0,0 143,117"/>
  <text x="146" y="110" font-size="13" font-style="italic">i</text>
  <path class="arc" d="M175,200 A45,45 0 0,1 197,190"/>
  <text x="188" y="192" font-size="13" font-style="italic">r</text>
  <text x="50" y="140" font-size="13">less dense</text>
  <text x="240" y="177" font-size="13">denser</text>
  <text x="175" y="287" text-anchor="middle" font-size="14">Bends <tspan fill="#6FB7E0">toward</tspan> normal (<tspan font-style="italic">i</tspan> &gt; <tspan font-style="italic">r</tspan>)</text>
  <!-- Panel 2: denser to less dense, bends away from normal, i < r -->
  <rect class="dense" x="40" y="320" width="270" height="110"/>
  <line class="bd" x1="40" y1="430" x2="310" y2="430"/>
  <path class="norm" d="M175,325 L175,535"/>
  <path class="inc" marker-end="url(#a1)" d="M125,343 L173,428"/>
  <path class="ref" marker-end="url(#a2)" d="M175,430 L236,481"/>
  <path class="arc" d="M175,385 A45,45 0 0,0 153,395"/>
  <text x="156" y="390" font-size="13" font-style="italic">i</text>
  <path class="arc" d="M175,480 A45,45 0 0,1 205,467"/>
  <text x="195" y="472" font-size="13" font-style="italic">r</text>
  <text x="50" y="345" font-size="13">denser</text>
  <text x="230" y="455" font-size="13">less dense</text>
  <text x="175" y="567" text-anchor="middle" font-size="14">Bends <tspan fill="#6FB7E0">away from</tspan> normal (<tspan font-style="italic">i</tspan> &lt; <tspan font-style="italic">r</tspan>)</text>
</svg>
