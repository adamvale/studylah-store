<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .bd { stroke:#EAEAEA; stroke-width:1.6; }
    .dense { fill:#6FB7E0; opacity:0.14; }
    .norm { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- LEFT: less dense -> denser, bend toward normal, i>r -->
  <rect class="dense" x="40" y="150" width="270" height="110"/>
  <line class="bd" x1="40" y1="150" x2="310" y2="150"/>
  <path class="norm" d="M175,60 L175,255"/>
  <path class="inc" marker-end="url(#a1)" d="M99,86 L173,148"/>
  <path class="ref" marker-end="url(#a2)" d="M175,150 L215,219"/>
  <path class="arc" d="M175,105 A45,45 0 0,0 143,117"/>
  <text x="148" y="110" font-size="12" font-style="italic">i</text>
  <path class="arc" d="M175,200 A45,45 0 0,1 197,190"/>
  <text x="188" y="192" font-size="12" font-style="italic">r</text>
  <text x="50" y="140" font-size="11">less dense</text>
  <text x="250" y="175" font-size="11">denser</text>
  <text x="175" y="285" text-anchor="middle" font-size="12">Bends <tspan fill="#6FB7E0">toward</tspan> normal (<tspan font-style="italic">i</tspan> &gt; <tspan font-style="italic">r</tspan>)</text>
  <!-- RIGHT: denser -> less dense, bend away, i<r -->
  <rect class="dense" x="380" y="40" width="270" height="110"/>
  <line class="bd" x1="380" y1="150" x2="650" y2="150"/>
  <path class="norm" d="M515,45 L515,255"/>
  <path class="inc" marker-end="url(#a1)" d="M465,63 L513,148"/>
  <path class="ref" marker-end="url(#a2)" d="M515,150 L576,201"/>
  <path class="arc" d="M515,105 A45,45 0 0,0 493,115"/>
  <text x="498" y="110" font-size="12" font-style="italic">i</text>
  <path class="arc" d="M515,200 A45,45 0 0,1 545,187"/>
  <text x="535" y="192" font-size="12" font-style="italic">r</text>
  <text x="390" y="140" font-size="11">denser</text>
  <text x="588" y="175" font-size="11">less dense</text>
  <text x="515" y="285" text-anchor="middle" font-size="12">Bends <tspan fill="#6FB7E0">away from</tspan> normal (<tspan font-style="italic">i</tspan> &lt; <tspan font-style="italic">r</tspan>)</text>
</svg>
