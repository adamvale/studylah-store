<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; }
    .line { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .area { fill:#6FB7E0; opacity:0.16; }
    .grid { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:3 3; }
    .lbl { fill:#E8B65A; font-size:11px; }
  </style>
  <!-- axes -->
  <line class="axis" x1="60" y1="220" x2="320" y2="220"/>
  <line class="axis" x1="60" y1="220" x2="60" y2="40"/>
  <text x="30" y="45" font-size="11">v/(m/s)</text>
  <text x="300" y="245">t/s</text>
  <!-- area under line -->
  <polygon class="area" points="60,220 260,80 260,220"/>
  <!-- line from origin to (10,4) -->
  <line class="line" x1="60" y1="220" x2="260" y2="80"/>
  <!-- gridlines -->
  <line class="grid" x1="60" y1="80" x2="260" y2="80"/>
  <line class="grid" x1="260" y1="80" x2="260" y2="220"/>
  <!-- ticks/labels -->
  <text x="46" y="85" text-anchor="end">4</text>
  <text x="60" y="238" text-anchor="middle">0</text>
  <text x="260" y="238" text-anchor="middle">10</text>
  <text class="lbl" x="175" y="185">area = distance</text>
</svg>
