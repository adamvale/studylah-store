<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 180" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.24; stroke:#6FB7E0; stroke-width:1.6; }
    .ground { stroke:#9AA0A6; stroke-width:1.6; }
    .f { stroke:#EAEAEA; stroke-width:2.2; }
  </style>
  <line class="ground" x1="40" y1="130" x2="400" y2="130"/>
  <rect class="box" x="195" y="80" width="55" height="50"/>
  <!-- 6 N to the right (upper) -->
  <line class="f" x1="250" y1="92" x2="335" y2="92" marker-end="url(#arw)"/>
  <text x="290" y="84" text-anchor="middle" font-size="12">6 N</text>
  <!-- 10 N to the right (lower) -->
  <line class="f" x1="250" y1="118" x2="335" y2="118" marker-end="url(#arw)"/>
  <text x="290" y="135" text-anchor="middle" font-size="12">10 N</text>
  <!-- 4 N to the left -->
  <line class="f" x1="195" y1="105" x2="110" y2="105" marker-end="url(#arw)"/>
  <text x="150" y="97" text-anchor="middle" font-size="12">4 N</text>
  <text x="220" y="165" text-anchor="middle" font-size="11">Three horizontal forces on a 2.5 kg block (frictionless floor).</text>
</svg>
