<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .curve { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <!-- axes crossing at centre -->
  <line class="axis" x1="30" y1="160" x2="320" y2="160"/>
  <line class="axis" x1="170" y1="240" x2="170" y2="30"/>
  <path class="axis" d="M170,30 l-5,10 M170,30 l5,10"/>
  <path class="axis" d="M320,160 l-10,-5 M320,160 l-10,5"/>
  <text x="180" y="45" class="lbl">I / A</text>
  <text x="300" y="152" class="lbl">V / V</text>
  <text x="126" y="180" class="lbl">~&#181;A</text>
  <text x="200" y="70" class="lbl">~mA</text>
  <!-- reverse: tiny negative current along axis, forward: sharp rise -->
  <path class="curve" d="M40,163 L170,160 C220,159 245,120 260,55"/>
  <text x="170" y="290" class="lbl" text-anchor="middle" fill="#9AA0A6">semiconductor diode</text>
</svg>
