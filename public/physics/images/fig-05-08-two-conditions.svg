<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .up { stroke:#86C98B; stroke-width:2.4; fill:none; }
    .down { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect data-step="1" class="beam" x="60" y="110" width="340" height="10"/>
  <!-- up forces at ends -->
  <line data-step="1" class="up" x1="90" y1="105" x2="90" y2="55"/>
  <path data-step="1" class="up" d="M90,55 l-5,10 M90,55 l5,10"/>
  <text data-step="1" class="lbl" x="90" y="48" text-anchor="middle" fill="#86C98B">4 N</text>
  <line data-step="1" class="up" x1="370" y1="105" x2="370" y2="55"/>
  <path data-step="1" class="up" d="M370,55 l-5,10 M370,55 l5,10"/>
  <text data-step="1" class="lbl" x="370" y="48" text-anchor="middle" fill="#86C98B">6 N</text>
  <!-- down force in middle -->
  <line data-step="2" class="down" x1="258" y1="120" x2="258" y2="175"/>
  <path data-step="2" class="down" d="M258,175 l-5,-10 M258,175 l5,-10"/>
  <text data-step="2" class="lbl" x="258" y="193" text-anchor="middle" fill="#E58F8F">10 N</text>
  <!-- distances along beam (from left up force) -->
  <line data-step="3" class="dim" x1="90" y1="145" x2="258" y2="145"/>
  <path data-step="3" class="dim" d="M90,145 l8,-4 M90,145 l8,4"/>
  <path data-step="3" class="dim" d="M258,145 l-8,-4 M258,145 l-8,4"/>
  <text data-step="3" class="lbl" x="174" y="139" text-anchor="middle">1.2 m</text>
  <line data-step="3" class="dim" x1="258" y1="145" x2="370" y2="145"/>
  <path data-step="3" class="dim" d="M258,145 l8,-4 M258,145 l8,4"/>
  <path data-step="3" class="dim" d="M370,145 l-8,-4 M370,145 l-8,4"/>
  <text data-step="3" class="lbl" x="314" y="139" text-anchor="middle">0.8 m</text>
  <line data-step="3" class="dim" x1="90" y1="120" x2="90" y2="145" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="258" y1="120" x2="258" y2="145" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="370" y1="120" x2="370" y2="145" stroke-dasharray="3 3"/>
  <text data-step="3" class="lbl" x="230" y="222" text-anchor="middle" font-size="13">No resultant force (4 + 6 = 10) and no resultant moment,</text>
  <text data-step="3" class="lbl" x="230" y="241" text-anchor="middle" font-size="13">so the beam is in equilibrium</text>
</svg>
