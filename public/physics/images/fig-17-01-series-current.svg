<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 20 440 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .res { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cellL { stroke:#EAEAEA; stroke-width:2; }
    .cellS { stroke:#EAEAEA; stroke-width:5; }
    .meter { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cur { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .lbl { fill:#6FB7E0; font-style:italic; }
    .accent { fill:#E8B65A; }
  </style>
  <!-- loop -->
  <path class="wire" d="M70,60 L235,60"/>
  <path class="wire" d="M285,60 L440,60 L440,215"/>
  <path class="wire" d="M70,60 L70,125 M70,155 L70,215"/>
  <path class="wire" d="M70,215 L228,215"/>
  <path class="wire" d="M274,215 L440,215"/>
  <!-- cell top -->
  <line class="cellL" x1="248" y1="42" x2="248" y2="78"/>
  <line class="cellS" x1="262" y1="52" x2="262" y2="68"/>
  <!-- ammeter left -->
  <circle class="meter" cx="70" cy="140" r="15"/>
  <text x="70" y="145" text-anchor="middle" font-size="14">A</text>
  <!-- resistor right (vertical) -->
  <rect class="res" x="426" y="120" width="28" height="46"/>
  <!-- resistor bottom (horizontal) -->
  <rect class="res" x="228" y="201" width="46" height="28"/>
  <!-- current arrows -->
  <line class="cur" x1="150" y1="60" x2="120" y2="60" marker-end="url(#ah1)"/>
  <line class="cur" x1="440" y1="180" x2="440" y2="150" marker-end="url(#ah1)"/>
  <line class="cur" x1="330" y1="215" x2="360" y2="215" marker-end="url(#ah1)"/>
  <!-- current labels -->
  <text x="150" y="48" font-size="14" class="lbl">I</text><text x="160" y="52" font-size="10" class="lbl">1</text>
  <text x="452" y="150" font-size="14" class="lbl">I</text><text x="462" y="154" font-size="10" class="lbl">3</text>
  <text x="352" y="245" font-size="14" class="lbl">I</text><text x="362" y="249" font-size="10" class="lbl">2</text>
  <!-- identity box -->
  <rect x="195" y="270" width="120" height="42" rx="4" fill="none" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="255" y="297" text-anchor="middle" font-size="15" class="accent">I₁ = I₂ = I₃</text>
</svg>
