<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .thread { stroke:#9AA0A6; stroke-width:1.4; }
    .plate { fill:#6FB7E0; opacity:0.16; stroke:#EAEAEA; stroke-width:1.8; }
    .diag { stroke:#E8B65A; stroke-width:1.4; }
    .pivot { fill:#EAEAEA; }
    .lbl { fill:#E8B65A; font-size:12px; }
  </style>
  <!-- thread -->
  <line data-step="1" class="thread" x1="120" y1="40" x2="120" y2="95"/>
  <text data-step="1" x="128" y="60" fill="#9AA0A6" font-size="11">thread</text>
  <circle data-step="1" class="pivot" cx="120" cy="98" r="4"/>
  <!-- rectangle ABCD: A top-left -->
  <rect data-step="2" class="plate" x="120" y="98" width="150" height="62"/>
  <!-- diagonal AC -->
  <line data-step="3" class="diag" x1="120" y1="98" x2="270" y2="160"/>
  <!-- corner labels -->
  <text data-step="4" x="112" y="94" fill="#EAEAEA">A</text>
  <text data-step="4" x="274" y="94" fill="#EAEAEA">B</text>
  <text data-step="4" x="274" y="176" fill="#EAEAEA">C</text>
  <text data-step="4" x="108" y="176" fill="#EAEAEA">D</text>
  <!-- side labels -->
  <text data-step="5" x="195" y="90" text-anchor="middle">12 cm</text>
  <text data-step="5" x="284" y="132">5 cm</text>
  <text data-step="5" class="lbl" x="205" y="122">13 cm</text>
</svg>
