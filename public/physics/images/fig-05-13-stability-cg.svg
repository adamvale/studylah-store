<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#EAEAEA; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .diag { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; fill:none; }
    .cg { fill:#E58F8F; stroke:#E58F8F; }
    .ground { stroke:#9AA0A6; stroke-width:1.4; }
    .lbl { font-size:14px; }
  </style>
  <line class="ground" x1="30" y1="170" x2="410" y2="170"/>
  <!-- A: wide, short, low CG -->
  <rect class="box" x="60" y="130" width="120" height="40"/>
  <line class="diag" x1="60" y1="130" x2="180" y2="170"/>
  <line class="diag" x1="180" y1="130" x2="60" y2="170"/>
  <circle class="cg" cx="120" cy="150" r="3.6"/>
  <text class="lbl" x="120" y="122" text-anchor="middle">A (low CG)</text>
  <!-- B: tall, narrow, high CG -->
  <rect class="box" x="290" y="70" width="60" height="100"/>
  <line class="diag" x1="290" y1="70" x2="350" y2="170"/>
  <line class="diag" x1="350" y1="70" x2="290" y2="170"/>
  <circle class="cg" cx="320" cy="120" r="3.6"/>
  <text class="lbl" x="320" y="62" text-anchor="middle">B (high CG)</text>
  <text class="lbl" x="220" y="198" text-anchor="middle" font-size="13">A is more stable than B because</text>
  <text class="lbl" x="220" y="216" text-anchor="middle" font-size="13">its centre of gravity is lower.</text>
</svg>
