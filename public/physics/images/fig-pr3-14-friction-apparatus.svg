<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .bench { fill:none; stroke:#EAEAEA; stroke-width:3; }
    .hatch { fill:none; stroke:#9AA0A6; stroke-width:1.2; }
    .block { fill:#6FB7E0; fill-opacity:0.22; stroke:#6FB7E0; stroke-width:1.6; }
    .string { fill:none; stroke:#EAEAEA; stroke-width:1.5; }
    .pulley { fill:none; stroke:#9AA0A6; stroke-width:1.8; }
    .mass { fill:#EAEAEA; fill-opacity:0.12; stroke:#EAEAEA; stroke-width:1.5; }
    .force-pull { fill:none; stroke:#E8B65A; stroke-width:2.4; }
    .force-friction { fill:none; stroke:#6FB7E0; stroke-width:2.4; }
    .motion { fill:none; stroke:#6FB7E0; stroke-width:2.4; }
    .lbl-pull { fill:#E8B65A; }
    .lbl-friction { fill:#6FB7E0; }
    .lbl-guide { fill:#9AA0A6; font-size:11.5px; }
    .lbl-s { font-size:11.5px; }
  </style>
  <defs>
    <marker id="d4amb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="d4blu" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>

  <!-- bench -->
  <path data-step="1" class="bench" d="M30,180 L300,180"/>
  <path data-step="1" class="hatch" d="M100,181 L92,191 M120,181 L112,191 M140,181 L132,191 M160,181 L152,191 M180,181 L172,191 M200,181 L192,191 M220,181 L212,191 M240,181 L232,191 M260,181 L252,191 M280,181 L272,191"/>
  <text data-step="1" class="lbl-s" x="195" y="205">bench</text>

  <!-- block -->
  <rect data-step="2" class="block" x="90" y="140" width="80" height="40"/>

  <!-- direction of motion -->
  <path data-step="3" class="motion" d="M110,120 L190,120" marker-end="url(#d4blu)"/>
  <text data-step="3" class="lbl-friction" x="150" y="110" text-anchor="middle">motion</text>

  <!-- string over the pulley, with the pull along it -->
  <path data-step="4" class="string" d="M170,158 L230,158"/>
  <path data-step="4" class="force-pull" d="M230,158 L298,158" marker-end="url(#d4amb)"/>
  <text data-step="4" class="lbl-pull" x="265" y="148" text-anchor="middle">pull</text>
  <circle data-step="4" class="pulley" cx="312" cy="170" r="12"/>
  <circle data-step="4" cx="312" cy="170" r="2" fill="#9AA0A6"/>
  <path data-step="4" class="pulley" d="M300,180 L312,182"/>
  <text data-step="4" class="lbl-guide" x="330" y="160">pulley</text>
  <path data-step="4" class="string" d="M324,170 L324,218"/>
  <text data-step="4" class="lbl-s" x="344" y="204">string</text>

  <!-- hanging masses -->
  <rect data-step="5" class="mass" x="310" y="218" width="28" height="10"/>
  <rect data-step="5" class="mass" x="310" y="230" width="28" height="10"/>
  <text data-step="5" class="lbl-s" x="346" y="234">masses</text>

  <!-- friction -->
  <path data-step="6" class="force-friction" d="M145,175 L62,175" marker-end="url(#d4blu)"/>
  <text data-step="6" class="lbl-friction" x="50" y="196" text-anchor="middle">friction</text>

  <text data-step="6" x="200" y="278" text-anchor="middle">add mass until the block slides at steady speed</text>
</svg>
