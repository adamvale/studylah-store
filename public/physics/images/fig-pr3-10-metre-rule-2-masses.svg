<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 310" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .rule { fill:#EAEAEA; fill-opacity:0.10; stroke:#EAEAEA; stroke-width:1.6; }
    .rule-tick { fill:none; stroke:#9AA0A6; stroke-width:1; }
    .pivot { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .base { fill:none; stroke:#EAEAEA; stroke-width:2.4; }
    .string { fill:none; stroke:#EAEAEA; stroke-width:1.4; }
    .mass { fill:#EAEAEA; fill-opacity:0.12; stroke:#EAEAEA; stroke-width:1.5; }
    .force-weight { fill:none; stroke:#E58F8F; stroke-width:2.4; }
    .turn { fill:none; stroke:#E8B65A; stroke-width:2; }
    .guide { fill:none; stroke:#9AA0A6; stroke-width:1.2; }
    .guide-dash { fill:none; stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:4 3; }
    .lbl-weight { fill:#E58F8F; }
    .lbl-guide { fill:#9AA0A6; }
    .lbl-guide-s { fill:#9AA0A6; font-size:11px; }
    .num { font-size:11px; }
  </style>
  <defs>
    <marker id="d0red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
    <marker id="d0amb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="d0gry" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/></marker>
  </defs>

  <!-- turning effects about the knife-edge -->
  <path class="turn" d="M148,50 A 34,34 0 0 0 100,83" marker-end="url(#d0amb)"/>
  <path class="turn" d="M272,50 A 34,34 0 0 1 320,83" marker-end="url(#d0amb)"/>

  <!-- perpendicular distances -->
  <path class="guide" d="M176,95 L210,95" marker-start="url(#d0gry)" marker-end="url(#d0gry)"/>
  <text class="lbl-guide" x="193" y="87" text-anchor="middle">p</text>
  <path class="guide" d="M57,118 L176,118" marker-start="url(#d0gry)" marker-end="url(#d0gry)"/>
  <path class="guide" d="M176,118 L346,118" marker-start="url(#d0gry)" marker-end="url(#d0gry)"/>
  <text class="lbl-guide" x="116" y="110" text-anchor="middle">r</text>
  <text class="lbl-guide" x="261" y="110" text-anchor="middle">q</text>
  <path class="guide-dash" d="M57,120 L57,150 M176,97 L176,150 M210,97 L210,150 M346,120 L346,150"/>

  <!-- metre rule -->
  <rect class="rule" x="40" y="150" width="340" height="12"/>
  <path class="rule-tick" d="M74,150 L74,156 M108,150 L108,156 M142,150 L142,156 M244,150 L244,156 M278,150 L278,156 M312,150 L312,156"/>
  <text x="250" y="140" text-anchor="middle">metre rule</text>

  <!-- knife edge -->
  <path class="pivot" d="M176,162 L162,188 L190,188 Z"/>
  <path class="base" d="M146,188 L206,188"/>
  <text class="lbl-guide-s" x="170" y="207" text-anchor="middle">knife-edge</text>

  <!-- 100 g mass -->
  <path class="string" d="M57,162 L57,182"/>
  <rect class="mass" x="43" y="182" width="28" height="20"/>
  <text class="num" x="38" y="196" text-anchor="end">100 g</text>
  <path class="force-weight" d="M57,204 L57,252" marker-end="url(#d0red)"/>

  <!-- 50 g mass -->
  <path class="string" d="M346,162 L346,182"/>
  <rect class="mass" x="334" y="182" width="24" height="18"/>
  <text class="num" x="364" y="196">50 g</text>
  <path class="force-weight" d="M346,202 L346,248" marker-end="url(#d0red)"/>

  <!-- weight of the rule at its centre of gravity -->
  <circle cx="210" cy="156" r="3" fill="#EAEAEA"/>
  <path class="force-weight" d="M210,164 L210,240" marker-end="url(#d0red)"/>
  <text class="lbl-weight" x="218" y="232">rule's weight</text>

  <text x="210" y="290" text-anchor="middle" font-size="13">100 r = 50 q + M p</text>
</svg>
