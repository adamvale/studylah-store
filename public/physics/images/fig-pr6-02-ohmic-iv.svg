<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 276" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .fit  { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .guide{ stroke:#9AA0A6; stroke-width:1.2; fill:none; stroke-dasharray:5 3; }
    .ax   { fill:#E8B65A; font-size:13px; }
    .note { fill:#9AA0A6; font-size:12px; }
    .cap  { fill:#EAEAEA; font-size:13px; }
  </style>
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>

  <!-- axes -->
  <line data-step="1" class="axis" x1="70" y1="230" x2="70" y2="42" marker-end="url(#a2)"/>
  <line data-step="1" class="axis" x1="70" y1="230" x2="382" y2="230" marker-end="url(#a2)"/>
  <text data-step="1" class="ax" x="62" y="38" text-anchor="end">I / A</text>
  <text data-step="1" class="ax" x="380" y="256" text-anchor="end">V / V</text>
  <text data-step="1" x="62" y="246" text-anchor="end">O</text>

  <!-- best-fit line: straight, through the origin -->
  <path data-step="2" class="fit" d="M70,230 L300,80"/>

  <!-- gradient triangle -->
  <path data-step="3" class="guide" d="M150,177.8 L250,177.8 L250,112.6"/>
  <text data-step="3" class="note" x="200" y="196" text-anchor="middle">&#916;V</text>
  <text data-step="3" class="note" x="258" y="150">&#916;I</text>

  <text data-step="3" class="cap" x="100" y="86">ohmic conductor</text>
  <text data-step="3" class="note" x="312" y="74">gradient = 1/R</text>
</svg>
