<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 230" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lbl { font-size:12px; }
  </style>
  <!-- cell top -->
  <path class="wire" d="M55,50 L150,50 M166,50 L305,50"/>
  <line class="wire" x1="150" y1="34" x2="150" y2="66" stroke-width="2.4"/>
  <line class="wire" x1="166" y1="42" x2="166" y2="58" stroke-width="5"/>
  <!-- left rail with 4 ohm in series -->
  <path class="wire" d="M55,50 L55,200"/>
  <rect class="wire" x="43" y="100" width="24" height="46"/>
  <text x="25" y="126" class="lbl">4 &#8486;</text>
  <path class="wire" d="M55,200 L305,200"/>
  <path class="wire" d="M305,50 L305,200"/>
  <!-- two parallel resistors on the right block -->
  <path class="wire" d="M180,50 L180,110 M180,110 L230,110"/>
  <rect class="wire" x="230" y="98" width="46" height="24"/>
  <path class="wire" d="M276,110 L305,110"/>
  <text x="253" y="92" class="lbl" text-anchor="middle">6 &#8486;</text>
  <path class="wire" d="M180,110 L180,160 M180,160 L230,160"/>
  <rect class="wire" x="230" y="148" width="46" height="24"/>
  <path class="wire" d="M276,160 L305,160"/>
  <text x="253" y="188" class="lbl" text-anchor="middle">3 &#8486;</text>
</svg>
