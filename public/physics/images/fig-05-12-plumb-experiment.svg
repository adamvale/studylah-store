<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .lamina { fill:#EAEAEA; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .plumb { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 3; fill:none; }
    .string { stroke:#EAEAEA; stroke-width:1.2; fill:none; }
    .trace { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .cg { fill:#E58F8F; stroke:#E58F8F; }
    .pin { fill:#EAEAEA; }
    .mass { fill:#EAEAEA; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { font-size:13px; }
  </style>
  <!-- irregular lamina -->
  <path data-step="1" class="lamina" d="M120,60 C200,40 300,55 320,120 C335,175 300,230 220,235 C150,240 95,200 100,140 C103,100 100,72 120,60 Z"/>
  <!-- hole 1 (top) with pin -->
  <circle data-step="2" class="pin" cx="150" cy="70" r="4"/>
  <!-- hole 2 (right) with pin -->
  <circle data-step="3" class="pin" cx="300" cy="120" r="4"/>
  <!-- traced line 1: vertical, along the plumb line from pin 1 -->
  <line data-step="4" class="trace" x1="150" y1="70" x2="150" y2="258"/>
  <!-- traced line 2: from pin 2, tilted now the lamina hangs from pin 1 -->
  <line data-step="5" class="trace" x1="300" y1="120" x2="120" y2="210"/>
  <!-- intersection = CG -->
  <circle data-step="6" class="cg" cx="150" cy="195" r="4"/>
  <text data-step="6" class="lbl" x="165" y="215" fill="#E58F8F">CG (intersection)</text>
  <!-- plumb line hanging from pin 1: string + mass -->
  <line data-step="7" class="string" x1="150" y1="70" x2="150" y2="270"/>
  <circle data-step="7" class="mass" cx="150" cy="278" r="9"/>
  <text data-step="7" class="lbl" x="167" y="282">mass (plumb bob)</text>
  <!-- labels -->
  <text data-step="8" class="lbl" x="240" y="26" text-anchor="middle">pin through a small hole</text>
  <path data-step="8" class="lead" d="M235,30 L156,66"/>
  <text data-step="8" class="lbl" x="445" y="262" text-anchor="end">plumb line hangs vertically</text>
  <path data-step="8" class="lead" d="M265,258 L154,250"/>
</svg>
