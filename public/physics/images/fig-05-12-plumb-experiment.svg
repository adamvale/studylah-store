<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .lamina { fill:#6FB7E0; opacity:0.16; stroke:#EAEAEA; stroke-width:1.6; }
    .plumb { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 3; fill:none; }
    .string { stroke:#EAEAEA; stroke-width:1.2; fill:none; }
    .trace { stroke:#86C98B; stroke-width:1.3; fill:none; }
    .cg { fill:#E8B65A; stroke:#E8B65A; }
    .pin { fill:#EAEAEA; }
    .mass { fill:#EAEAEA; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <!-- irregular lamina -->
  <path class="lamina" d="M120,60 C200,40 300,55 320,120 C335,175 300,230 220,235 C150,240 95,200 100,140 C103,100 100,72 120,60 Z"/>
  <!-- hole 1 (top) with pin -->
  <circle class="pin" cx="150" cy="70" r="4"/>
  <!-- hole 2 (right) with pin -->
  <circle class="pin" cx="300" cy="120" r="4"/>
  <!-- traced vertical line 1 from pin 1 -->
  <line class="trace" x1="150" y1="70" x2="185" y2="255"/>
  <!-- traced vertical line 2 from pin 2 -->
  <line class="trace" x1="300" y1="120" x2="150" y2="245"/>
  <!-- intersection = CG -->
  <circle class="cg" cx="176" cy="205" r="4"/>
  <text class="lbl" x="188" y="203" fill="#E8B65A">CG (intersection)</text>
  <!-- plumb line hanging from pin 1: string + mass -->
  <line class="string" x1="150" y1="70" x2="150" y2="270"/>
  <circle class="mass" cx="150" cy="278" r="9"/>
  <text class="lbl" x="167" y="282">mass (plumb bob)</text>
  <!-- labels -->
  <text class="lbl" x="330" y="66">pin through a small hole</text>
  <path class="lead" d="M325,62 L155,68"/>
  <text class="lbl" x="330" y="130">plumb line hangs vertically</text>
  <path class="lead" d="M325,126 L154,150"/>
</svg>
