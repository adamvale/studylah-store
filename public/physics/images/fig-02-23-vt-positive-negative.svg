<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; }
    .cap { font-size:11px; }
  </style>
  <defs>
    <marker id="vn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <!-- vertical axis with + above and - below, horizontal time axis at middle -->
  <line data-step="1" class="axis" x1="70" y1="255" x2="70" y2="25" marker-end="url(#vn)"/>
  <line data-step="2" class="axis" x1="70" y1="140" x2="330" y2="140" marker-end="url(#vn)"/>
  <text data-step="3" x="40" y="30">velocity</text>
  <text data-step="3" x="305" y="160" class="cap">time</text>
  <text data-step="3" x="58" y="45" class="cap">+</text>
  <text data-step="3" x="58" y="245" class="cap">−</text>
  <text data-step="3" x="58" y="144" text-anchor="end" class="cap">0</text>
  <text data-step="4" x="95" y="80" fill="#6FB7E0" class="cap">positive velocity</text>
  <text data-step="4" x="95" y="96" fill="#6FB7E0" class="cap">→ moving forward</text>
  <text data-step="4" x="95" y="200" fill="#E58F8F" class="cap">negative velocity</text>
  <text data-step="4" x="95" y="216" fill="#E58F8F" class="cap">→ moving backward</text>
</svg>
