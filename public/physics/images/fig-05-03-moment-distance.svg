<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#9AA0A6; opacity:0.35; stroke:#9AA0A6; stroke-width:1.6; }
    .force { stroke:#E8B65A; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <!-- top: far force, large moment -->
  <rect data-step="1" class="beam" x="70" y="70" width="330" height="10"/>
  <polygon data-step="1" class="pivot" points="72,102 96,102 84,80"/>
  <line data-step="1" class="dim" x1="84" y1="48" x2="360" y2="48"/>
  <path data-step="1" class="dim" d="M84,48 l8,-4 M84,48 l8,4"/>
  <path data-step="1" class="dim" d="M360,48 l-8,-4 M360,48 l-8,4"/>
  <text data-step="1" class="lbl" x="222" y="42" text-anchor="middle">large distance → large moment</text>
  <line data-step="1" class="force" x1="360" y1="70" x2="360" y2="115"/>
  <path data-step="1" class="force" d="M360,115 l-5,-10 M360,115 l5,-10"/>
  <text data-step="1" class="lbl" x="370" y="100" fill="#E8B65A">10 N</text>
  <line data-step="1" class="dim" x1="84" y1="48" x2="84" y2="80" stroke-dasharray="3 3"/>
  <line data-step="1" class="dim" x1="360" y1="48" x2="360" y2="70" stroke-dasharray="3 3"/>

  <!-- bottom: near force, small moment -->
  <rect data-step="2" class="beam" x="70" y="185" width="330" height="10"/>
  <polygon data-step="2" class="pivot" points="72,217 96,217 84,195"/>
  <line data-step="2" class="dim" x1="84" y1="163" x2="220" y2="163"/>
  <path data-step="2" class="dim" d="M84,163 l8,-4 M84,163 l8,4"/>
  <path data-step="2" class="dim" d="M220,163 l-8,-4 M220,163 l-8,4"/>
  <text data-step="2" class="lbl" x="150" y="157" text-anchor="middle">small distance → small moment</text>
  <line data-step="2" class="force" x1="220" y1="185" x2="220" y2="230"/>
  <path data-step="2" class="force" d="M220,230 l-5,-10 M220,230 l5,-10"/>
  <text data-step="2" class="lbl" x="230" y="215" fill="#E8B65A">10 N</text>
  <line data-step="2" class="dim" x1="84" y1="163" x2="84" y2="195" stroke-dasharray="3 3"/>
  <line data-step="2" class="dim" x1="220" y1="163" x2="220" y2="185" stroke-dasharray="3 3"/>
</svg>
