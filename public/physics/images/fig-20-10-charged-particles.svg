<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 620" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:14px; }
    .cross{ fill:#9AA0A6; font-size:15px; text-anchor:middle; }
    .path { stroke:#E8B65A; stroke-width:2; fill:none; stroke-dasharray:4 3; }
    .vel  { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .force{ stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .ttl  { fill:#EAEAEA; font-size:15px; font-weight:bold; text-anchor:middle; }
    .pos  { fill:#6FB7E0; font-size:16px; font-weight:bold; }
    .neg  { fill:#E58F8F; font-size:16px; font-weight:bold; }
    .box  { fill:none; stroke:#9AA0A6; stroke-width:1; stroke-dasharray:3 3; }
  </style>
  <defs>
    <marker id="mv" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#EAEAEA"/></marker>
    <marker id="mf" markerWidth="12" markerHeight="12" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#E58F8F"/></marker>
  </defs>

  <text data-step="1" x="180" y="24" text-anchor="middle" fill="#9AA0A6">magnetic field into the page (&#8855;)</text>

  <!-- PANEL A: positive charge deflects up -->
  <g data-step="1" transform="translate(5,20)">
    <text class="ttl" x="175" y="46">Positive charge</text>
    <rect class="box" x="55" y="60" width="240" height="200"/>
    <text class="cross" x="90" y="95">&#215;</text><text class="cross" x="150" y="95">&#215;</text><text class="cross" x="210" y="95">&#215;</text><text class="cross" x="265" y="95">&#215;</text>
    <text class="cross" x="90" y="150">&#215;</text><text class="cross" x="150" y="150">&#215;</text><text class="cross" x="210" y="150">&#215;</text><text class="cross" x="265" y="150">&#215;</text>
    <text class="cross" x="90" y="205">&#215;</text><text class="cross" x="150" y="205">&#215;</text><text class="cross" x="210" y="205">&#215;</text><text class="cross" x="265" y="205">&#215;</text>
    <text class="cross" x="120" y="248">&#215;</text><text class="cross" x="180" y="248">&#215;</text><text class="cross" x="240" y="248">&#215;</text>
    <!-- enters from left moving right, curves up -->
    <path class="path" d="M55,210 Q170,210 235,110"/>
    <line class="vel" x1="60" y1="210" x2="120" y2="210" marker-end="url(#mv)"/>
    <text class="pos" x="60" y="228">&#8853;</text>
    <text x="126" y="226">velocity</text>
    <line class="force" x1="175" y1="200" x2="175" y2="150" marker-end="url(#mf)"/>
    <text fill="#E58F8F" x="182" y="176">F</text>
  </g>

  <!-- PANEL B: electron deflects down -->
  <g data-step="2" transform="translate(-325,270)">
    <text class="ttl" x="505" y="46">Electron (negative)</text>
    <rect class="box" x="385" y="60" width="240" height="200"/>
    <text class="cross" x="420" y="95">&#215;</text><text class="cross" x="480" y="95">&#215;</text><text class="cross" x="540" y="95">&#215;</text><text class="cross" x="595" y="95">&#215;</text>
    <text class="cross" x="420" y="150">&#215;</text><text class="cross" x="480" y="150">&#215;</text><text class="cross" x="540" y="150">&#215;</text><text class="cross" x="595" y="150">&#215;</text>
    <text class="cross" x="420" y="205">&#215;</text><text class="cross" x="480" y="205">&#215;</text><text class="cross" x="540" y="205">&#215;</text><text class="cross" x="595" y="205">&#215;</text>
    <text class="cross" x="450" y="248">&#215;</text><text class="cross" x="510" y="248">&#215;</text><text class="cross" x="570" y="248">&#215;</text>
    <path class="path" d="M385,110 Q500,110 565,210"/>
    <line class="vel" x1="390" y1="110" x2="450" y2="110" marker-end="url(#mv)"/>
    <text class="neg" x="390" y="128">&#8854;</text>
    <text x="456" y="126">velocity</text>
    <line class="force" x1="505" y1="120" x2="505" y2="170" marker-end="url(#mf)"/>
    <text fill="#E58F8F" x="512" y="150">F</text>
  </g>

  <text data-step="2" x="180" y="570" text-anchor="middle" fill="#9AA0A6">Opposite charges deflect in opposite</text>
  <text data-step="2" x="180" y="590" text-anchor="middle" fill="#9AA0A6">directions in the same field.</text>
</svg>
