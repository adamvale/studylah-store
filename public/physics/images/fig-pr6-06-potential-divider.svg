<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .res  { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .plate{ stroke:#EAEAEA; }
    .term { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cur  { fill:none; stroke:#E8B65A; stroke-width:2.6; }
    .curl { fill:#E8B65A; font-size:13px; }
    .eq   { fill:#EAEAEA; font-size:15px; }
  </style>
  <defs>
    <marker id="c6b" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#E8B65A"/></marker>
  </defs>

  <!-- supply -->
  <path data-step="1" class="wire" d="M90,60 L90,148 M90,160 L90,250"/>
  <line data-step="1" class="plate" x1="76" y1="148" x2="104" y2="148" stroke-width="2"/>
  <line data-step="1" class="plate" x1="83" y1="160" x2="97" y2="160" stroke-width="5"/>
  <text data-step="1" x="70" y="160" text-anchor="end">supply V</text>

  <!-- loop -->
  <path data-step="2" class="wire" d="M90,60 L270,60 M90,250 L270,250"/>

  <!-- R1 above R2, in series -->
  <path data-step="3" class="wire" d="M270,60 L270,90 M270,140 L270,170 M270,220 L270,250"/>
  <rect data-step="3" class="res" x="258" y="90" width="24" height="50"/>
  <rect data-step="3" class="res" x="258" y="170" width="24" height="50"/>
  <text data-step="3" x="248" y="120" text-anchor="end">R&#8321;</text>
  <text data-step="3" x="248" y="200" text-anchor="end">R&#8322;</text>

  <!-- output tapped across R2 -->
  <path data-step="4" class="wire" d="M270,155 L376,155 M270,235 L376,235"/>
  <circle data-step="4" class="term" cx="380" cy="155" r="4"/>
  <circle data-step="4" class="term" cx="380" cy="235" r="4"/>
  <text data-step="4" x="392" y="200">V_out</text>

  <!-- current runs through both resistors -->
  <path data-step="5" class="cur" d="M90,130 L90,100" marker-end="url(#c6b)"/>
  <path data-step="5" class="cur" d="M130,60 L170,60" marker-end="url(#c6b)"/>
  <path data-step="5" class="cur" d="M220,250 L180,250" marker-end="url(#c6b)"/>
  <text data-step="5" class="curl" x="150" y="50" text-anchor="middle">I</text>

  <text data-step="5" class="eq" x="225" y="296" text-anchor="middle">V_out = V &#215; R&#8322;/(R&#8321; + R&#8322;)</text>
</svg>
