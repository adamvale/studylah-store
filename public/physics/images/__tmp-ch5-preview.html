<meta charset="utf-8">
<style>
 body{background:#141518;margin:0;padding:12px;font-family:Segoe UI,Arial,sans-serif}
 .g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

<div class="g" id="g"></div>

</script>
