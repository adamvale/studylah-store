<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah7" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .fl { stroke:#EAEAEA; stroke-width:1.5; fill:none; }
    .pos { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.8; }
    .sym { font-size:20px; text-anchor:middle; }
    .np { fill:#E8B65A; }
  </style>

  <!-- ===== Two positive charges (left) ===== -->
  <text x="165" y="26" text-anchor="middle" font-size="13">Two positive charges</text>
  <g>
    <line class="fl" x1="87" y1="146" x2="45" y2="110" marker-end="url(#ah7)"/>
    <line class="fl" x1="83" y1="160" x2="35" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="87" y1="174" x2="45" y2="210" marker-end="url(#ah7)"/>
    <line class="fl" x1="97" y1="140" x2="80" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="113" y1="140" x2="130" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="97" y1="180" x2="80" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="113" y1="180" x2="130" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="243" y1="146" x2="285" y2="110" marker-end="url(#ah7)"/>
    <line class="fl" x1="247" y1="160" x2="295" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="243" y1="174" x2="285" y2="210" marker-end="url(#ah7)"/>
    <line class="fl" x1="233" y1="140" x2="250" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="217" y1="140" x2="200" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="233" y1="180" x2="250" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="217" y1="180" x2="200" y2="230" marker-end="url(#ah7)"/>
    <circle cx="165" cy="160" r="2.5" class="np"/>
    <circle cx="105" cy="160" r="20" class="pos"/>
    <text x="105" y="167" class="sym" fill="#E58F8F">+</text>
    <circle cx="225" cy="160" r="20" class="pos"/>
    <text x="225" y="167" class="sym" fill="#E58F8F">+</text>
  </g>
  <text x="165" y="300" text-anchor="middle" font-size="11" fill="#9AA0A6">lines bend away; never cross</text>

  <!-- ===== Two negative charges (right) ===== -->
  <text x="480" y="26" text-anchor="middle" font-size="13">Two negative charges</text>
  <g>
    <line class="fl" x1="360" y1="110" x2="402" y2="146" marker-end="url(#ah7)"/>
    <line class="fl" x1="350" y1="160" x2="398" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="360" y1="210" x2="402" y2="174" marker-end="url(#ah7)"/>
    <line class="fl" x1="395" y1="90" x2="412" y2="140" marker-end="url(#ah7)"/>
    <line class="fl" x1="445" y1="90" x2="428" y2="140" marker-end="url(#ah7)"/>
    <line class="fl" x1="395" y1="230" x2="412" y2="180" marker-end="url(#ah7)"/>
    <line class="fl" x1="445" y1="230" x2="428" y2="180" marker-end="url(#ah7)"/>
    <line class="fl" x1="600" y1="110" x2="558" y2="146" marker-end="url(#ah7)"/>
    <line class="fl" x1="610" y1="160" x2="562" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="600" y1="210" x2="558" y2="174" marker-end="url(#ah7)"/>
    <line class="fl" x1="565" y1="90" x2="548" y2="140" marker-end="url(#ah7)"/>
    <line class="fl" x1="515" y1="90" x2="532" y2="140" marker-end="url(#ah7)"/>
    <line class="fl" x1="565" y1="230" x2="548" y2="180" marker-end="url(#ah7)"/>
    <line class="fl" x1="515" y1="230" x2="532" y2="180" marker-end="url(#ah7)"/>
    <circle cx="480" cy="160" r="2.5" class="np"/>
    <circle cx="420" cy="160" r="20" class="neg"/>
    <text x="420" y="167" class="sym" fill="#6FB7E0">&#8722;</text>
    <circle cx="540" cy="160" r="20" class="neg"/>
    <text x="540" y="167" class="sym" fill="#6FB7E0">&#8722;</text>
  </g>
  <text x="480" y="300" text-anchor="middle" font-size="11" fill="#9AA0A6">arrows point inward to each charge</text>
</svg>
