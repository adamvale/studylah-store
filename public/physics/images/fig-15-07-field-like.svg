<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah7" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .fl { stroke:#EAEAEA; stroke-width:1.5; fill:none; }
    .pos { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.8; }
    .neg { fill:#6FB7E0; opacity:0.18; stroke:#6FB7E0; stroke-width:1.8; }
    .sym { font-size:20px; text-anchor:middle; }
    .np { fill:#E8B65A; }
  </style>
  <!-- Panel 1: two positive charges -->
  <text data-step="1" x="170" y="26" text-anchor="middle" font-size="14">Two positive charges</text>
  <g data-step="1">
    <line class="fl" x1="92" y1="146" x2="50" y2="110" marker-end="url(#ah7)"/>
    <line class="fl" x1="88" y1="160" x2="40" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="92" y1="174" x2="50" y2="210" marker-end="url(#ah7)"/>
    <line class="fl" x1="102" y1="140" x2="85" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="118" y1="140" x2="135" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="102" y1="180" x2="85" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="118" y1="180" x2="135" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="248" y1="146" x2="290" y2="110" marker-end="url(#ah7)"/>
    <line class="fl" x1="252" y1="160" x2="300" y2="160" marker-end="url(#ah7)"/>
    <line class="fl" x1="248" y1="174" x2="290" y2="210" marker-end="url(#ah7)"/>
    <line class="fl" x1="238" y1="140" x2="255" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="222" y1="140" x2="205" y2="90" marker-end="url(#ah7)"/>
    <line class="fl" x1="238" y1="180" x2="255" y2="230" marker-end="url(#ah7)"/>
    <line class="fl" x1="222" y1="180" x2="205" y2="230" marker-end="url(#ah7)"/>
    <circle cx="170" cy="160" r="2.5" class="np"/>
    <circle cx="110" cy="160" r="20" class="pos"/>
    <text x="110" y="167" class="sym" fill="#E58F8F">+</text>
    <circle cx="230" cy="160" r="20" class="pos"/>
    <text x="230" y="167" class="sym" fill="#E58F8F">+</text>
  </g>
  <text data-step="1" x="170" y="300" text-anchor="middle" font-size="13" fill="#9AA0A6">lines bend away; never cross</text>
  <!-- Panel 2: two negative charges -->
  <text data-step="2" x="170" y="351" text-anchor="middle" font-size="14">Two negative charges</text>
  <g data-step="2">
    <line class="fl" x1="50" y1="435" x2="92" y2="471" marker-end="url(#ah7)"/>
    <line class="fl" x1="40" y1="485" x2="88" y2="485" marker-end="url(#ah7)"/>
    <line class="fl" x1="50" y1="535" x2="92" y2="499" marker-end="url(#ah7)"/>
    <line class="fl" x1="85" y1="415" x2="102" y2="465" marker-end="url(#ah7)"/>
    <line class="fl" x1="135" y1="415" x2="118" y2="465" marker-end="url(#ah7)"/>
    <line class="fl" x1="85" y1="555" x2="102" y2="505" marker-end="url(#ah7)"/>
    <line class="fl" x1="135" y1="555" x2="118" y2="505" marker-end="url(#ah7)"/>
    <line class="fl" x1="290" y1="435" x2="248" y2="471" marker-end="url(#ah7)"/>
    <line class="fl" x1="300" y1="485" x2="252" y2="485" marker-end="url(#ah7)"/>
    <line class="fl" x1="290" y1="535" x2="248" y2="499" marker-end="url(#ah7)"/>
    <line class="fl" x1="255" y1="415" x2="238" y2="465" marker-end="url(#ah7)"/>
    <line class="fl" x1="205" y1="415" x2="222" y2="465" marker-end="url(#ah7)"/>
    <line class="fl" x1="255" y1="555" x2="238" y2="505" marker-end="url(#ah7)"/>
    <line class="fl" x1="205" y1="555" x2="222" y2="505" marker-end="url(#ah7)"/>
    <circle cx="170" cy="485" r="2.5" class="np"/>
    <circle cx="110" cy="485" r="20" class="neg"/>
    <text x="110" y="492" class="sym" fill="#6FB7E0">−</text>
    <circle cx="230" cy="485" r="20" class="neg"/>
    <text x="230" y="492" class="sym" fill="#6FB7E0">−</text>
  </g>
  <text data-step="2" x="170" y="625" text-anchor="middle" font-size="13" fill="#9AA0A6">arrows point inward to each charge</text>
</svg>
