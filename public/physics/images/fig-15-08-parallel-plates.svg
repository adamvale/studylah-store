<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah8" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .plate { stroke:#EAEAEA; stroke-width:3; }
    .fl { stroke:#EAEAEA; stroke-width:1.5; fill:none; }
    .lbl { font-size:16px; text-anchor:middle; }
  </style>
  <!-- left plate (positive) at x=110, right plate (negative) at x=350, y 50..210 -->
  <line class="plate" x1="110" y1="50" x2="110" y2="210"/>
  <line class="plate" x1="350" y1="50" x2="350" y2="210"/>
  <!-- plus signs on left plate -->
  <text class="lbl" x="95" y="70" fill="#E58F8F">+</text>
  <text class="lbl" x="95" y="110" fill="#E58F8F">+</text>
  <text class="lbl" x="95" y="150" fill="#E58F8F">+</text>
  <text class="lbl" x="95" y="190" fill="#E58F8F">+</text>
  <!-- minus signs on right plate -->
  <text class="lbl" x="368" y="70" fill="#6FB7E0">−</text>
  <text class="lbl" x="368" y="110" fill="#6FB7E0">−</text>
  <text class="lbl" x="368" y="150" fill="#6FB7E0">−</text>
  <text class="lbl" x="368" y="190" fill="#6FB7E0">−</text>
  <!-- uniform straight field lines from + to - -->
  <line class="fl" x1="116" y1="80" x2="344" y2="80" marker-end="url(#ah8)"/>
  <line class="fl" x1="116" y1="115" x2="344" y2="115" marker-end="url(#ah8)"/>
  <line class="fl" x1="116" y1="150" x2="344" y2="150" marker-end="url(#ah8)"/>
  <line class="fl" x1="116" y1="185" x2="344" y2="185" marker-end="url(#ah8)"/>
  <!-- edge curvature (fringing) at top and bottom -->
  <path class="fl" d="M112,55 Q230,40 348,55" marker-end="url(#ah8)"/>
  <path class="fl" d="M112,205 Q230,220 348,205" marker-end="url(#ah8)"/>
  <text x="230" y="240" text-anchor="middle" font-size="13" fill="#9AA0A6">uniform, parallel field between the plates</text>
</svg>
