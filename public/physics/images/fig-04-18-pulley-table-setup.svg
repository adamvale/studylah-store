<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .table { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .box { fill:#6FB7E0; opacity:0.26; stroke:#6FB7E0; stroke-width:1.6; }
    .rope { stroke:#E8B65A; stroke-width:2; fill:none; }
    .pulley { fill:none; stroke:#9AA0A6; stroke-width:2; }
  </style>
  <!-- table -->
  <line class="table" x1="60" y1="120" x2="340" y2="120"/>
  <line class="table" x1="90" y1="120" x2="90" y2="230"/>
  <line class="table" x1="300" y1="120" x2="300" y2="230"/>
  <!-- block on table -->
  <rect class="box" x="150" y="82" width="60" height="38"/>
  <text x="180" y="106" text-anchor="middle" font-size="12">8 kg</text>
  <text x="200" y="150" font-size="11">smooth table</text>
  <!-- pulley at edge -->
  <circle class="pulley" cx="345" cy="120" r="12"/>
  <text x="360" y="112" font-size="11">pulley</text>
  <!-- rope -->
  <path class="rope" d="M210,101 L333,110"/>
  <path class="rope" d="M357,120 L357,190"/>
  <!-- hanging block -->
  <rect class="box" x="332" y="190" width="50" height="40"/>
  <text x="357" y="215" text-anchor="middle" font-size="12">2 kg</text>
  <text x="230" y="265" text-anchor="middle" font-size="11.5">g = 10 N/kg; ignore friction and air resistance.</text>
</svg>
