<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah16" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .gun { fill:#9AA0A6; opacity:0.22; stroke:#EAEAEA; stroke-width:1.5; }
    .obj { fill:#6FB7E0; opacity:0.14; stroke:#EAEAEA; stroke-width:1.6; }
    .drop { fill:#E58F8F; }
    .pos { fill:#E58F8F; font-size:11px; text-anchor:middle; }
    .neg { fill:#6FB7E0; font-size:13px; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .earth { stroke:#EAEAEA; stroke-width:1.4; fill:none; }
  </style>
  <text data-step="1" x="280" y="26" text-anchor="middle" font-size="14">Electrostatic spray painting</text>
  <!-- spray gun (left) -->
  <path data-step="1" class="gun" d="M40,120 L110,120 L110,105 L135,120 L110,135 L110,150 L40,150 Z"/>
  <rect data-step="1" class="gun" x="55" y="150" width="18" height="45"/>
  <text data-step="1" x="45" y="205" font-size="12">spray gun</text>
  <text data-step="1" x="45" y="219" font-size="12" fill="#E58F8F">(+ charged paint)</text>
  <!-- charged droplets spreading (mutual repulsion -> uniform mist) -->
  <g data-step="2" class="drop">
    <circle cx="180" cy="105" r="5"/><circle cx="215" cy="90" r="5"/><circle cx="250" cy="105" r="5"/>
    <circle cx="185" cy="135" r="5"/><circle cx="225" cy="135" r="5"/><circle cx="260" cy="135" r="5"/>
    <circle cx="180" cy="170" r="5"/><circle cx="220" cy="185" r="5"/><circle cx="255" cy="170" r="5"/>
  </g>
  <g data-step="2" class="pos">
    <text x="180" y="109">+</text><text x="215" y="94">+</text><text x="250" y="109">+</text>
    <text x="185" y="139">+</text><text x="225" y="139">+</text><text x="260" y="139">+</text>
    <text x="180" y="174">+</text><text x="220" y="189">+</text><text x="255" y="174">+</text>
  </g>
  <text data-step="2" x="230" y="248" text-anchor="middle" font-size="12" fill="#9AA0A6">like-charged droplets repel → even mist</text>
  <!-- metal object being painted (right), grounded, attracts droplets -->
  <rect data-step="3" class="obj" x="380" y="70" width="60" height="150" rx="6"/>
  <g data-step="3" class="neg">
    <text x="390" y="100">−</text><text x="390" y="140">−</text><text x="390" y="180">−</text>
  </g>
  <text data-step="3" x="410" y="245" text-anchor="middle" font-size="12">metal panel</text>
  <text data-step="3" x="410" y="260" text-anchor="middle" font-size="12" fill="#6FB7E0">(earthed)</text>
  <!-- earth wire -->
  <path data-step="4" class="earth" d="M440,215 L470,215 L470,250"/>
  <line data-step="4" class="earth" x1="458" y1="250" x2="482" y2="250"/>
  <line data-step="4" class="earth" x1="462" y1="256" x2="478" y2="256"/>
  <!-- attraction arrows -->
  <line data-step="5" stroke="#E8B65A" stroke-width="1.6" x1="300" y1="120" x2="375" y2="110" marker-end="url(#ah16)"/>
  <line data-step="5" stroke="#E8B65A" stroke-width="1.6" x1="300" y1="160" x2="375" y2="175" marker-end="url(#ah16)"/>
</svg>
