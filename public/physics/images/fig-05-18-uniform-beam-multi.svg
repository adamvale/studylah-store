<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#9AA0A6; opacity:0.35; stroke:#9AA0A6; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect data-step="1" class="beam" x="45" y="95" width="390" height="9"/>
  <!-- pivot right-of-centre -->
  <polygon data-step="1" class="pivot" points="318,132 342,132 330,104"/>
  <text data-step="1" class="lbl" x="330" y="152" text-anchor="middle">pivot</text>
  <!-- distances above (measured from pivot) -->
  <line data-step="2" class="dim" x1="90" y1="60" x2="330" y2="60"/>
  <path data-step="2" class="dim" d="M90,60 l8,-4 M90,60 l8,4"/>
  <path data-step="2" class="dim" d="M330,60 l-8,-4 M330,60 l-8,4"/>
  <text data-step="2" class="lbl" x="210" y="54" text-anchor="middle">30 cm</text>
  <line data-step="2" class="dim" x1="190" y1="82" x2="330" y2="82"/>
  <path data-step="2" class="dim" d="M190,82 l8,-4 M190,82 l8,4"/>
  <path data-step="2" class="dim" d="M330,82 l-8,-4 M330,82 l-8,4"/>
  <text data-step="2" class="lbl" x="255" y="76" text-anchor="middle">20 cm</text>
  <line data-step="2" class="dim" x1="330" y1="60" x2="410" y2="60"/>
  <path data-step="2" class="dim" d="M330,60 l8,-4 M330,60 l8,4"/>
  <path data-step="2" class="dim" d="M410,60 l-8,-4 M410,60 l-8,4"/>
  <text data-step="2" class="lbl" x="370" y="54" text-anchor="middle">10 cm</text>
  <!-- guides -->
  <line data-step="3" class="dim" x1="90" y1="60" x2="90" y2="95" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="190" y1="82" x2="190" y2="95" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="330" y1="60" x2="330" y2="104" stroke-dasharray="3 3"/>
  <line data-step="3" class="dim" x1="410" y1="60" x2="410" y2="95" stroke-dasharray="3 3"/>
  <!-- forces: two anticlockwise (left), one clockwise (right) -->
  <line data-step="4" class="force" x1="90" y1="104" x2="90" y2="150"/>
  <path data-step="4" class="force" d="M90,150 l-5,-10 M90,150 l5,-10"/>
  <text data-step="4" class="lbl" x="90" y="168" text-anchor="middle" fill="#E58F8F">20 N</text>
  <line data-step="4" class="force" x1="190" y1="104" x2="190" y2="150"/>
  <path data-step="4" class="force" d="M190,150 l-5,-10 M190,150 l5,-10"/>
  <text data-step="4" class="lbl" x="190" y="168" text-anchor="middle" fill="#E58F8F">12 N</text>
  <line data-step="4" class="force" x1="410" y1="104" x2="410" y2="150"/>
  <path data-step="4" class="force" d="M410,150 l-5,-10 M410,150 l5,-10"/>
  <text data-step="4" class="lbl" x="410" y="168" text-anchor="middle" fill="#E58F8F">W</text>
</svg>
