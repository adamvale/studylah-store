<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 275" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .sphere { fill:#6FB7E0; opacity:0.22; stroke:#6FB7E0; stroke-width:1.8; }
    .metal { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .piston { fill:#9AA0A6; opacity:0.35; stroke:#EAEAEA; stroke-width:1.5; }
    .jet { stroke:#6FB7E0; stroke-width:2; }
    .force { stroke:#E8B65A; stroke-width:2.4; }
    .lbl { font-size:12px; }
  </style>
  <!-- spherical vessel with many holes -->
  <circle data-step="1" class="sphere" cx="210" cy="140" r="70"/>
  <!-- jets spurting equally in all directions -->
  <g data-step="2" class="jet">
    <line x1="210" y1="70" x2="210" y2="45" marker-end="url(#j)"/>
    <line x1="259" y1="91" x2="277" y2="73" marker-end="url(#j)"/>
    <line x1="280" y1="140" x2="305" y2="140" marker-end="url(#j)"/>
    <line x1="259" y1="189" x2="277" y2="207" marker-end="url(#j)"/>
    <line x1="161" y1="189" x2="143" y2="207" marker-end="url(#j)"/>
    <line x1="140" y1="140" x2="118" y2="140" marker-end="url(#j)"/>
    <line x1="161" y1="91" x2="143" y2="73" marker-end="url(#j)"/>
  </g>
  <!-- cylinder + piston with applied force on left -->
  <rect data-step="3" class="metal" x="55" y="128" width="87" height="24"/>
  <rect data-step="3" class="piston" x="60" y="130" width="16" height="20"/>
  <line data-step="3" class="force" x1="30" y1="140" x2="58" y2="140" marker-end="url(#f)"/>
  <text data-step="3" x="25" y="132" class="lbl" fill="#E58F8F">force F</text>

  <text data-step="3" x="210" y="245" text-anchor="middle" class="lbl">Applied pressure is transmitted equally</text>
  <text data-step="3" x="210" y="263" text-anchor="middle" class="lbl">in all directions (Pascal's principle)</text>
  <defs>
    <marker id="j" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6FB7E0"/></marker>
    <marker id="f" markerWidth="10" markerHeight="9" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#E8B65A"/></marker>
  </defs>
</svg>
