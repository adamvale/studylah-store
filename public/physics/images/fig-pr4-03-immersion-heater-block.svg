<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 350" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .block { fill:#A8D3EC; fill-opacity:0.5; stroke:#6FB7E0; stroke-width:2; }
    .blocklbl { fill:#A8D3EC; }
    .lagging { fill:none; stroke:#E8B65A; stroke-width:2.4; stroke-dasharray:8 5; }
    .lagginglbl { fill:#E8B65A; }
    .hole { fill:none; stroke:#9AA0A6; stroke-width:1.6; }
    .heater { fill:none; stroke:#E58F8F; stroke-width:3; }
    .heaterlbl { fill:#E58F8F; }
    .glass { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .leader { fill:none; stroke:#9AA0A6; stroke-width:1.2; }
    .eq { font-size:13px; fill:#EAEAEA; }
  </style>

  <!-- lagging wrapped all around -->
  <rect data-step="1" class="lagging" x="96" y="86" width="204" height="200" rx="10"/>
  <rect data-step="1" class="lagging" x="108" y="98" width="180" height="176" rx="8"/>

  <!-- aluminium block -->
  <rect data-step="2" class="block" x="118" y="108" width="160" height="156" rx="4"/>

  <!-- 2 drilled holes -->
  <path data-step="3" class="hole" d="M158,108 V250 H182 V108"/>
  <path data-step="3" class="hole" d="M214,108 V220 H234 V108"/>

  <!-- immersion heater down inside the first hole -->
  <path data-step="4" class="heater" d="M170,50 V200"/>
  <path data-step="4" class="heater" d="M170,200 l-8,7 l16,9 l-16,9 l16,9 l-8,7"/>

  <!-- thermometer in the second hole -->
  <path data-step="5" class="glass" d="M224,44 V214"/>
  <circle data-step="5" class="glass" cx="224" cy="218" r="5" fill="#EAEAEA" fill-opacity="0.5"/>

  <text data-step="5" class="heaterlbl" x="150" y="48" text-anchor="end">heater</text>
  <path data-step="5" class="leader" d="M154,44 H164"/>

  <text data-step="5" x="240" y="44">thermometer</text>
  <path data-step="5" class="leader" d="M236,40 H228"/>

  <text data-step="5" class="lagginglbl" x="310" y="170">lagging</text>
  <path data-step="5" class="leader" d="M306,166 H301"/>

  <text data-step="5" class="blocklbl" x="200" y="310" text-anchor="middle">aluminium block</text>
  <path data-step="5" class="leader" d="M200,296 V288"/>

  <text data-step="5" class="eq" x="200" y="336" text-anchor="middle">P t = m c Δθ</text>
</svg>
