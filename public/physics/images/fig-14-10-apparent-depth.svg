<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:1.8; fill:none; }
    .ref { stroke:#6FB7E0; stroke-width:1.8; fill:none; }
    .water { fill:#6FB7E0; opacity:0.14; }
    .virt { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:6 4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.1; }
  </style>
  <!-- water -->
  <rect data-step="1" class="water" x="40" y="90" width="400" height="200"/>
  <line data-step="1" x1="40" y1="90" x2="440" y2="90" stroke="#EAEAEA" stroke-width="1.6"/>
  <text data-step="1" x="55" y="82" font-size="12">air</text>
  <text data-step="1" x="55" y="108" font-size="12">water</text>
  <!-- object at bottom -->
  <circle data-step="2" cx="250" cy="250" r="4" fill="#EAEAEA"/>
  <text data-step="2" x="262" y="255" font-size="12">object</text>
  <!-- image (apparent, shallower) -->
  <circle data-step="3" cx="250" cy="160" r="4" fill="none" stroke="#9AA0A6" stroke-width="1.5"/>
  <text data-step="3" x="262" y="152" font-size="12">image</text>
  <!-- incident rays in water -->
  <path data-step="4" class="inc" marker-end="url(#a1)" d="M250,250 L231,92"/>
  <path data-step="4" class="inc" marker-end="url(#a1)" d="M250,250 L299,92"/>
  <!-- refracted rays into air (bend away from normal) -->
  <path data-step="5" class="ref" marker-end="url(#a2)" d="M230,90 L216,41"/>
  <path data-step="5" class="ref" marker-end="url(#a2)" d="M300,90 L335,41"/>
  <!-- apparent (virtual) rays -->
  <path data-step="6" class="virt" d="M230,90 L250,160"/>
  <path data-step="6" class="virt" d="M300,90 L250,160"/>
  <!-- eye -->
  <g data-step="7" transform="translate(300,30)">
    <path d="M0,8 Q18,-6 36,8 Q18,20 0,8 Z" fill="none" stroke="#E8B65A" stroke-width="1.5"/>
    <circle cx="18" cy="8" r="4.5" fill="#E8B65A"/>
  </g>
  <!-- depth brackets on left -->
  <line data-step="8" class="dim" x1="120" y1="90" x2="120" y2="250"/>
  <line data-step="8" class="dim" x1="114" y1="90" x2="126" y2="90"/>
  <line data-step="8" class="dim" x1="114" y1="250" x2="126" y2="250"/>
  <text data-step="8" x="112" y="175" text-anchor="end" font-size="12">real</text>
  <text data-step="8" x="112" y="189" text-anchor="end" font-size="12">depth</text>
  <line data-step="8" class="dim" x1="165" y1="90" x2="165" y2="160"/>
  <line data-step="8" class="dim" x1="159" y1="90" x2="171" y2="90"/>
  <line data-step="8" class="dim" x1="159" y1="160" x2="171" y2="160"/>
  <text data-step="8" x="177" y="120" font-size="12">apparent</text>
  <text data-step="8" x="177" y="134" font-size="12">depth</text>
</svg>
