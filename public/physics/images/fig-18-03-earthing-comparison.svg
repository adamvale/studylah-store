<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .case { fill:#6FB7E0; opacity:0.16; stroke:#6FB7E0; stroke-width:1.6; }
    .wire { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .earth { stroke:#86C98B; stroke-width:2; fill:none; }
    .flow { stroke:#E58F8F; stroke-width:2; fill:none; }
    .flowg { stroke:#86C98B; stroke-width:2; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .red { fill:#E58F8F; }
    .grn { fill:#86C98B; }
    .div { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:5 4; }
  </style>
  <!-- titles -->
  <text x="175" y="24" text-anchor="middle" font-size="13" class="red">Appliance WITHOUT earth wire</text>
  <text x="525" y="24" text-anchor="middle" font-size="13" class="grn">Appliance WITH earth wire</text>
  <line class="div" x1="350" y1="34" x2="350" y2="330"/>

  <!-- ============ LEFT ============ -->
  <rect class="case" x="120" y="80" width="120" height="90" rx="4"/>
  <text x="180" y="128" text-anchor="middle" font-size="11">metal casing</text>
  <!-- live wire faults onto casing -->
  <path class="flow" d="M60,150 L120,150"/>
  <text x="52" y="154" text-anchor="end" font-size="11">L</text>
  <text x="52" y="180" text-anchor="end" font-size="11">N</text>
  <path class="wire" d="M60,176 L110,176"/>
  <circle cx="120" cy="150" r="3" class="red"/>
  <text x="128" y="66" font-size="10" class="red">fault: live touches casing</text>
  <!-- current through hand -->
  <path class="flow" d="M240,140 C270,150 275,180 260,205"/>
  <path class="wire" d="M255,205 q10,8 -4,16"/>
  <text x="278" y="196" font-size="11" class="red">shock through</text>
  <text x="278" y="210" font-size="11" class="red">the body</text>
  <line class="wire" x1="250" y1="235" x2="250" y2="255"/>
  <text x="250" y="272" text-anchor="middle" font-size="10">to the ground</text>

  <!-- ============ RIGHT ============ -->
  <rect class="case" x="470" y="80" width="120" height="90" rx="4"/>
  <text x="530" y="128" text-anchor="middle" font-size="11">metal casing</text>
  <path class="flow" d="M410,150 L470,150"/>
  <text x="402" y="154" text-anchor="end" font-size="11">L</text>
  <text x="402" y="180" text-anchor="end" font-size="11">N</text>
  <path class="wire" d="M410,176 L460,176"/>
  <circle cx="470" cy="150" r="3" class="red"/>
  <text x="478" y="66" font-size="10" class="red">fault: live touches casing</text>
  <!-- earth wire diverts to ground -->
  <path class="flowg" d="M530,170 L530,250"/>
  <text x="540" y="215" font-size="11" class="grn">current diverted</text>
  <text x="540" y="229" font-size="11" class="grn">by earth wire</text>
  <!-- earth symbol -->
  <line class="earth" x1="530" y1="250" x2="530" y2="262"/>
  <line class="earth" x1="512" y1="262" x2="548" y2="262"/>
  <line class="earth" x1="518" y1="270" x2="542" y2="270"/>
  <line class="earth" x1="524" y1="278" x2="536" y2="278"/>
  <text x="560" y="266" font-size="11" class="grn">E</text>
  <!-- hand safe -->
  <path class="wire" d="M590,140 q18,10 6,26"/>
  <text x="612" y="150" font-size="11" class="grn">no shock:</text>
  <text x="612" y="164" font-size="11" class="grn">low-resistance</text>
  <text x="612" y="178" font-size="11" class="grn">path to earth</text>
</svg>
