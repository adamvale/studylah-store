<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .lens { fill:#6FB7E0; fill-opacity:0.22; stroke:#6FB7E0; stroke-width:1.6; }
    .ray { fill:none; stroke:#6FB7E0; stroke-width:2.2; }
    .kit { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .obj { fill:none; stroke:#86C98B; stroke-width:2.4; }
    .img { fill:none; stroke:#E8B65A; stroke-width:2.4; }
    .rule { fill:none; stroke:#9AA0A6; stroke-width:1.4; }
    .axisline { fill:none; stroke:#9AA0A6; stroke-width:1.1; stroke-dasharray:5 4; }
    .dim { fill:none; stroke:#9AA0A6; stroke-width:1.3; }
    .sym { fill:#E8B65A; font-size:15px; }
    .eq { fill:#E8B65A; font-size:14px; }
    .lbl { fill:#E8B65A; font-size:11px; }
    .green { fill:#86C98B; font-size:12px; }
    .grey { fill:#9AA0A6; font-size:11px; }
  </style>
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6FB7E0"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#9AA0A6"/></marker>
    <marker id="am" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#E8B65A"/></marker>
  </defs>

  <text data-step="3" class="eq" x="230" y="40" text-anchor="middle">1/f = 1/u + 1/v</text>

  <path data-step="1" class="axisline" d="M30,175 H410"/>

  <rect data-step="1" class="kit" x="30" y="155" width="40" height="40" rx="3"/>
  <path data-step="1" class="ray" d="M70,166 L114,152"/>
  <path data-step="1" class="ray" d="M70,184 L114,196"/>
  <text data-step="3" x="50" y="118" text-anchor="middle">lamp</text>

  <path data-step="1" class="obj" d="M120,145 V205 M108,175 H132"/>
  <text data-step="3" class="green" x="120" y="138" text-anchor="middle">cross-wire</text>

  <path data-step="1" class="lens" d="M230,125 C248,155 248,195 230,225 C212,195 212,155 230,125 Z"/>
  <text data-step="3" x="230" y="110" text-anchor="middle">lens</text>

  <path data-step="1" class="ray" d="M120,145 H180" marker-end="url(#ab)"/>
  <path data-step="1" class="ray" d="M180,145 H230 L300,179" marker-end="url(#ab)"/>
  <path data-step="1" class="ray" d="M300,179 L370,213"/>
  <path data-step="1" class="ray" d="M120,145 L180,161.4" marker-end="url(#ab)"/>
  <path data-step="1" class="ray" d="M180,161.4 L230,175 L300,194" marker-end="url(#ab)"/>
  <path data-step="2" class="ray" d="M300,194 L370,213"/>

  <rect data-step="2" class="kit" x="366" y="130" width="8" height="105"/>
  <path data-step="2" class="img" d="M370,175 V209" marker-end="url(#am)"/>
  <text data-step="3" x="370" y="118" text-anchor="middle">screen</text>
  <path data-step="2" class="dim" d="M370,97 H350" marker-end="url(#ag)"/>
  <path data-step="2" class="dim" d="M370,97 H390" marker-end="url(#ag)"/>
  <text data-step="4" class="lbl" x="352" y="88" text-anchor="middle">slide, then average</text>

  <path data-step="2" class="dim" d="M175,245 H122" marker-end="url(#ag)"/>
  <path data-step="2" class="dim" d="M175,245 H228" marker-end="url(#ag)"/>
  <text data-step="4" class="sym" x="175" y="239" text-anchor="middle">u</text>
  <path data-step="2" class="dim" d="M300,245 H232" marker-end="url(#ag)"/>
  <path data-step="2" class="dim" d="M300,245 H368" marker-end="url(#ag)"/>
  <text data-step="4" class="sym" x="300" y="239" text-anchor="middle">v</text>

  <rect data-step="2" class="rule" x="30" y="258" width="380" height="20"/>
  <path data-step="2" class="rule" d="M50,278 V270 M70,278 V270 M90,278 V266 M110,278 V270 M130,278 V270 M150,278 V270 M170,278 V266 M190,278 V270 M210,278 V270 M230,278 V270 M250,278 V266 M270,278 V270 M290,278 V270 M310,278 V270 M330,278 V266 M350,278 V270 M370,278 V270 M390,278 V270"/>
  <text data-step="4" class="grey" x="32" y="294">0</text>
  <text data-step="4" class="grey" x="215" y="294" text-anchor="middle">metre rule</text>
</svg>
