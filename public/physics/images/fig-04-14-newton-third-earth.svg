<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/>
    </marker>
    <marker id="arwG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#86C98B"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .ball { fill:#6FB7E0; opacity:0.26; stroke:#6FB7E0; stroke-width:1.6; }
    .earth { fill:#E8B65A; opacity:0.12; stroke:#E8B65A; stroke-width:1.6; }
    .down { stroke:#E58F8F; stroke-width:2.4; }
    .up { stroke:#86C98B; stroke-width:2.4; }
  </style>
  <!-- ball near top -->
  <circle data-step="1" class="ball" cx="160" cy="60" r="18"/>
  <text data-step="1" x="185" y="55" font-size="13">ball</text>
  <line data-step="1" class="down" x1="160" y1="78" x2="160" y2="135" marker-end="url(#arwR)"/>
  <text data-step="1" x="170" y="115" font-size="13.5" fill="#E58F8F">F (Earth on ball)</text>
  <!-- earth big circle -->
  <circle data-step="2" class="earth" cx="160" cy="255" r="70"/>
  <text data-step="2" x="160" y="300" text-anchor="middle" font-size="13">Earth</text>
  <line data-step="2" class="up" x1="160" y1="185" x2="160" y2="128" marker-end="url(#arwG)"/>
  <text data-step="2" x="170" y="170" font-size="13.5" fill="#86C98B">F (ball on Earth)</text>
</svg>
