<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .magN { fill:#E58F8F; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .magS { fill:#6FB7E0; opacity:0.30; stroke:#EAEAEA; stroke-width:1.6; }
    .pole { font-size:15px; font-weight:bold; fill:#EAEAEA; }
    .fl { stroke:#9AA0A6; stroke-width:1.6; fill:none; }
    .fhead { fill:#9AA0A6; }
    .lbl { fill:#E8B65A; font-size:14.5px; }
  </style>

  <!-- N pole slab (left) facing S pole slab (right), small gap -->
  <rect data-step="1" class="magN" x="60" y="70" width="34" height="150" rx="2"/>
  <rect data-step="1" class="magS" x="426" y="70" width="34" height="150" rx="2"/>
  <text data-step="1" class="pole" x="70" y="150">N</text>
  <text data-step="1" class="pole" x="436" y="150">S</text>

  <!-- parallel field lines across the gap, N -> S -->
  <g data-step="2" class="fl">
    <line x1="94" y1="90"  x2="426" y2="90"/>
    <line x1="94" y1="115" x2="426" y2="115"/>
    <line x1="94" y1="140" x2="426" y2="140"/>
    <line x1="94" y1="165" x2="426" y2="165"/>
    <line x1="94" y1="190" x2="426" y2="190"/>
  </g>
  <g data-step="2" class="fhead">
    <polygon points="255,85 255,95 268,90"/>
    <polygon points="255,110 255,120 268,115"/>
    <polygon points="255,135 255,145 268,140"/>
    <polygon points="255,160 255,170 268,165"/>
    <polygon points="255,185 255,195 268,190"/>
  </g>
  <!-- slight curving (arcing) only at the edges -->
  <path data-step="3" class="fl" d="M94,90 C70,75 70,70 78,64"/>
  <path data-step="3" class="fl" d="M94,190 C70,205 70,210 78,216"/>
  <path data-step="3" class="fl" d="M426,90 C450,75 450,70 442,64"/>
  <path data-step="3" class="fl" d="M426,190 C450,205 450,210 442,216"/>

  <text data-step="3" x="260" y="40" text-anchor="middle" class="lbl">Two flat opposite poles, close but not touching</text>
  <text data-step="3" x="260" y="255" text-anchor="middle" font-size="14">Between the poles the lines are parallel and evenly</text>
  <text data-step="3" x="260" y="273" text-anchor="middle" font-size="14">spaced, a uniform field. Arcing appears only at the edges.</text>
</svg>
