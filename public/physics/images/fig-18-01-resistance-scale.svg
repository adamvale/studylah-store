<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:2; }
    .tick { stroke:#9AA0A6; stroke-width:1.3; }
    .amber { fill:#E8B65A; }
    .blue { fill:#6FB7E0; }
  </style>
  <!-- metal labels -->
  <g font-size="13" text-anchor="middle">
    <text x="90" y="45">silver</text>
    <text x="220" y="45">copper</text>
    <text x="350" y="45">tungsten</text>
    <text x="480" y="45">nichrome</text>
  </g>
  <!-- ticks -->
  <g class="tick">
    <line x1="90" y1="60" x2="90" y2="80"/>
    <line x1="220" y1="60" x2="220" y2="80"/>
    <line x1="350" y1="60" x2="350" y2="80"/>
    <line x1="480" y1="60" x2="480" y2="80"/>
  </g>
  <!-- axis with arrow -->
  <line class="axis" x1="60" y1="80" x2="520" y2="80"/>
  <path class="axis" fill="none" d="M512,73 L522,80 L512,87"/>
  <!-- end labels -->
  <text x="90" y="115" text-anchor="middle" font-size="13" class="blue">low resistance</text>
  <text x="480" y="115" text-anchor="middle" font-size="13" class="amber">high resistance</text>
  <text x="290" y="145" text-anchor="middle" font-size="12">resistance of the metal increases &#8594;</text>
</svg>
