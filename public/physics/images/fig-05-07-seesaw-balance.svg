<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:13px; }
  </style>
  <rect class="beam" x="60" y="95" width="340" height="9"/>
  <polygon class="pivot" points="218,132 242,132 230,104"/>
  <text class="lbl" x="230" y="152" text-anchor="middle">pivot</text>
  <!-- distances -->
  <line class="dim" x1="110" y1="70" x2="230" y2="70"/>
  <path class="dim" d="M110,70 l8,-4 M110,70 l8,4"/>
  <path class="dim" d="M230,70 l-8,-4 M230,70 l-8,4"/>
  <text class="lbl" x="170" y="64" text-anchor="middle">40 cm</text>
  <line class="dim" x1="230" y1="70" x2="320" y2="70"/>
  <path class="dim" d="M230,70 l8,-4 M230,70 l8,4"/>
  <path class="dim" d="M320,70 l-8,-4 M320,70 l-8,4"/>
  <text class="lbl" x="275" y="64" text-anchor="middle">20 cm</text>
  <line class="dim" x1="230" y1="70" x2="230" y2="104" stroke-dasharray="3 3"/>
  <line class="dim" x1="110" y1="70" x2="110" y2="95" stroke-dasharray="3 3"/>
  <line class="dim" x1="320" y1="70" x2="320" y2="95" stroke-dasharray="3 3"/>
  <!-- forces -->
  <line class="force" x1="110" y1="103" x2="110" y2="150"/>
  <path class="force" d="M110,150 l-5,-10 M110,150 l5,-10"/>
  <text class="lbl" x="110" y="170" text-anchor="middle" fill="#E58F8F">30 N</text>
  <line class="force" x1="320" y1="103" x2="320" y2="150"/>
  <path class="force" d="M320,150 l-5,-10 M320,150 l5,-10"/>
  <text class="lbl" x="320" y="170" text-anchor="middle" fill="#E58F8F">W</text>
</svg>
