<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah10" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .rodp { fill:#E58F8F; opacity:0.18; stroke:#E58F8F; stroke-width:1.5; }
    .obj  { fill:#9AA0A6; opacity:0.14; stroke:#EAEAEA; stroke-width:1.4; }
    .pos { fill:#E58F8F; font-size:13px; text-anchor:middle; }
    .neg { fill:#6FB7E0; font-size:14px; text-anchor:middle; }
    .frcA { stroke:#86C98B; stroke-width:2; }
    .frcR { stroke:#E58F8F; stroke-width:2; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
  </style>
  <text x="300" y="24" text-anchor="middle" font-size="13">A charged rod induces charges in a neutral object</text>
  <!-- positively charged rod on top -->
  <rect class="rodp" x="150" y="55" width="300" height="26" rx="6"/>
  <g class="pos">
    <text x="180" y="73">+</text><text x="220" y="73">+</text><text x="260" y="73">+</text>
    <text x="300" y="73">+</text><text x="340" y="73">+</text><text x="380" y="73">+</text><text x="420" y="73">+</text>
  </g>
  <text x="470" y="72" font-size="11" fill="#E58F8F">positively charged rod</text>
  <!-- neutral object below: near side negative, far side positive -->
  <ellipse class="obj" cx="300" cy="170" rx="70" ry="45"/>
  <text class="neg" x="270" y="150">&#8722;</text><text class="neg" x="300" y="150">&#8722;</text><text class="neg" x="330" y="150">&#8722;</text>
  <text class="pos" x="270" y="200">+</text><text class="pos" x="300" y="200">+</text><text class="pos" x="330" y="200">+</text>
  <text x="300" y="245" text-anchor="middle" font-size="11">neutral object</text>
  <!-- near (unlike) charges closer -> stronger attractive force -->
  <line class="frcA" x1="300" y1="128" x2="300" y2="92" marker-end="url(#ah10)"/>
  <text x="360" y="112" font-size="11" fill="#86C98B">strong attraction (unlike, closer)</text>
  <!-- far (like) charges further -> weaker repulsive force -->
  <line class="frcR" x1="300" y1="205" x2="300" y2="235" marker-end="url(#ah10)"/>
  <text x="360" y="228" font-size="11" fill="#E58F8F">weak repulsion (like, further)</text>
  <text x="60" y="175" font-size="11" fill="#9AA0A6">net force:</text>
  <text x="60" y="190" font-size="11" fill="#9AA0A6">attraction</text>
</svg>
