<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.8; }
    .line { fill:none; stroke:#6FB7E0; stroke-width:2.6; }
    .pt { fill:#E8B65A; }
    .lbl { font-size:13; }
  </style>
  <line data-step="1" class="axis" x1="70" y1="30" x2="70" y2="255" marker-end="url(#arw)"/>
  <line data-step="1" class="axis" x1="70" y1="255" x2="500" y2="255" marker-end="url(#arw)"/>
  <text data-step="1" x="70" y="22" text-anchor="middle" class="lbl">speed (m/s)</text>
  <text data-step="1" x="510" y="270" text-anchor="end" class="lbl">time (s)</text>
  <!-- y ticks: 15 at y=180, 30 at y=105 -->
  <text data-step="1" x="62" y="185" text-anchor="end" class="lbl">15</text>
  <text data-step="1" x="62" y="110" text-anchor="end" class="lbl">30</text>
  <!-- x ticks 15,30,50,65,80 -->
  <text data-step="2" x="130" y="270" text-anchor="middle" class="lbl">15</text>
  <text data-step="2" x="190" y="270" text-anchor="middle" class="lbl">30</text>
  <text data-step="2" x="270" y="270" text-anchor="middle" class="lbl">50</text>
  <text data-step="2" x="330" y="270" text-anchor="middle" class="lbl">65</text>
  <text data-step="2" x="390" y="270" text-anchor="middle" class="lbl">80</text>
  <!-- curve A(0,0) B(15,15) C(30,15) E(50,30) F(65,20) G(80,0) -->
  <path data-step="3" class="line" d="M70,255 L130,180 L190,180 C220,180 250,110 270,105 L300,120 L330,155 L390,255"/>
  <g data-step="3" class="lbl">
    <circle class="pt" cx="70" cy="255" r="3"/><text x="60" y="252">A</text>
    <circle class="pt" cx="130" cy="180" r="3"/><text x="126" y="172">B</text>
    <circle class="pt" cx="190" cy="180" r="3"/><text x="192" y="172">C</text>
    <circle class="pt" cx="270" cy="105" r="3"/><text x="266" y="97">E</text>
    <circle class="pt" cx="330" cy="155" r="3"/><text x="336" y="152">F</text>
    <circle class="pt" cx="390" cy="255" r="3"/><text x="396" y="252">G</text>
  </g>
</svg>
