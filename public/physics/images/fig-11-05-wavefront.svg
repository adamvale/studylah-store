<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .wave { stroke:#6FB7E0; stroke-width:2.2; fill:none; }
    .wave2 { stroke:#E8B65A; stroke-width:2.2; fill:none; stroke-dasharray:6 4; }
    .rest { stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:5 4; fill:none; }
    .guide { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:3 3; fill:none; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .dim { stroke:#E8B65A; stroke-width:1.4; fill:none; }
    .lbl { fill:#E8B65A; font-size:14px; }
    .lblb { fill:#6FB7E0; font-size:14px; }
    .tick { stroke:#EAEAEA; stroke-width:1.2; }
    .sm { font-size:12px; }
  </style>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/>
    </marker>
    <marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
    <marker id="ahm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>
  <circle data-step="1" cx="170" cy="150" r="4" fill="#E8B65A"/>
  <text data-step="3" x="170" y="297" text-anchor="middle" font-size="12.5" fill="#9AA0A6">source</text>
  <path data-step="1" class="lead" d="M170,286 L170,160"/>
  <circle data-step="1" cx="170" cy="150" r="30" fill="none" stroke="#6FB7E0" stroke-width="2"/>
  <circle data-step="1" cx="170" cy="150" r="55" fill="none" stroke="#9AA0A6" stroke-width="1.4" stroke-dasharray="5 4"/>
  <circle data-step="1" cx="170" cy="150" r="80" fill="none" stroke="#6FB7E0" stroke-width="2"/>
  <circle data-step="1" cx="170" cy="150" r="105" fill="none" stroke="#9AA0A6" stroke-width="1.4" stroke-dasharray="5 4"/>
  <circle data-step="2" cx="170" cy="150" r="130" fill="none" stroke="#6FB7E0" stroke-width="2"/>
  <text data-step="3" x="360" y="70" class="lblb">wavefront (a crest)</text>
  <path data-step="2" class="lead" d="M355,66 L277,76"/>
  <text data-step="3" x="360" y="150" class="lbl">a trough</text>
  <path data-step="2" class="lead" d="M355,146 L275,150"/>
  <text data-step="4" x="360" y="230" font-size="13" fill="#EAEAEA">points on one</text>
  <text data-step="4" x="360" y="246" font-size="13" fill="#EAEAEA">wavefront are in phase</text>
  <path data-step="2" class="lead" d="M355,235 L226,206"/>
  <line data-step="2" x1="170" y1="150" x2="170" y2="10" class="axis" marker-end="url(#ah)" opacity="0.5"/>
  <text data-step="4" x="180" y="16" font-size="12" fill="#9AA0A6">travel</text>
</svg>
