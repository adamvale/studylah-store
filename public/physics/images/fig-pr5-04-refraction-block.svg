    .normal { fill:none; stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { fill:none; stroke:#E8B65A; stroke-width:1.8; }
    .sym { fill:#E8B65A; font-size:14px; }
    .lbl { fill:#E8B65A; font-size:12px; }
    .grey { fill:#9AA0A6; font-size:11px; }
  </style>
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6FB7E0"/></marker>
  </defs>

  <rect class="glass" x="110" y="150" width="240" height="120" rx="3"/>

  <path class="normal" d="M190,95 V215"/>
  <path class="normal" d="M261.3,215 V325"/>

  <path class="ray" d="M105.7,79.3 L147.9,114.7" marker-end="url(#ab)"/>
  <path class="ray" d="M147.9,114.7 L190,150"/>
  <path class="ray" d="M190,150 L225.6,210" marker-end="url(#ab)"/>
  <path class="ray" d="M225.6,210 L261.3,270"/>
  <path class="ray" d="M261.3,270 L295.8,299" marker-end="url(#ab)"/>
  <path class="ray" d="M295.8,299 L330.2,327.9"/>

