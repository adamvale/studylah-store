  <text class="sym" x="172" y="124" text-anchor="middle">i</text>
  <text class="sym" x="197" y="186" text-anchor="middle">r</text>

  <text x="34" y="140">air</text>
  <text x="120" y="174">glass</text>
  <text x="34" y="300">air</text>
  <text class="grey" x="196" y="92">normal</text>
  <text class="grey" x="267" y="212">normal</text>
  <text class="lbl" x="240" y="120">r is less than i</text>
