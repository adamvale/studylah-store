<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .lbl { font-size:13px; }
  </style>
  <!-- outer top with cell -->
  <path class="wire" d="M70,60 L185,60 M201,60 L330,60"/>
  <line class="wire" x1="185" y1="42" x2="185" y2="78" stroke-width="2.4"/>
  <line class="wire" x1="201" y1="52" x2="201" y2="68" stroke-width="5"/>
  <!-- left & right rails -->
  <path class="wire" d="M70,60 L70,220"/>
  <path class="wire" d="M330,60 L330,220"/>
  <!-- three parallel branches with resistors -->
  <path class="wire" d="M70,100 L130,100"/>
  <rect class="wire" x="130" y="88" width="46" height="24"/>
  <path class="wire" d="M176,100 L330,100"/>
  <text x="153" y="82" class="lbl" text-anchor="middle">R&#8321;</text>

  <path class="wire" d="M70,150 L130,150"/>
  <rect class="wire" x="130" y="138" width="46" height="24"/>
  <path class="wire" d="M176,150 L330,150"/>
  <text x="153" y="132" class="lbl" text-anchor="middle">R&#8322;</text>

  <path class="wire" d="M70,200 L130,200"/>
  <rect class="wire" x="130" y="188" width="46" height="24"/>
  <path class="wire" d="M176,200 L330,200"/>
  <text x="153" y="182" class="lbl" text-anchor="middle">R&#8323;</text>

  <text x="200" y="248" class="lbl" text-anchor="middle" fill="#9AA0A6">resistors in parallel</text>
</svg>
