<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#6FB7E0; opacity:0.26; stroke:#6FB7E0; stroke-width:1.6; }
    .f { stroke:#E8B65A; stroke-width:2.2; }
    .fr { stroke:#6FB7E0; stroke-width:2.2; }
    .ground { stroke:#9AA0A6; stroke-width:1.6; }
  </style>
  <line class="ground" x1="40" y1="145" x2="390" y2="145"/>
  <rect class="box" x="210" y="95" width="60" height="50"/>
  <text x="240" y="125" text-anchor="middle" font-size="13">4.0 kg</text>
  <!-- applied force -->
  <line class="f" x1="130" y1="118" x2="206" y2="118" marker-end="url(#arw)"/>
  <text x="160" y="108" text-anchor="middle" font-size="13.5">25 N</text>
  <!-- friction -->
  <line class="fr" x1="330" y1="118" x2="274" y2="118" marker-end="url(#arwR)"/>
  <text x="345" y="122" font-size="13.5" fill="#6FB7E0">13 N</text>
  <text x="215" y="180" text-anchor="middle" font-size="12.5">A 4.0 kg box pushed along a floor against 13 N of friction.</text>
</svg>
