<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .string { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .arc { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:5 4; fill:none; }
    .bob { fill:#6FB7E0; stroke:#EAEAEA; stroke-width:1.4; }
    .ghost { fill:none; stroke:#9AA0A6; stroke-width:1.3; }
    .pivot { fill:#EAEAEA; }
    .dim { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .lbl { fill:#E8B65A; font-size:12px; }
    .store { fill:#86C98B; font-size:11px; }
  </style>
  <defs>
    <marker id="h1" markerWidth="10" markerHeight="9" refX="8" refY="3.5" orient="auto-start-reverse"><path d="M0,0 L8,3.5 L0,7 Z" fill="#9AA0A6"/></marker>
    <marker id="h2" markerWidth="10" markerHeight="9" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#9AA0A6"/></marker>
  </defs>
  <!-- pivot -->
  <circle class="pivot" cx="230" cy="40" r="4"/>
  <line x1="180" y1="40" x2="280" y2="40" stroke="#EAEAEA" stroke-width="2"/>
  <!-- strings to A, B, C -->
  <line class="string" x1="230" y1="40" x2="110" y2="150"/>
  <line class="string" x1="230" y1="40" x2="230" y2="200"/>
  <line class="string" x1="230" y1="40" x2="350" y2="150"/>
  <!-- swing arc -->
  <path class="arc" d="M110,158 Q230,240 350,158"/>
  <!-- bobs -->
  <circle class="ghost" cx="110" cy="150" r="13"/>
  <circle class="bob" cx="230" cy="200" r="13"/>
  <circle class="ghost" cx="350" cy="150" r="13"/>
  <!-- point labels -->
  <text x="88" y="140" fill="#EAEAEA">A</text>
  <text x="222" y="235" fill="#EAEAEA">B</text>
  <text x="360" y="140" fill="#EAEAEA">C</text>
  <!-- height h between A level and B level -->
  <line class="dim" x1="395" y1="150" x2="395" y2="200" marker-start="url(#h1)" marker-end="url(#h2)"/>
  <text class="lbl" x="404" y="180"><tspan font-style="italic">h</tspan></text>
  <line class="dim" x1="350" y1="150" x2="400" y2="150" stroke-dasharray="3 3"/>
  <line class="dim" x1="243" y1="200" x2="400" y2="200" stroke-dasharray="3 3"/>
  <!-- store notes -->
  <text class="store" x="110" y="185" text-anchor="middle">max E_p, zero E_k</text>
  <text class="store" x="230" y="262" text-anchor="middle">max E_k, min E_p</text>
  <text class="store" x="350" y="185" text-anchor="middle">max E_p, zero E_k</text>
</svg>
