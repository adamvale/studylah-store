<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .frame { fill:#9AA0A6; opacity:0.18; stroke:#EAEAEA; stroke-width:1.5; }
    .door { fill:#E8B65A; opacity:0.14; stroke:#EAEAEA; stroke-width:1.5; }
    .iron { fill:#9AA0A6; opacity:0.30; stroke:#EAEAEA; stroke-width:1.5; }
    .magnet { fill:#E58F8F; opacity:0.26; stroke:#EAEAEA; stroke-width:1.5; }
    .lbl { fill:#E8B65A; font-size:14px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <!-- door leaf (left) with soft iron plate -->
  <rect data-step="1" class="door" x="60" y="40" width="70" height="180" rx="2"/>
  <rect data-step="1" class="iron" x="118" y="100" width="16" height="60" rx="2"/>
  <!-- frame (right) with permanent magnet -->
  <rect data-step="2" class="frame" x="330" y="40" width="70" height="180" rx="2"/>
  <rect data-step="2" class="magnet" x="326" y="100" width="16" height="60" rx="2"/>

  <text data-step="2" x="60" y="30" class="lbl">door</text>
  <text data-step="2" x="330" y="30" class="lbl">frame</text>
  <text data-step="2" x="230" y="112" text-anchor="middle" class="lbl">soft iron plate</text>
  <path data-step="2" class="lead" d="M178,108 L136,118"/>
  <text data-step="2" x="230" y="158" text-anchor="middle" class="lbl">permanent magnet</text>
  <path data-step="2" class="lead" d="M284,154 L324,142"/>
  <text data-step="2" x="230" y="245" text-anchor="middle" font-size="14">When the door closes, the plate meets the magnet.</text>
</svg>
