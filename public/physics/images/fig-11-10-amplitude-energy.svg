<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 450" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .wave { stroke:#6FB7E0; stroke-width:2.2; fill:none; }
    .wave2 { stroke:#E8B65A; stroke-width:2.2; fill:none; }
    .dim { stroke:#E8B65A; stroke-width:1.4; fill:none; }
    .lbl { fill:#E8B65A; font-size:13.5px; }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
    <marker id="aha" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>

  <!-- TOP: lower amplitude -->
  <line data-step="1" x1="70" y1="178" x2="70" y2="28" class="axis" marker-end="url(#ah)"/>
  <line data-step="1" x1="56" y1="108" x2="395" y2="108" class="axis" marker-end="url(#ah)"/>
  <text data-step="1" x="14" y="18" font-size="13">displacement</text>
  <text data-step="1" x="395" y="126" text-anchor="end" font-size="13">distance</text>
  <text data-step="1" x="64" y="122" text-anchor="end" font-size="13">0</text>
  <path data-step="1" class="wave" d="M70,108 Q105,58 140,108 Q175,158 210,108 Q245,58 280,108 Q315,158 350,108"/>
  <line data-step="1" x1="105" y1="108" x2="105" y2="83" class="dim" marker-start="url(#aha)" marker-end="url(#aha)"/>
  <text data-step="1" x="105" y="74" text-anchor="middle" class="lbl">amplitude</text>
  <text data-step="1" x="210" y="200" text-anchor="middle" font-size="14" fill="#6FB7E0">lower amplitude</text>
  <text data-step="1" x="210" y="217" text-anchor="middle" font-size="13" fill="#9AA0A6">wave carries less energy</text>

  <!-- BOTTOM: higher amplitude, same wavelength -->
  <line data-step="2" x1="70" y1="403" x2="70" y2="253" class="axis" marker-end="url(#ah)"/>
  <line data-step="2" x1="56" y1="333" x2="395" y2="333" class="axis" marker-end="url(#ah)"/>
  <text data-step="2" x="14" y="243" font-size="13">displacement</text>
  <text data-step="2" x="395" y="351" text-anchor="end" font-size="13">distance</text>
  <text data-step="2" x="64" y="347" text-anchor="end" font-size="13">0</text>
  <path data-step="2" class="wave2" d="M70,333 Q105,233 140,333 Q175,433 210,333 Q245,233 280,333 Q315,433 350,333"/>
  <line data-step="2" x1="105" y1="333" x2="105" y2="283" class="dim" marker-start="url(#aha)" marker-end="url(#aha)"/>
  <text data-step="2" x="105" y="274" text-anchor="middle" class="lbl">amplitude</text>
  <text data-step="2" x="210" y="425" text-anchor="middle" font-size="14" fill="#E8B65A">higher amplitude</text>
  <text data-step="2" x="210" y="442" text-anchor="middle" font-size="13" fill="#9AA0A6">wave carries more energy</text>
</svg>
