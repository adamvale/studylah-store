<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .shell { fill:none; stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:4 4; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
    .proton { fill:#E58F8F; opacity:0.9; }
    .neutron { fill:#9AA0A6; opacity:0.9; }
    .electron { fill:none; stroke:#6FB7E0; stroke-width:1.8; }
    .ptxt { fill:#0d0d0d; font-size:12px; text-anchor:middle; }
  </style>
  <!-- electron shell -->
  <circle class="shell" cx="230" cy="170" r="110"/>
  <!-- nucleus: 2 protons + 2 neutrons -->
  <circle class="proton" cx="216" cy="164" r="15"/><text class="ptxt" x="216" y="169">+</text>
  <circle class="proton" cx="244" cy="164" r="15"/><text class="ptxt" x="244" y="169">+</text>
  <circle class="neutron" cx="216" cy="188" r="15"/>
  <circle class="neutron" cx="244" cy="188" r="15"/>
  <!-- electrons on the shell -->
  <circle class="electron" cx="230" cy="60" r="13"/><text x="230" y="65" text-anchor="middle" font-size="14" fill="#6FB7E0">&#8722;</text>
  <circle class="electron" cx="230" cy="280" r="13"/><text x="230" y="285" text-anchor="middle" font-size="14" fill="#6FB7E0">&#8722;</text>
  <!-- labels -->
  <line class="lead" x1="230" y1="73" x2="330" y2="45"/>
  <text x="335" y="49">electron (negative)</text>
  <line class="lead" x1="120" y1="120" x2="200" y2="160"/>
  <text x="30" y="118">electron shell</text>
  <line class="lead" x1="230" y1="176" x2="120" y2="230"/>
  <text x="55" y="248" text-anchor="middle">nucleus</text>
  <line class="lead" x1="259" y1="164" x2="360" y2="150"/>
  <text x="365" y="154">proton (positive)</text>
  <line class="lead" x1="259" y1="188" x2="360" y2="205"/>
  <text x="365" y="209">neutron (neutral)</text>
</svg>
