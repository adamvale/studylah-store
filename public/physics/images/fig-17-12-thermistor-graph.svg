<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#EAEAEA; stroke-width:2; }
    .grid { stroke:#9AA0A6; stroke-width:0.6; opacity:0.5; }
    .curve { fill:none; stroke:#6FB7E0; stroke-width:2.5; }
  </style>
  <!-- grid -->
  <g class="grid">
    <line x1="70" y1="40" x2="70" y2="280"/>
    <line x1="120" y1="40" x2="120" y2="280"/>
    <line x1="170" y1="40" x2="170" y2="280"/>
    <line x1="220" y1="40" x2="220" y2="280"/>
    <line x1="270" y1="40" x2="270" y2="280"/>
    <line x1="320" y1="40" x2="320" y2="280"/>
    <line x1="70" y1="40" x2="320" y2="40"/>
    <line x1="70" y1="80" x2="320" y2="80"/>
    <line x1="70" y1="120" x2="320" y2="120"/>
    <line x1="70" y1="160" x2="320" y2="160"/>
    <line x1="70" y1="200" x2="320" y2="200"/>
    <line x1="70" y1="240" x2="320" y2="240"/>
  </g>
  <!-- axes -->
  <line class="axis" x1="70" y1="40" x2="70" y2="280"/>
  <line class="axis" x1="70" y1="280" x2="330" y2="280"/>
  <!-- axis labels -->
  <text x="40" y="35" font-size="13" font-style="italic">R/Ω</text>
  <text x="345" y="285" font-size="13" font-style="italic">θ/°C</text>
  <!-- y ticks -->
  <g font-size="11" text-anchor="end">
    <text x="62" y="44">20</text>
    <text x="62" y="84">16</text>
    <text x="62" y="124">12</text>
    <text x="62" y="164">8</text>
    <text x="62" y="204">4</text>
    <text x="62" y="284">0</text>
  </g>
  <!-- x ticks -->
  <g font-size="11" text-anchor="middle">
    <text x="120" y="298">20</text>
    <text x="170" y="298">40</text>
    <text x="220" y="298">60</text>
    <text x="270" y="298">80</text>
    <text x="320" y="298">100</text>
  </g>
  <!-- decreasing curve: R from ~18 at 0 down to ~2 at 100 -->
  <path class="curve" d="M70,60 C110,110 130,150 170,180 C210,210 260,240 320,258"/>
</svg>
