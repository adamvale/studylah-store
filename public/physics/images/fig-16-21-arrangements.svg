<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 10 260 780" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .r { fill:none; stroke:#EAEAEA; stroke-width:1.8; }
    .tag { font-size:15px; font-weight:bold; fill:#6FB7E0; }
  </style>

  <!-- ===== Panel A: all four in series ===== -->
  <text data-step="1" x="150" y="35" class="tag" text-anchor="middle">A</text>
  <path data-step="1" class="wire" d="M40,60 L142,60 M158,60 L260,60"/>
  <line data-step="1" class="wire" x1="142" y1="46" x2="142" y2="74"/>
  <line data-step="1" class="wire" x1="158" y1="52" x2="158" y2="68" stroke-width="4.5"/>
  <path data-step="1" class="wire" d="M40,60 L40,170 L260,170 L260,60"/>
  <rect data-step="1" class="r" x="57" y="163" width="34" height="14"/>
  <rect data-step="1" class="r" x="108" y="163" width="34" height="14"/>
  <rect data-step="1" class="r" x="159" y="163" width="34" height="14"/>
  <rect data-step="1" class="r" x="210" y="163" width="34" height="14"/>

  <!-- ===== Panel B: all four in parallel ===== -->
  <g data-step="2" transform="translate(-300,180)">
  <text x="450" y="35" class="tag" text-anchor="middle">B</text>
  <path class="wire" d="M340,60 L442,60 M458,60 L560,60"/>
  <line class="wire" x1="442" y1="46" x2="442" y2="74"/>
  <line class="wire" x1="458" y1="52" x2="458" y2="68" stroke-width="4.5"/>
  <path class="wire" d="M340,60 L340,200"/>
  <path class="wire" d="M560,60 L560,200"/>
  <path class="wire" d="M340,90 L403,90 M437,90 L560,90"/>
  <rect class="r" x="403" y="83" width="34" height="14"/>
  <path class="wire" d="M340,125 L403,125 M437,125 L560,125"/>
  <rect class="r" x="403" y="118" width="34" height="14"/>
  <path class="wire" d="M340,160 L403,160 M437,160 L560,160"/>
  <rect class="r" x="403" y="153" width="34" height="14"/>
  <path class="wire" d="M340,195 L403,195 M437,195 L560,195"/>
  <rect class="r" x="403" y="188" width="34" height="14"/>
  </g>

  <!-- ===== Panel C: two parallel pairs in series ===== -->
  <g data-step="3" transform="translate(0,145)">
  <text x="150" y="285" class="tag" text-anchor="middle">C</text>
  <path class="wire" d="M40,310 L142,310 M158,310 L260,310"/>
  <line class="wire" x1="142" y1="296" x2="142" y2="324"/>
  <line class="wire" x1="158" y1="302" x2="158" y2="318" stroke-width="4.5"/>
  <path class="wire" d="M40,310 L40,390"/>
  <path class="wire" d="M260,310 L260,390"/>
  <!-- node A(65), B(150), C(235) on midline y=390 -->
  <path class="wire" d="M40,390 L65,390"/>
  <path class="wire" d="M235,390 L260,390"/>
  <!-- pair 1 between A and B -->
  <path class="wire" d="M65,390 L65,372 L90,372 M124,372 L150,372 L150,408 L124,408 M90,408 L65,408 L65,390"/>
  <rect class="r" x="90" y="365" width="34" height="14"/>
  <rect class="r" x="90" y="401" width="34" height="14"/>
  <!-- pair 2 between B and C -->
  <path class="wire" d="M150,390 L150,372 L175,372 M209,372 L235,372 L235,408 L209,408 M175,408 L150,408 L150,390"/>
  <rect class="r" x="175" y="365" width="34" height="14"/>
  <rect class="r" x="175" y="401" width="34" height="14"/>
  </g>

  <!-- ===== Panel D: one in series with three in parallel ===== -->
  <g data-step="4" transform="translate(-300,300)">
  <text x="450" y="285" class="tag" text-anchor="middle">D</text>
  <path class="wire" d="M340,310 L442,310 M458,310 L560,310"/>
  <line class="wire" x1="442" y1="296" x2="442" y2="324"/>
  <line class="wire" x1="458" y1="302" x2="458" y2="318" stroke-width="4.5"/>
  <!-- left rail broken by a series resistor -->
  <path class="wire" d="M340,310 L340,340"/>
  <rect class="r" x="333" y="340" width="14" height="34"/>
  <path class="wire" d="M340,374 L340,440 L360,440"/>
  <path class="wire" d="M560,310 L560,440 L540,440"/>
  <!-- three parallel branches between node x=360 and x=540 -->
  <path class="wire" d="M360,410 L360,470"/>
  <path class="wire" d="M540,410 L540,470"/>
  <path class="wire" d="M360,410 L423,410 M457,410 L540,410"/>
  <rect class="r" x="423" y="403" width="34" height="14"/>
  <path class="wire" d="M360,440 L423,440 M457,440 L540,440"/>
  <rect class="r" x="423" y="433" width="34" height="14"/>
  <path class="wire" d="M360,470 L423,470 M457,470 L540,470"/>
  <rect class="r" x="423" y="463" width="34" height="14"/>
  </g>
</svg>
