<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:17px; }
    .path { fill:none; stroke:#6FB7E0; stroke-width:3; }
    .disp { fill:none; stroke:#F5C542; stroke-width:3; }
    .pt { fill:#EAEAEA; }
    .blue { fill:#6FB7E0; font-weight:600; }
    .yellow { fill:#F5C542; font-weight:600; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#F5C542"/>
    </marker>
  </defs>
  <!-- distance label sits ABOVE, clearly with the blue curve -->
  <text class="blue" x="40" y="40">distance: the actual path</text>
  <!-- winding blue path from A to B, arcing well above the straight line -->
  <path class="path" d="M55,235 C110,100 200,60 280,95 S360,120 368,142"/>
  <!-- straight yellow displacement arrow A to B -->
  <line class="disp" x1="55" y1="235" x2="360" y2="149" marker-end="url(#ah)"/>
  <!-- displacement label sits BELOW, clearly with the yellow line -->
  <text class="yellow" x="90" y="284">displacement: straight line A to B</text>
  <!-- start and end points drawn last, on top -->
  <circle class="pt" cx="55" cy="235" r="6"/>
  <circle class="pt" cx="370" cy="145" r="6"/>
  <text x="38" y="262">A</text>
  <text x="384" y="148">B</text>
</svg>
