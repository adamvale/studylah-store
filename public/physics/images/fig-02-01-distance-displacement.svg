<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .path { fill:none; stroke:#6FB7E0; stroke-width:2.2; }
    .disp { fill:none; stroke:#E8B65A; stroke-width:2.2; }
    .pt { fill:#EAEAEA; }
    .lbl { font-size:12px; }
    .lead { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
  </style>
  <!-- start and end points -->
  <circle class="pt" cx="60" cy="185" r="5"/>
  <circle class="pt" cx="360" cy="90" r="5"/>
  <text x="48" y="205">A</text>
  <text x="368" y="88">B</text>
  <!-- winding path (distance) -->
  <path class="path" d="M60,185 C120,110 150,230 210,150 S300,60 360,90"/>
  <!-- straight displacement arrow -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/>
    </marker>
  </defs>
  <line class="disp" x1="60" y1="185" x2="352" y2="93" marker-end="url(#ah)"/>
  <!-- labels -->
  <text class="lbl" x="150" y="90" fill="#6FB7E0">distance (actual path travelled)</text>
  <path class="lead" d="M175,96 L185,140"/>
  <text class="lbl" x="120" y="165" fill="#E8B65A">displacement (straight line, A to B)</text>
  <path class="lead" d="M175,155 L205,140"/>
</svg>
