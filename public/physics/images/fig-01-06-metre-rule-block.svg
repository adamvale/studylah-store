<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .rule { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .tick { stroke:#EAEAEA; stroke-width:1.2; }
    .block { fill:#6FB7E0; opacity:0.30; stroke:#6FB7E0; stroke-width:1.6; }
    .eye { fill:#E8B65A; }
    .sight { stroke:#9AA0A6; stroke-width:1.3; stroke-dasharray:4 4; fill:none; }
  </style>
  <!-- eye positions A B C -->
  <text x="150" y="30" text-anchor="middle" font-size="15" class="eye">A</text>
  <text x="217.5" y="30" text-anchor="middle" font-size="15" class="eye">B</text>
  <text x="330" y="30" text-anchor="middle" font-size="15" class="eye">C</text>
  <path class="sight" d="M150,38 L217.5,150"/>
  <path class="sight" d="M217.5,38 L217.5,150"/>
  <path class="sight" d="M330,38 L217.5,150"/>
  <!-- block sitting on rule, from 3.0 cm (x=120) to 4.5 cm (x=217.5), 65 units per cm -->
  <rect class="block" x="120" y="95" width="97.5" height="55"/>
  <!-- ruler -->
  <rect class="rule" x="90" y="150" width="300" height="34" rx="3"/>
  <g class="tick">
    <line x1="120" y1="150" x2="120" y2="170"/>
    <line x1="185" y1="150" x2="185" y2="170"/>
    <line x1="217.5" y1="150" x2="217.5" y2="172"/>
    <line x1="250" y1="150" x2="250" y2="170"/>
    <line x1="315" y1="150" x2="315" y2="170"/>
  </g>
  <g font-size="14" text-anchor="middle">
    <text x="120" y="200">3</text><text x="185" y="200">4</text><text x="250" y="200">5</text><text x="315" y="200">6</text>
  </g>
  <text x="410" y="172" font-size="14">cm</text>
  <text x="240" y="240" text-anchor="middle" font-size="14">Left edge on 3.0 cm, right edge on 4.5 cm</text>
</svg>
