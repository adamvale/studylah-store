<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .box { fill:#EAEAEA; opacity:0.14; stroke:#EAEAEA; stroke-width:1.6; }
    .diag { stroke:#9AA0A6; stroke-width:1; stroke-dasharray:4 3; fill:none; }
    .cg { fill:#E58F8F; stroke:#E58F8F; }
    .ground { stroke:#9AA0A6; stroke-width:1.4; }
    .base { stroke:#9AA0A6; stroke-width:3; }
    .lbl { font-size:14px; }
  </style>
  <line class="ground" x1="30" y1="170" x2="410" y2="170"/>
  <!-- C: wide base -->
  <rect class="box" x="55" y="120" width="130" height="50"/>
  <line class="diag" x1="55" y1="120" x2="185" y2="170"/>
  <line class="diag" x1="185" y1="120" x2="55" y2="170"/>
  <circle class="cg" cx="120" cy="145" r="3.6"/>
  <line class="base" x1="55" y1="170" x2="185" y2="170"/>
  <text class="lbl" x="120" y="112" text-anchor="middle">C (wide base)</text>
  <!-- D: narrow base, taller -->
  <rect class="box" x="295" y="90" width="55" height="80"/>
  <line class="diag" x1="295" y1="90" x2="350" y2="170"/>
  <line class="diag" x1="350" y1="90" x2="295" y2="170"/>
  <circle class="cg" cx="322" cy="130" r="3.6"/>
  <line class="base" x1="295" y1="170" x2="350" y2="170"/>
  <text class="lbl" x="322" y="82" text-anchor="middle">D (narrow base)</text>
  <text class="lbl" x="220" y="198" text-anchor="middle" font-size="13">C is more stable than D because</text>
  <text class="lbl" x="220" y="216" text-anchor="middle" font-size="13">it has a greater base area.</text>
</svg>
