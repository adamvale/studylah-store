<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
    <marker id="ai" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#86C98B"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#9AA0A6; stroke-width:1; }
    .lens { fill:#6FB7E0; fill-opacity:0.18; stroke:#6FB7E0; stroke-width:1.5; }
    .obj { stroke:#E8B65A; stroke-width:2; fill:none; }
    .img { stroke:#86C98B; stroke-width:2; fill:none; }
    .r1 { stroke:#6FB7E0; stroke-width:1.5; fill:none; }
    .r2 { stroke:#E8B65A; stroke-width:1.5; fill:none; }
    .tick { stroke:#9AA0A6; stroke-width:1; }
    .pf { fill:#EAEAEA; }
  </style>
  <line data-step="1" class="axis" x1="60" y1="170" x2="520" y2="170"/>
  <path data-step="1" class="lens" d="M350,100 Q378,170 350,240 Q322,170 350,100 Z"/>
  <!-- scale ticks every 3 cm -->
  <g data-step="1" class="tick">
    <line x1="80" y1="166" x2="80" y2="174"/><line x1="125" y1="166" x2="125" y2="174"/>
    <line x1="170" y1="166" x2="170" y2="174"/><line x1="215" y1="166" x2="215" y2="174"/>
    <line x1="260" y1="164" x2="260" y2="176"/><line x1="305" y1="166" x2="305" y2="174"/>
    <line x1="395" y1="166" x2="395" y2="174"/><line x1="440" y1="164" x2="440" y2="176"/>
    <line x1="485" y1="166" x2="485" y2="174"/>
  </g>
  <!-- object -->
  <path data-step="2" class="obj" marker-end="url(#ao)" d="M80,170 L80,113"/>
  <text data-step="2" x="80" y="104" text-anchor="middle" font-size="12" fill="#E8B65A">object (18 cm)</text>
  <!-- ray 1 -->
  <path data-step="3" class="r1" d="M80,110 L350,110"/>
  <path data-step="3" class="r1" marker-end="url(#ar)" d="M350,110 L500,210"/>
  <!-- ray 2 through centre -->
  <path data-step="4" class="r2" marker-end="url(#ao)" d="M80,110 L500,207"/>
  <!-- image -->
  <path data-step="5" class="img" marker-end="url(#ai)" d="M485,170 L485,197"/>
  <text data-step="5" x="485" y="215" text-anchor="middle" font-size="12" fill="#86C98B">image (9 cm)</text>
  <circle data-step="5" class="pf" cx="260" cy="170" r="2.8"/><text data-step="5" x="260" y="190" text-anchor="middle" font-size="12" font-style="italic">F</text>
  <circle data-step="5" class="pf" cx="440" cy="170" r="2.8"/><text data-step="5" x="440" y="190" text-anchor="middle" font-size="12" font-style="italic">F</text>
</svg>
