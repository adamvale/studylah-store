<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah17" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/>
    </marker>
  </defs>
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .chimney { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .plate { fill:#E58F8F; opacity:0.14; stroke:#E58F8F; stroke-width:1.6; }
    .grid  { stroke:#6FB7E0; stroke-width:2; }
    .pos { fill:#E58F8F; font-size:13px; text-anchor:middle; }
    .particle { fill:#9AA0A6; }
    .particleN { fill:#6FB7E0; }
    .arrow { stroke:#EAEAEA; stroke-width:2; fill:none; }
    .num { fill:#E8B65A; font-size:13px; font-weight:bold; text-anchor:middle; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; }
  </style>
  <!-- chimney walls -->
  <line data-step="1" class="chimney" x1="180" y1="60" x2="180" y2="360"/>
  <line data-step="1" class="chimney" x1="380" y1="60" x2="380" y2="360"/>
  <!-- positively charged collecting plates on inner walls -->
  <rect data-step="2" class="plate" x="182" y="90" width="14" height="180"/>
  <rect data-step="2" class="plate" x="364" y="90" width="14" height="180"/>
  <g data-step="2" class="pos">
    <text x="189" y="115">+</text><text x="189" y="155">+</text><text x="189" y="195">+</text><text x="189" y="235">+</text>
    <text x="371" y="115">+</text><text x="371" y="155">+</text><text x="371" y="195">+</text><text x="371" y="235">+</text>
  </g>
  <!-- negatively charged metal grid near bottom -->
  <line data-step="3" class="grid" x1="210" y1="300" x2="350" y2="300"/>
  <g data-step="3" class="particleN"><circle cx="230" cy="300" r="2.5"/><circle cx="280" cy="300" r="2.5"/><circle cx="330" cy="300" r="2.5"/></g>
  <!-- dirty gas rising -->
  <line data-step="4" class="arrow" x1="280" y1="360" x2="280" y2="315" marker-end="url(#ah17)"/>
  <g data-step="4" class="particle">
    <circle cx="260" cy="345" r="4"/><circle cx="300" cy="350" r="4"/><circle cx="280" cy="335" r="4"/>
  </g>
  <!-- negatively charged particles moving to + plates -->
  <g data-step="5" class="particleN">
    <circle cx="240" cy="250" r="4"/><circle cx="320" cy="240" r="4"/><circle cx="270" cy="210" r="4"/><circle cx="330" cy="200" r="4"/>
  </g>
  <line data-step="5" class="arrow" x1="255" y1="240" x2="205" y2="200" marker-end="url(#ah17)"/>
  <line data-step="5" class="arrow" x1="325" y1="230" x2="360" y2="200" marker-end="url(#ah17)"/>
  <!-- clean gas out top -->
  <line data-step="6" class="arrow" x1="280" y1="120" x2="280" y2="70" marker-end="url(#ah17)"/>
  <!-- collecting bin -->
  <path data-step="7" class="chimney" d="M215,335 L235,355 L325,355 L345,335" fill="none"/>
  <!-- labels -->
  <text data-step="8" x="280" y="45" text-anchor="middle" font-size="12">clean gas out (no pollutants)</text>
  <text data-step="8" x="30" y="360" font-size="12">dirty waste gas in</text>
  <line data-step="8" class="lead" x1="180" y1="180" x2="120" y2="180"/>
  <text data-step="8" x="20" y="184" font-size="12">chimney</text>
  <line data-step="8" class="lead" x1="196" y1="150" x2="430" y2="130"/>
  <text data-step="8" x="435" y="134" font-size="12" fill="#E58F8F">+ collecting plate</text>
  <line data-step="8" class="lead" x1="330" y1="300" x2="430" y2="300"/>
  <text data-step="8" x="435" y="304" font-size="12" fill="#6FB7E0">− metal grid</text>
  <text data-step="8" x="435" y="322" font-size="12" fill="#9AA0A6">(charges the dust)</text>
  <line data-step="8" class="lead" x1="280" y1="355" x2="430" y2="370"/>
  <text data-step="8" x="435" y="374" font-size="12">collecting bin</text>
</svg>
