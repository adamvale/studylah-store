<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 344" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13.5px; }
    .stage { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .flow { stroke:#9AA0A6; stroke-width:1.8; fill:none; }
  </style>
  <defs>
    <marker id="fl1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>

  <rect data-step="1" class="stage" x="45" y="16" width="330" height="56" rx="7"/>
  <text data-step="3" x="210" y="50" text-anchor="middle">1. Planning</text>

  <line data-step="1" class="flow" x1="210" y1="74" x2="210" y2="90" marker-end="url(#fl1)"/>

  <rect data-step="1" class="stage" x="45" y="94" width="330" height="56" rx="7"/>
  <text data-step="3" x="210" y="128" text-anchor="middle">2. Manipulation and measurement</text>

  <line data-step="1" class="flow" x1="210" y1="152" x2="210" y2="168" marker-end="url(#fl1)"/>

  <rect data-step="2" class="stage" x="45" y="172" width="330" height="56" rx="7"/>
  <text data-step="3" x="210" y="206" text-anchor="middle">3. Presentation of data</text>

  <line data-step="2" class="flow" x1="210" y1="230" x2="210" y2="246" marker-end="url(#fl1)"/>

  <rect data-step="2" class="stage" x="45" y="250" width="330" height="76" rx="7"/>
  <text data-step="4" x="210" y="282" text-anchor="middle">4. Analysis, conclusions</text>
  <text data-step="4" x="210" y="304" text-anchor="middle">and evaluation</text>
</svg>
