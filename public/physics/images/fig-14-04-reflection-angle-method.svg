<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .inc { stroke:#E8B65A; stroke-width:2; fill:none; }
    .out { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .mirror { stroke:#EAEAEA; stroke-width:2.5; }
    .norm { stroke:#9AA0A6; stroke-width:1.4; stroke-dasharray:6 4; }
    .arc { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
  </style>
  <line class="mirror" x1="70" y1="220" x2="450" y2="220"/>
  <path class="norm" d="M260,220 L260,60"/>
  <text x="260" y="50" text-anchor="middle" font-size="13">normal</text>
  <!-- incident ray making 55 deg with the surface (so i = 35 from normal) -->
  <path class="inc" marker-end="url(#a1)" d="M183,110 L258,218"/>
  <path class="out" marker-end="url(#a2)" d="M262,218 L337,110"/>
  <!-- angle to surface (between ray and mirror) -->
  <path class="arc" d="M205,220 A55,55 0 0,0 229,175"/>
  <text x="188" y="207" font-size="13">55&#176;</text>
  <!-- angle from normal -->
  <path class="arc" d="M260,150 A70,70 0 0,0 220,163"/>
  <text x="231" y="148" font-size="14" font-style="italic">i</text>
  <path class="arc" d="M260,150 A70,70 0 0,1 300,163"/>
  <text x="283" y="148" font-size="14" font-style="italic">r</text>
  <text x="260" y="270" text-anchor="middle" font-size="14"><tspan font-style="italic">i</tspan> = 90&#176; &#8722; 55&#176; = 35&#176;, so <tspan font-style="italic">r</tspan> = 35&#176;</text>
</svg>
