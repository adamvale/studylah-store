<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .ray { stroke:#6FB7E0; stroke-width:2; fill:none; }
    .core { stroke:#EAEAEA; stroke-width:2; fill:#6FB7E0; fill-opacity:0.10; }
    .clad { stroke:#9AA0A6; stroke-width:1.5; fill:none; }
  </style>
  <!-- cross-section at left -->
  <circle cx="90" cy="130" r="46" class="clad"/>
  <circle cx="90" cy="130" r="30" class="core"/>
  <text x="90" y="60" text-anchor="middle" font-size="13">coating (low n)</text>
  <text x="90" y="205" text-anchor="middle" font-size="13">core (high n)</text>
  <!-- fibre body -->
  <line x1="180" y1="100" x2="600" y2="100" stroke="#EAEAEA" stroke-width="2"/>
  <line x1="180" y1="160" x2="600" y2="160" stroke="#EAEAEA" stroke-width="2"/>
  <rect x="180" y="100" width="420" height="60" fill="#6FB7E0" fill-opacity="0.08"/>
  <!-- zig-zag ray with total internal reflection -->
  <path class="ray" marker-end="url(#a2)" d="M182,150 L260,104 L340,156 L420,104 L500,156 L580,104"/>
  <text x="390" y="82" text-anchor="middle" font-size="14" fill="#6FB7E0">total internal reflection</text>
</svg>
