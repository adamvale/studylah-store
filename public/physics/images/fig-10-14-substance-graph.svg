<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .ax { stroke:#EAEAEA; stroke-width:1.6; fill:none; }
    .curve { stroke:#6FB7E0; stroke-width:2.4; fill:none; }
    .g { stroke:#9AA0A6; stroke-width:0.8; stroke-dasharray:4 3; }
  </style>
  <path class="ax" d="M70,30 L70,250 L410,250"/>
  <text x="70" y="20" text-anchor="middle">temperature/&#176;C</text>
  <text x="360" y="270">time/minutes</text>
  <!-- y ticks -->
  <g text-anchor="end">
    <text x="55" y="234">0</text><text x="55" y="196">10</text><text x="55" y="158">20</text>
    <text x="55" y="120">30</text><text x="55" y="82">40</text><text x="55" y="44">50</text>
  </g>
  <g stroke="#EAEAEA" stroke-width="1.2">
    <line x1="66" y1="230" x2="70" y2="230"/><line x1="66" y1="192" x2="70" y2="192"/><line x1="66" y1="154" x2="70" y2="154"/>
    <line x1="66" y1="116" x2="70" y2="116"/><line x1="66" y1="78" x2="70" y2="78"/><line x1="66" y1="40" x2="70" y2="40"/>
  </g>
  <!-- x ticks 0..7 -->
  <g text-anchor="middle">
    <text x="70" y="266">0</text><text x="118" y="266">1</text><text x="166" y="266">2</text><text x="214" y="266">3</text>
    <text x="262" y="266">4</text><text x="310" y="266">5</text><text x="358" y="266">6</text>
  </g>
  <!-- straight rising line: starts at 10 (y=192), rises to 50 (y=40) at t=6 -->
  <line class="g" x1="70" y1="192" x2="118" y2="192"/>
  <line class="curve" x1="70" y1="192" x2="358" y2="40"/>
</svg>
