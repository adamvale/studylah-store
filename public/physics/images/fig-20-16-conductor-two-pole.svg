<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .pole { fill:#9AA0A6; fill-opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .plbl { fill:#EAEAEA; font-size:16px; font-weight:bold; text-anchor:middle; }
    .fld  { stroke:#6FB7E0; stroke-width:1.5; fill:none; }
    .lbl  { fill:#E8B65A; }
  </style>
  <defs>
    <marker id="ff16" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6FB7E0"/></marker>
  </defs>
  <rect class="pole" x="40" y="60" width="46" height="140"/>
  <rect class="pole" x="434" y="60" width="46" height="140"/>
  <text class="plbl" x="63" y="136">S</text>
  <text class="plbl" x="457" y="136">N</text>
  <!-- field pointing left (N -> S) -->
  <line class="fld" x1="428" y1="100" x2="90" y2="100" marker-end="url(#ff16)"/>
  <line class="fld" x1="428" y1="160" x2="90" y2="160" marker-end="url(#ff16)"/>
  <text x="230" y="88" fill="#6FB7E0">magnetic field</text>
  <!-- conductor out of page -->
  <circle cx="260" cy="130" r="13" fill="#6FB7E0" fill-opacity="0.32" stroke="#EAEAEA" stroke-width="1.8"/>
  <circle cx="260" cy="130" r="3.4" fill="#EAEAEA"/>
  <text class="lbl" x="260" y="225" text-anchor="middle">current out of the page (&#8857;)</text>
  <line stroke="#9AA0A6" stroke-width="1.1" x1="260" y1="213" x2="260" y2="146"/>
</svg>
