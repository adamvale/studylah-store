<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .paper { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .comp { fill:none; stroke:#9AA0A6; stroke-width:1.3; }
    .needle { stroke:#EAEAEA; stroke-width:1.8; }
    .nhead { fill:#E58F8F; }
    .lbl { fill:#E8B65A; font-size:13.5px; }
    .lead { stroke:#9AA0A6; stroke-width:1.1; fill:none; }
  </style>
  <rect data-step="1" class="paper" x="40" y="40" width="320" height="220" rx="3"/>
  <text data-step="1" x="370" y="55" class="lbl">paper</text>
  <path data-step="1" class="lead" d="M368,50 L360,50"/>
  <text data-step="1" x="200" y="285" text-anchor="middle" class="lbl">top view: the magnet is hidden under the paper</text>

  <!-- ring of compasses whose needles trace the loop of a bar magnet under the sheet
       (N on the left, S on the right beneath the paper) -->
  <!-- top row: left, centre, right -->
  <g data-step="2" transform="translate(110,90) rotate(270)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <g data-step="2" transform="translate(200,80) rotate(0)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <g data-step="2" transform="translate(290,90) rotate(90)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <!-- middle row: far left (beyond N) and far right (beyond S) -->
  <g data-step="3" transform="translate(75,150) rotate(180)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <g data-step="3" transform="translate(325,150) rotate(180)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <!-- bottom row: left, centre, right -->
  <g data-step="4" transform="translate(110,210) rotate(90)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <g data-step="4" transform="translate(200,220) rotate(0)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
  <g data-step="4" transform="translate(290,210) rotate(270)"><circle class="comp" r="16"/><line class="needle" x1="-11" y1="0" x2="11" y2="0"/><polygon class="nhead" points="7,-4 7,4 15,0"/></g>
</svg>
