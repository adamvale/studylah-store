<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .load { fill:#6FB7E0; opacity:0.3; stroke:#6FB7E0; stroke-width:1.4; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:14px; }
  </style>
  <rect class="beam" x="35" y="95" width="320" height="9"/>
  <!-- pivot X -->
  <polygon class="pivot" points="158,132 182,132 170,104"/>
  <text class="lbl" x="170" y="152" text-anchor="middle">X</text>
  <!-- L on left -->
  <line class="force" x1="50" y1="104" x2="50" y2="150"/>
  <path class="force" d="M50,150 l-5,-10 M50,150 l5,-10"/>
  <text class="lbl" x="50" y="168" text-anchor="middle" fill="#E58F8F">L</text>
  <!-- two loads on right -->
  <circle class="load" cx="230" cy="122" r="13"/>
  <text class="lbl" x="230" y="150" text-anchor="middle">60 N</text>
  <rect class="load" x="293" y="110" width="24" height="24"/>
  <text class="lbl" x="305" y="150" text-anchor="middle">40 N</text>
  <!-- distances -->
  <line class="dim" x1="50" y1="60" x2="170" y2="60"/>
  <path class="dim" d="M50,60 l8,-4 M50,60 l8,4"/>
  <path class="dim" d="M170,60 l-8,-4 M170,60 l-8,4"/>
  <text class="lbl" x="110" y="54" text-anchor="middle">40 cm</text>
  <line class="dim" x1="170" y1="60" x2="230" y2="60"/>
  <path class="dim" d="M170,60 l8,-4 M170,60 l8,4"/>
  <path class="dim" d="M230,60 l-8,-4 M230,60 l-8,4"/>
  <text class="lbl" x="200" y="54" text-anchor="middle">20 cm</text>
  <line class="dim" x1="230" y1="78" x2="305" y2="78"/>
  <path class="dim" d="M230,78 l8,-4 M230,78 l8,4"/>
  <path class="dim" d="M305,78 l-8,-4 M305,78 l-8,4"/>
  <text class="lbl" x="267" y="72" text-anchor="middle">25 cm</text>
  <line class="dim" x1="50" y1="60" x2="50" y2="95" stroke-dasharray="3 3"/>
  <line class="dim" x1="170" y1="60" x2="170" y2="104" stroke-dasharray="3 3"/>
  <line class="dim" x1="230" y1="78" x2="230" y2="109" stroke-dasharray="3 3"/>
  <line class="dim" x1="305" y1="78" x2="305" y2="110" stroke-dasharray="3 3"/>
</svg>
