<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; }
    .beam { fill:#EAEAEA; opacity:0.22; stroke:#EAEAEA; stroke-width:1.6; }
    .pivot { fill:#E8B65A; opacity:0.35; stroke:#E8B65A; stroke-width:1.6; }
    .force { stroke:#E58F8F; stroke-width:2.4; fill:none; }
    .load { fill:#6FB7E0; opacity:0.3; stroke:#6FB7E0; stroke-width:1.4; }
    .dim { stroke:#9AA0A6; stroke-width:1.3; fill:none; }
    .lbl { font-size:12px; }
  </style>
  <rect class="beam" x="45" y="95" width="390" height="9"/>
  <!-- pivot X -->
  <polygon class="pivot" points="158,132 182,132 170,104"/>
  <text class="lbl" x="170" y="152" text-anchor="middle">X</text>
  <!-- L on left -->
  <line class="force" x1="80" y1="104" x2="80" y2="150"/>
  <path class="force" d="M80,150 l-5,-10 M80,150 l5,-10"/>
  <text class="lbl" x="80" y="168" text-anchor="middle" fill="#E58F8F">L</text>
  <!-- two loads on right -->
  <circle class="load" cx="270" cy="122" r="13"/>
  <text class="lbl" x="270" y="150" text-anchor="middle">60 N</text>
  <rect class="load" x="357" y="110" width="24" height="24"/>
  <text class="lbl" x="369" y="150" text-anchor="middle">40 N</text>
  <!-- distances -->
  <line class="dim" x1="80" y1="60" x2="170" y2="60"/>
  <path class="dim" d="M80,60 l8,-4 M80,60 l8,4"/>
  <path class="dim" d="M170,60 l-8,-4 M170,60 l-8,4"/>
  <text class="lbl" x="125" y="54" text-anchor="middle">40 cm</text>
  <line class="dim" x1="170" y1="60" x2="270" y2="60"/>
  <path class="dim" d="M170,60 l8,-4 M170,60 l8,4"/>
  <path class="dim" d="M270,60 l-8,-4 M270,60 l-8,4"/>
  <text class="lbl" x="220" y="54" text-anchor="middle">20 cm</text>
  <line class="dim" x1="270" y1="78" x2="369" y2="78"/>
  <path class="dim" d="M270,78 l8,-4 M270,78 l8,4"/>
  <path class="dim" d="M369,78 l-8,-4 M369,78 l-8,4"/>
  <text class="lbl" x="320" y="72" text-anchor="middle">25 cm</text>
  <line class="dim" x1="80" y1="60" x2="80" y2="95" stroke-dasharray="3 3"/>
  <line class="dim" x1="170" y1="60" x2="170" y2="104" stroke-dasharray="3 3"/>
  <line class="dim" x1="270" y1="78" x2="270" y2="109" stroke-dasharray="3 3"/>
  <line class="dim" x1="369" y1="78" x2="369" y2="110" stroke-dasharray="3 3"/>
</svg>
