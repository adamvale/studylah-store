<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .wire { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .res  { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .plate{ stroke:#EAEAEA; }
    .term { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .cur  { fill:none; stroke:#E8B65A; stroke-width:2.6; }
    .curl { fill:#E8B65A; font-size:13px; }
  </style>
  <defs>
    <marker id="c6" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#E8B65A"/></marker>
  </defs>

  <!-- supply on the left -->
  <path class="wire" d="M70,60 L70,148 M70,160 L70,250"/>
  <line class="plate" x1="56" y1="148" x2="84" y2="148" stroke-width="2"/>
  <line class="plate" x1="63" y1="160" x2="77" y2="160" stroke-width="5"/>
  <text x="50" y="160" text-anchor="end">5.0 V</text>

  <!-- loop -->
  <path class="wire" d="M70,60 L250,60 M70,250 L250,250"/>

  <!-- divider chain: R1 above R2 -->
  <path class="wire" d="M250,60 L250,90 M250,140 L250,170 M250,220 L250,250"/>
  <rect class="res" x="238" y="90" width="24" height="50"/>
  <rect class="res" x="238" y="170" width="24" height="50"/>
  <text x="228" y="120" text-anchor="end">R&#8321; = 4.0 &#937;</text>
  <text x="228" y="200" text-anchor="end">R&#8322; = 6.0 &#937;</text>

  <!-- output taken across R2 -->
  <path class="wire" d="M250,155 L356,155 M250,235 L356,235"/>
  <circle class="term" cx="360" cy="155" r="4"/>
  <circle class="term" cx="360" cy="235" r="4"/>
  <text x="372" y="200">V_out = ?</text>

  <!-- current -->
  <path class="cur" d="M70,130 L70,100" marker-end="url(#c6)"/>
  <path class="cur" d="M110,60 L150,60" marker-end="url(#c6)"/>
  <path class="cur" d="M200,250 L160,250" marker-end="url(#c6)"/>
  <text class="curl" x="130" y="50" text-anchor="middle">I</text>
</svg>
