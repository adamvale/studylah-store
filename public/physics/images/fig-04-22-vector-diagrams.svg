<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
    <marker id="arwG" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3.5 L0,7 Z" fill="#86C98B"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .v { stroke:#EAEAEA; stroke-width:2.2; }
    .res { stroke:#86C98B; stroke-width:2.6; }
    .cap { font-size:12.5; font-weight:bold; }
  </style>
  <!-- Equilibrium: closed triangle -->
  <text x="150" y="28" text-anchor="middle" class="cap">In equilibrium (resultant = 0)</text>
  <line class="v" x1="70" y1="200" x2="230" y2="200" marker-end="url(#arw)"/>
  <text x="150" y="220" text-anchor="middle" font-size="12">A</text>
  <line class="v" x1="230" y1="200" x2="150" y2="70" marker-end="url(#arw)"/>
  <text x="205" y="135" font-size="12">B</text>
  <line class="v" x1="150" y1="70" x2="70" y2="200" marker-end="url(#arw)"/>
  <text x="90" y="135" font-size="12">C</text>
  <text x="150" y="255" text-anchor="middle" font-size="11">The vectors form a closed loop, head to tail.</text>
  <line x1="310" y1="20" x2="310" y2="265" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Not in equilibrium: open, resultant closes the gap -->
  <text x="460" y="28" text-anchor="middle" class="cap">Not in equilibrium (resultant &#8800; 0)</text>
  <line class="v" x1="360" y1="200" x2="440" y2="90" marker-end="url(#arw)"/>
  <text x="385" y="140" font-size="12">A</text>
  <line class="v" x1="440" y1="90" x2="560" y2="110" marker-end="url(#arw)"/>
  <text x="500" y="80" font-size="12">B</text>
  <!-- resultant from tail of A to head of B -->
  <line class="res" x1="360" y1="200" x2="560" y2="110" marker-end="url(#arwG)"/>
  <text x="470" y="185" font-size="12" fill="#86C98B">resultant</text>
  <text x="460" y="255" text-anchor="middle" font-size="11">The gap from first tail to last head is the resultant.</text>
</svg>
