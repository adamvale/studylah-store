<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 570" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#EAEAEA"/></marker>
    <marker id="arwG" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3.5 L0,7 Z" fill="#86C98B"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .v { stroke:#EAEAEA; stroke-width:2.2; }
    .res { stroke:#86C98B; stroke-width:2.6; }
    .cap { font-size:14; font-weight:bold; }
  </style>
  <!-- Equilibrium: closed triangle -->
  <text data-step="1" x="210" y="28" text-anchor="middle" class="cap">In equilibrium (resultant = 0)</text>
  <line data-step="1" class="v" x1="110" y1="230" x2="270" y2="230" marker-end="url(#arw)"/>
  <text data-step="1" x="190" y="252" text-anchor="middle" font-size="13">A</text>
  <line data-step="1" class="v" x1="270" y1="230" x2="190" y2="100" marker-end="url(#arw)"/>
  <text data-step="1" x="245" y="165" font-size="13">B</text>
  <line data-step="1" class="v" x1="190" y1="100" x2="110" y2="230" marker-end="url(#arw)"/>
  <text data-step="1" x="125" y="165" font-size="13">C</text>
  <text data-step="1" x="210" y="280" text-anchor="middle" font-size="13">The vectors form a closed loop, head to tail.</text>
  <line data-step="1" x1="40" y1="305" x2="380" y2="305" stroke="#9AA0A6" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Not in equilibrium: open, resultant closes the gap -->
  <text data-step="2" x="210" y="338" text-anchor="middle" class="cap">Not in equilibrium (resultant &#8800; 0)</text>
  <line data-step="2" class="v" x1="110" y1="510" x2="190" y2="400" marker-end="url(#arw)"/>
  <text data-step="2" x="132" y="450" font-size="13">A</text>
  <line data-step="2" class="v" x1="190" y1="400" x2="310" y2="420" marker-end="url(#arw)"/>
  <text data-step="2" x="250" y="392" font-size="13">B</text>
  <line data-step="2" class="res" x1="110" y1="510" x2="310" y2="420" marker-end="url(#arwG)"/>
  <text data-step="2" x="228" y="490" font-size="13" fill="#86C98B">resultant</text>
  <text data-step="2" x="210" y="548" text-anchor="middle" font-size="13">The gap from first tail to last head is the resultant.</text>
</svg>
