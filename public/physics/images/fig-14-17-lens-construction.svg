<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 330" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6FB7E0"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .axis { stroke:#9AA0A6; stroke-width:1; }
    .lens { fill:#6FB7E0; fill-opacity:0.18; stroke:#6FB7E0; stroke-width:1.6; }
    .obj { stroke:#E8B65A; stroke-width:2.2; fill:none; }
    .img { stroke:#86C98B; stroke-width:2.2; fill:none; }
    .r1 { stroke:#6FB7E0; stroke-width:1.6; fill:none; }
    .r2 { stroke:#E8B65A; stroke-width:1.6; fill:none; }
    .r3 { stroke:#E58F8F; stroke-width:1.6; fill:none; }
    .pf { fill:#EAEAEA; }
  </style>
  <line class="axis" x1="40" y1="180" x2="580" y2="180"/>
  <path class="lens" d="M330,100 Q360,180 330,260 Q300,180 330,100 Z"/>
  <!-- object arrow (at 2F) -->
  <path class="obj" marker-end="url(#ao)" d="M150,180 L150,112"/>
  <text x="150" y="103" text-anchor="middle" font-size="13" fill="#E8B65A">object</text>
  <!-- Ray 1: parallel to axis, then through far F -->
  <path class="r1" d="M150,110 L330,110"/>
  <path class="r1" marker-end="url(#ar)" d="M330,110 L545,277"/>
  <!-- Ray 2: through optical centre C -->
  <path class="r2" marker-end="url(#ao)" d="M150,110 L545,264"/>
  <!-- Ray 3: through near F, then parallel to axis -->
  <path class="r3" d="M150,110 L330,250"/>
  <path class="r3" marker-end="url(#ar)" d="M330,250 L545,250"/>
  <!-- image arrow (inverted, real) -->
  <path class="img" marker-end="url(#ar)" d="M510,180 L510,246"/>
  <text x="524" y="235" font-size="13" fill="#86C98B">image</text>
  <!-- focal points -->
  <circle class="pf" cx="240" cy="180" r="3"/><text x="240" y="200" text-anchor="middle" font-size="13" font-style="italic">F</text>
  <circle class="pf" cx="420" cy="180" r="3"/><text x="420" y="200" text-anchor="middle" font-size="13" font-style="italic">F</text>
  <circle class="pf" cx="330" cy="180" r="3"/><text x="330" y="278" text-anchor="middle" font-size="12">C</text>
</svg>
