<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:13px; }
    .glass { fill:none; stroke:#EAEAEA; stroke-width:2; }
    .liquid { fill:#9AA0A6; }
    .tick { stroke:#EAEAEA; stroke-width:1.4; }
    .major { stroke:#EAEAEA; stroke-width:2.4; }
    .leader { stroke:#9AA0A6; stroke-width:1.2; fill:none; }
    .span { stroke:#9AA0A6; stroke-width:1.4; fill:none; }
    .sub { font-size:12px; fill:#9AA0A6; }
    .num { font-size:14px; fill:#EAEAEA; }
  </style>
  <defs>
    <marker id="t1a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/>
    </marker>
  </defs>

  <!-- glass stem and bulb -->
  <rect data-step="1" class="glass" x="120" y="48" width="30" height="288" rx="9"/>
  <circle data-step="1" class="glass" cx="135" cy="352" r="20" fill="#9AA0A6" fill-opacity="0.35"/>
  <rect data-step="1" class="liquid" x="129" y="160" width="12" height="188"/>
  <circle data-step="1" class="liquid" cx="135" cy="352" r="16"/>

  <!-- scale: minor ticks every 10 degrees -->
  <line data-step="2" class="tick" x1="110" y1="296" x2="120" y2="296"/>
  <line data-step="2" class="tick" x1="110" y1="272" x2="120" y2="272"/>
  <line data-step="2" class="tick" x1="110" y1="248" x2="120" y2="248"/>
  <line data-step="2" class="tick" x1="110" y1="224" x2="120" y2="224"/>
  <line data-step="2" class="tick" x1="110" y1="200" x2="120" y2="200"/>
  <line data-step="2" class="tick" x1="110" y1="176" x2="120" y2="176"/>
  <line data-step="2" class="tick" x1="110" y1="152" x2="120" y2="152"/>
  <line data-step="2" class="tick" x1="110" y1="128" x2="120" y2="128"/>
  <line data-step="2" class="tick" x1="110" y1="104" x2="120" y2="104"/>

  <!-- the 2 fixed points -->
  <line data-step="3" class="major" x1="96" y1="320" x2="120" y2="320"/>
  <line data-step="3" class="major" x1="96" y1="80" x2="120" y2="80"/>
  <text data-step="3" class="num" x="90" y="325" text-anchor="end">0</text>
  <text data-step="3" class="num" x="90" y="85" text-anchor="end">100</text>

  <path data-step="3" class="leader" d="M152,312 H172"/>
  <path data-step="3" class="leader" d="M152,72 H172"/>

  <text data-step="3" x="176" y="76">steam point</text>
  <text data-step="3" class="sub" x="176" y="94">steam over boiling water</text>

  <text data-step="3" x="176" y="316">ice point</text>
  <text data-step="3" class="sub" x="176" y="334">pure melting ice</text>

  <!-- the scale sits between the 2 fixed points -->
  <path data-step="4" class="span" d="M58,80 V320" marker-start="url(#t1a)" marker-end="url(#t1a)"/>
  <text data-step="4" class="sub" x="44" y="200" text-anchor="middle" transform="rotate(-90 44 200)">2 fixed points</text>
</svg>
