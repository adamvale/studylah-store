<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="Segoe UI, Arial, sans-serif">
  <style>
    text { fill:#EAEAEA; font-size:12px; }
    .rule { fill:#EAEAEA; fill-opacity:0.10; stroke:#EAEAEA; stroke-width:1.6; }
    .rule-tick { fill:none; stroke:#9AA0A6; stroke-width:1; }
    .pivot { fill:none; stroke:#EAEAEA; stroke-width:1.6; }
    .base { fill:none; stroke:#EAEAEA; stroke-width:2.4; }
    .string { fill:none; stroke:#EAEAEA; stroke-width:1.4; }
    .mass { fill:#EAEAEA; fill-opacity:0.12; stroke:#EAEAEA; stroke-width:1.5; }
    .force-weight { fill:none; stroke:#E58F8F; stroke-width:2.4; }
    .turn { fill:none; stroke:#E8B65A; stroke-width:2; }
    .guide { fill:none; stroke:#9AA0A6; stroke-width:1.2; }
    .guide-dash { fill:none; stroke:#9AA0A6; stroke-width:1.2; stroke-dasharray:4 3; }
    .lbl-weight { fill:#E58F8F; }
    .lbl-guide { fill:#9AA0A6; }
    .lbl-guide-s { fill:#9AA0A6; font-size:11px; }
  </style>
  <defs>
    <marker id="c9red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
    <marker id="c9amb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E8B65A"/></marker>
    <marker id="c9gry" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0A6"/></marker>
  </defs>

  <!-- turning effects -->
  <path data-step="1" class="turn" d="M148,50 A 34,34 0 0 0 100,83" marker-end="url(#c9amb)"/>
  <path data-step="1" class="turn" d="M272,50 A 34,34 0 0 1 320,83" marker-end="url(#c9amb)"/>

  <!-- perpendicular distances -->
  <path data-step="2" class="guide" d="M80,120 L150,120" marker-start="url(#c9gry)" marker-end="url(#c9gry)"/>
  <path data-step="2" class="guide" d="M150,120 L210,120" marker-start="url(#c9gry)" marker-end="url(#c9gry)"/>
  <path data-step="2" class="guide-dash" d="M80,122 L80,150 M150,122 L150,150 M210,122 L210,150"/>
  <text data-step="2" class="lbl-guide" x="115" y="112" text-anchor="middle">a</text>
  <text data-step="2" class="lbl-guide" x="180" y="112" text-anchor="middle">b</text>

  <!-- half-metre rule -->
  <rect data-step="3" class="rule" x="60" y="150" width="300" height="12"/>
  <path data-step="3" class="rule-tick" d="M90,150 L90,156 M120,150 L120,156 M180,150 L180,156 M240,150 L240,156 M270,150 L270,156 M300,150 L300,156 M330,150 L330,156"/>
  <text data-step="3" x="290" y="140">half-metre rule</text>

  <!-- knife edge -->
  <path data-step="4" class="pivot" d="M150,162 L136,188 L164,188 Z"/>
  <path data-step="4" class="base" d="M110,188 L190,188"/>
  <text data-step="4" class="lbl-guide-s" x="150" y="205" text-anchor="middle">knife-edge pivot</text>

  <!-- known mass P and its weight -->
  <path data-step="5" class="string" d="M80,162 L80,185"/>
  <rect data-step="5" class="mass" x="68" y="185" width="24" height="18"/>
  <text data-step="5" x="80" y="199" text-anchor="middle" font-size="11">P</text>
  <path data-step="5" class="force-weight" d="M80,208 L80,258" marker-end="url(#c9red)"/>
  <text data-step="5" class="lbl-weight" x="88" y="240">weight of P</text>

  <!-- the rule's own weight at its centre of gravity -->
  <circle data-step="6" cx="210" cy="156" r="3" fill="#EAEAEA"/>
  <path data-step="6" class="force-weight" d="M210,164 L210,235" marker-end="url(#c9red)"/>
  <text data-step="6" class="lbl-weight" x="218" y="215">weight of rule W</text>

  <text data-step="6" x="210" y="295" text-anchor="middle">when the rule balances, the 2 moments are equal</text>
</svg>
