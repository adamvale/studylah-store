<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arwG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#86C98B"/></marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#E58F8F"/></marker>
  </defs>
  <style>
    text { fill:#EAEAEA; }
    .body { fill:#6FB7E0; opacity:0.22; stroke:#6FB7E0; stroke-width:1.6; }
    .up { stroke:#86C98B; stroke-width:2.6; }
    .dn { stroke:#E58F8F; stroke-width:2.6; }
  </style>
  <!-- rocket body -->
  <path class="body" d="M150,50 L172,110 L172,220 L128,220 L128,110 Z"/>
  <path class="body" d="M128,220 L108,255 L128,245 Z"/>
  <path class="body" d="M172,220 L192,255 L172,245 Z"/>
  <!-- upward force -->
  <line class="up" x1="205" y1="180" x2="205" y2="90" marker-end="url(#arwG)"/>
  <text x="215" y="130" font-size="12.5" fill="#86C98B">upward force 8000 N</text>
  <!-- weight -->
  <line class="dn" x1="150" y1="255" x2="150" y2="300" marker-end="url(#arwR)"/>
  <text x="160" y="290" font-size="12.5" fill="#E58F8F">weight 4500 N</text>
  <text x="150" y="35" text-anchor="middle" font-size="11.5">rocket, mass 500 kg</text>
</svg>
